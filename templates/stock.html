<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trend Forecasting - Stock Analysis</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: rgba(22, 27, 34, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #ff0055;
            --secondary-glow: rgba(255, 0, 85, 0.4);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --sma20-color: #fce83a;
            --sma50-color: #ff8c00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 i {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* Search Section */
        .search-container {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .search-container:focus-within {
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
        }

        .search-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 8px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            width: 200px;
            outline: none;
            text-transform: uppercase;
        }
        
        .search-input::placeholder {
            text-transform: none;
            color: var(--text-muted);
        }

        .search-btn {
            background: linear-gradient(135deg, #00f0ff, #0088ff);
            color: #000;
            border: none;
            border-radius: 20px;
            padding: 8px 24px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .search-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Dashboard Overview */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .stat-sub {
            font-size: 0.85rem;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .positive { color: #00ff88; }
        .negative { color: #ff0055; }
        .neutral { color: var(--primary); }

        /* Chart Area */
        .chart-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            height: 600px;
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            transition: all 0.3s ease;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 500;
        }
        
        .chart-legend {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .legend-color {
            width: 12px;
            height: 4px;
            border-radius: 2px;
        }

        #error-msg {
            display: none;
            background: rgba(255, 0, 85, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; padding: 1rem; gap: 1rem; align-items: stretch; text-align: center; }
            header > div:first-child { justify-content: center; margin-bottom: 0.5rem; }
            .search-container { width: 100%; display: flex; flex-direction: column; padding: 0; border: none; background: transparent; }
            .search-input, .search-btn { width: 100%; max-width: none; text-align: center; padding: 12px; font-size: 1.1rem; }
            main { padding: 1rem; gap: 1rem; }
            .dashboard { grid-template-columns: 1fr; gap: 1rem; }
            .chart-container { height: 450px; padding: 1rem; }
            .chart-header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .chart-legend { flex-wrap: wrap; gap: 8px; font-size: 0.75rem; }
        }
        
        /* Reset canvas handling */
        #stockChart {
            width: 100% !important;
            height: 100% !important;
            max-height: 520px;
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="/" style="color: #8b949e; font-size: 1.2rem; text-decoration: none; transition: color 0.3s;"><i class="fa-solid fa-house"></i></a>
            <h1><i class="fa-solid fa-chart-line"></i> AI Trend Forecasting</h1>
        </div>
        <div class="search-container" style="gap: 15px; align-items: center; border: none; background: transparent; padding: 0;">
            <div class="search-container" style="margin: 0;">
                <input type="text" id="tickerInput" class="search-input" placeholder="종목 코드 또는 이름 (예: 삼성전자)" value="삼성전자" onkeypress="if(event.key === 'Enter') fetchStockData()">
                <button class="search-btn" onclick="fetchStockData()">분석하기</button>
            </div>
        </div>
    </header>

    <main>
        <div id="error-msg"></div>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-title">현재가 (최근 거래일)<i class="fa-solid fa-dollar-sign"></i></div>
                <div class="stat-value" id="currentPrice">--</div>
                <div class="stat-sub neutral" id="tickerDisplay">종목을 검색해주세요</div>
            </div>
            <div class="stat-card">
                <div class="stat-title"><span id="predTitleText">1개월(30일) 예상가</span> <i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="stat-value" id="predictedPrice">--</div>
                <div class="stat-sub" id="predictionChange">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">전반적 트렌드 <i class="fa-solid fa-arrow-trend-up"></i></div>
                <div class="stat-value" id="trendDirection" style="font-size: 1.4rem; padding-top: 5px;">--</div>
                <div class="stat-sub" style="color: var(--text-muted)">최근 6개월 기반 선형회귀 분석</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">과거 1개월 예측 신뢰도 <i class="fa-solid fa-bullseye"></i></div>
                <div class="stat-value" id="backtestAccuracy" style="font-size: 1.4rem; padding-top: 5px;">--</div>
                <div class="stat-sub" id="backtestSub">1달 전 예측 vs 현재가 비교</div>
            </div>
            <div class="stat-card" id="aiStopLossCard" style="display: none; border-color: rgba(255, 0, 85, 0.3); box-shadow: 0 0 15px rgba(255, 0, 85, 0.1);">
                <div class="stat-title">AI 제안 위험관리 선 <i class="fa-solid fa-shield-halved"></i></div>
                <div class="stat-value" id="aiStopLossValue" style="color: #ff0055; font-size: 1.4rem; padding-top: 5px;">--</div>
                <div class="stat-sub" style="display: flex; justify-content: space-between; align-items: center;">
                    <span id="aiStopLossSub">주요 지지선 붕괴 방어선</span>
                    <span id="volTrendBadge" style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; color: #fff;">--</span>
                </div>
            </div>
        </div>

        <div id="aiAnalysisPanel" class="stat-card" style="display: none; margin-top: -0.5rem; background: rgba(0, 240, 255, 0.03); border-color: rgba(0, 240, 255, 0.2);">
            <div class="stat-title" style="color: var(--primary); font-size: 1.1rem; border-bottom: 1px solid rgba(0, 240, 255, 0.2); padding-bottom: 0.8rem; margin-bottom: 1rem;">
                <i class="fa-solid fa-brain"></i> AI 차트 전문가 딥러닝 리포트
            </div>
            <div id="aiAnalysisText" style="line-height: 1.8; font-size: 1.05rem; color: #fff; white-space: pre-wrap;">
                <!-- AI text goes here -->
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title" id="chartTitle">주가 추이 및 AI 예측선</div>
                <div class="chart-legend">
                    <div class="legend-item"><div class="legend-color" style="background:#00ff88; box-shadow: 0 0 8px #00ff88"></div> 캔들 (상승)</div>
                    <div class="legend-item"><div class="legend-color" style="background:#ff0055; box-shadow: 0 0 8px #ff0055"></div> 캔들 (하락)</div>
                    <div class="legend-item"><div class="legend-color" style="background:var(--secondary); box-shadow: 0 0 8px var(--secondary-glow)"></div> 향후 예측 방향</div>
                    <div class="legend-item"><div class="legend-color" style="background:var(--sma50-color)"></div> 50일 이동평균</div>
                    <div class="legend-item"><div class="legend-color" style="background:transparent; border-top: 2px dashed #fce83a;"></div> 1개월 전 백테스트</div>
                </div>
            </div>
            <div class="loader" id="loader"></div>
            <div id="stockChart"></div>
        </div>
    </main>

    <script>
        let myChart = null;

        // 천단위 콤마 및 소수점 2자리 포맷팅
        const formatCurrency = (val) => {
            if (val === undefined || val === null) return '--';
            if (val > 1000) {
                // 한국 주식 등 단위가 클 경우 소수점 없이
                return new Intl.NumberFormat('en-US', { maximumFractionDigits: 0 }).format(val);
            }
            return new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val);
        };

        async function fetchStockData() {
            const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
            if(!ticker) return;

            document.getElementById('loader').style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';

            try {
                const response = await fetch(`/api/stock?ticker=${encodeURIComponent(ticker)}`);
                const data = await response.json();

                if (!data.success) {
                    showError(data.error);
                    return;
                }

                updateDashboard(data);
                renderChart(data);

            } catch (err) {
                const errMsg = err.message ? err.message : String(err);
                showError("에러 상세: " + errMsg);
                console.error(err);
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('error-msg');
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            
            // clear dashboard
            document.getElementById('currentPrice').textContent = '--';
            document.getElementById('predictionChange').textContent = '--';
            document.getElementById('trendDirection').textContent = '--';
            document.getElementById('predictionChange').className = 'stat-sub';
            document.getElementById('backtestAccuracy').textContent = '--';
            document.getElementById('backtestSub').textContent = '1달 전 예측 vs 현재가 비교';
            document.getElementById('aiAnalysisPanel').style.display = 'none';
            document.getElementById('aiStopLossCard').style.display = 'none';
            document.getElementById('volTrendBadge').textContent = '--';
            
            if(myChart) {
                myChart.remove();
                myChart = null;
            }
        }

        function updateDashboard(data) {
            document.getElementById('tickerDisplay').textContent = `${data.original_ticker} (${data.ticker}) / 최근 2년 데이터`;
            document.getElementById('chartTitle').textContent = `${data.original_ticker} 주가 추이 및 AI 예측선`;
            
            // 향후 예측 타이틀 업데이트
            document.getElementById('predTitleText').textContent = `1개월(30일) 단기 예상가`;
            
            const hist = data.historical;
            const preds = data.predictions;
            
            if (hist.length > 0) {
                const currentPrice = hist[hist.length - 1].close;
                document.getElementById('currentPrice').textContent = formatCurrency(currentPrice);
                
                if (preds.length > 0) {
                    const finalPred = preds[preds.length - 1].predicted_close;
                    document.getElementById('predictedPrice').textContent = formatCurrency(finalPred);
                    
                    const diff = finalPred - currentPrice;
                    const pct = (diff / currentPrice) * 100;
                    
                    const changeEl = document.getElementById('predictionChange');
                    const trendEl = document.getElementById('trendDirection');
                    
                    if (diff > 0) {
                        changeEl.innerHTML = `<i class="fa-solid fa-arrow-up"></i> ${formatCurrency(Math.abs(diff))} (${pct.toFixed(2)}%) 상승 예상`;
                        changeEl.className = 'stat-sub positive';
                        if (pct > 3) {
                            trendEl.innerHTML = '<span class="positive">강한 상승 추세</span>';
                        } else {
                            trendEl.innerHTML = '<span class="positive">상승 추세</span>';
                        }
                    } else if (diff < 0) {
                        changeEl.innerHTML = `<i class="fa-solid fa-arrow-down"></i> ${formatCurrency(Math.abs(diff))} (${Math.abs(pct).toFixed(2)}%) 하락 예상`;
                        changeEl.className = 'stat-sub negative';
                        if (pct < -3) {
                            trendEl.innerHTML = '<span class="negative">강한 하락 추세</span>';
                        } else {
                            trendEl.innerHTML = '<span class="negative">하락 추세</span>';
                        }
                    } else {
                        changeEl.innerHTML = `변동 없음`;
                        changeEl.className = 'stat-sub neutral';
                        trendEl.innerHTML = '<span class="neutral">횡보</span>';
                    }
                }
                
                // 백테스트 예측 신뢰도 (1달 전 예측치 vs 오늘 실제)
                if (data.past_predictions && data.past_predictions.length > 0) {
                    const finalBacktest = data.past_predictions[data.past_predictions.length - 1].backtest_close;
                    const errorDiff = Math.abs(finalBacktest - currentPrice);
                    const errorPct = (errorDiff / currentPrice) * 100;
                    
                    let rating = '';
                    let rColor = '';
                    if (errorPct <= 5) { rating = '신뢰도 매우 높음'; rColor = 'positive'; }
                    else if (errorPct <= 15) { rating = '신뢰도 보통'; rColor = 'neutral'; }
                    else { rating = '신뢰도 낮음 (주의)'; rColor = 'negative'; }
                    
                    document.getElementById('backtestAccuracy').innerHTML = `<span class="${rColor}">오차율 ${errorPct.toFixed(2)}% (${rating})</span>`;
                    document.getElementById('backtestSub').innerHTML = `예측: ${formatCurrency(finalBacktest)} / 실제: ${formatCurrency(currentPrice)}`;
                } else {
                    document.getElementById('backtestAccuracy').innerHTML = '<span style="color: var(--text-muted); font-size: 1.1rem;">데이터 부족</span>';
                    document.getElementById('backtestSub').textContent = '상장 기간 60일 미만';
                }
                
                // AI 분석 데이터 UI 업데이트
                if (data.ai_analysis) {
                    document.getElementById('aiAnalysisPanel').style.display = 'block';
                    document.getElementById('aiAnalysisText').textContent = data.ai_analysis.analysis;
                    
                    if (data.ai_analysis.stop_loss) {
                        document.getElementById('aiStopLossCard').style.display = 'block';
                        document.getElementById('aiStopLossValue').textContent = formatCurrency(data.ai_analysis.stop_loss);
                        
                        // 볼륨 트렌드
                        if (data.volume_trend) {
                            const badge = document.getElementById('volTrendBadge');
                            badge.textContent = data.volume_trend;
                            
                            // 색상 설정
                            if(data.volume_ratio >= 150) badge.style.background = 'rgba(255, 0, 85, 0.3)';
                            else if(data.volume_ratio >= 110) badge.style.background = 'rgba(0, 240, 255, 0.2)';
                            else if(data.volume_ratio <= 90) badge.style.background = 'rgba(139, 148, 158, 0.4)';
                            else badge.style.background = 'rgba(255, 255, 255, 0.1)';
                        }
                    }
                } else {
                    document.getElementById('aiAnalysisPanel').style.display = 'none';
                    document.getElementById('aiStopLossCard').style.display = 'none';
                }
            }
        }

        function renderChart(data) {
            const chartContainer = document.getElementById('stockChart');
            chartContainer.innerHTML = ''; // clear previous chart

            myChart = LightweightCharts.createChart(chartContainer, {
                layout: {
                    background: { type: 'solid', color: 'transparent' },
                    textColor: '#8b949e',
                },
                grid: {
                    vertLines: { color: 'rgba(255, 255, 255, 0.05)' },
                    horzLines: { color: 'rgba(255, 255, 255, 0.05)' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                },
                timeScale: {
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    timeVisible: false,
                },
            });

            // Series 1: Candlestick
            const candleSeries = myChart.addCandlestickSeries({
                upColor: '#00ff88',
                downColor: '#ff0055',
                borderVisible: false,
                wickUpColor: '#00ff88',
                wickDownColor: '#ff0055'
            });

            const candleData = data.historical.map(d => ({
                time: d.date,
                open: d.open,
                high: d.high,
                low: d.low,
                close: d.close
            }));
            candleSeries.setData(candleData);

            // Series 2: Volume
            const volumeSeries = myChart.addHistogramSeries({
                priceFormat: { type: 'volume' },
                priceScaleId: '', // set as an overlay
            });

            volumeSeries.priceScale().applyOptions({
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            const volumeData = data.historical.map(d => ({
                time: d.date,
                value: d.volume,
                color: d.close > d.open ? 'rgba(0, 255, 136, 0.3)' : 'rgba(255, 0, 85, 0.3)'
            }));
            volumeSeries.setData(volumeData);

            // Series 3: SMA 50
            const sma50Series = myChart.addLineSeries({
                color: '#ff8c00',
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Dotted,
                title: 'SMA 50'
            });
            const sma50Data = data.historical.filter(d => d.sma_50 !== null).map(d => ({
                time: d.date,
                value: d.sma_50
            }));
            sma50Series.setData(sma50Data);

            // Series 4: Predictions (Area for Bolinger and Line for Center)
            const upperBandSeries = myChart.addLineSeries({
                color: 'rgba(255, 0, 85, 0.5)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                title: '상단 밴드'
            });
            const centerPredSeries = myChart.addLineSeries({
                color: '#ff0055',
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                title: '예측 중심가'
            });
            const lowerBandSeries = myChart.addLineSeries({
                color: 'rgba(0, 240, 255, 0.5)',
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                title: '하단 밴드'
            });

            if (data.predictions && data.predictions.length > 0) {
                upperBandSeries.setData(data.predictions.map(d => ({ time: d.date, value: d.upper_band })));
                centerPredSeries.setData(data.predictions.map(d => ({ time: d.date, value: d.predicted_close })));
                lowerBandSeries.setData(data.predictions.map(d => ({ time: d.date, value: d.lower_band })));
            }

            // Series 5: Backtest
            if (data.past_predictions && data.past_predictions.length > 0) {
                const backtestSeries = myChart.addLineSeries({
                    color: '#fce83a',
                    lineWidth: 2,
                    lineStyle: LightweightCharts.LineStyle.Dashed,
                    title: '백테스트'
                });
                backtestSeries.setData(data.past_predictions.map(d => ({ time: d.date, value: d.backtest_close })));
            }

            // Price Lines for Target / Stop Loss
            if (data.ai_analysis) {
                if (data.ai_analysis.target_price) {
                    candleSeries.createPriceLine({
                        price: Number(data.ai_analysis.target_price),
                        color: '#00ff88',
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Dotted,
                        axisLabelVisible: true,
                        title: 'AI 목표가',
                    });
                }
                if (data.ai_analysis.stop_loss) {
                    candleSeries.createPriceLine({
                        price: Number(data.ai_analysis.stop_loss),
                        color: '#ff0055',
                        lineWidth: 2,
                        lineStyle: LightweightCharts.LineStyle.Dotted,
                        axisLabelVisible: true,
                        title: 'AI 손절가',
                    });
                }
            }

            // 그래프가 너무 좁게 보이지 않도록, 전체 데이터가 100개가 넘으면 최근 ~100개 캔들만 포커스
            const totalLen = data.historical.length;
            if (totalLen > 100) {
                myChart.timeScale().setVisibleLogicalRange({
                    from: totalLen - 90,
                    to: totalLen + (data.predictions ? data.predictions.length : 5)
                });
            } else {
                myChart.timeScale().fitContent();
            }
            
            // Handle window resize
            window.addEventListener('resize', () => {
                myChart.resize(chartContainer.clientWidth, chartContainer.clientHeight);
            });
        }

        // 초기 로드
        window.addEventListener('DOMContentLoaded', () => {
            fetchStockData();
        });
    </script>
</body>
</html>
