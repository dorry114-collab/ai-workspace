<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 주역 명리 웹</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --tarot-gold: #fbbf24;
            --tarot-dark: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Nanum Myeongjo', serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(251, 191, 36, 0.05), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        header { margin-bottom: 2rem; }
        h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--tarot-gold); margin-bottom: 0.5rem; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);}
        .subtitle { font-size: 1.1rem; color: #94a3b8; line-height: 1.6; }

        .question-box {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .draw-btn {
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Nanum Myeongjo', serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.3);
            margin-top: 20px;
        }

        .draw-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(251, 191, 36, 0.5); }
        .draw-btn:disabled { background: #64748b; cursor: not-allowed; box-shadow: none; transform: none; }

        /* Saju Specific UI */
        .saju-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .saju-inputs select, .saju-inputs input {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(251, 191, 36, 0.4);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-family: 'Nanum Myeongjo', serif;
            outline: none;
        }
        
        .saju-inputs select:focus, .saju-inputs input:focus {
            border-color: var(--tarot-gold);
        }

        .saju-result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 2rem;
        }

        .saju-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 12px;
            padding: 2rem;
            text-align: left;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .saju-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, transparent, var(--tarot-gold), transparent);
        }

        .saju-card h3 {
            color: var(--tarot-gold);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .saju-card p {
            color: #f1f5f9;
            line-height: 1.8;
            font-size: 1.05rem;
            white-space: pre-wrap;
            margin: 0;
        }

        .loader { display: none; text-align: center; margin: 2rem 0; }
        .loader i { font-size: 3rem; color: var(--tarot-gold); animation: spin 2s linear infinite; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .saju-result-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div style="margin-bottom: 2rem;">
                <a href="/" style="color: var(--text-main); text-decoration: none; font-size: 1.2rem; font-family: 'Outfit', sans-serif;"><i class="fa-solid fa-arrow-left"></i> 홈으로</a>
            </div>
            <h1>The Oriental Oracle</h1>
            <p class="subtitle">모든 운명은 천체의 기운에 새겨져 있습니다.<br>당신의 생년월일과 시간을 통해 명리학과 주역의 통찰을 만나보세요.</p>
        </header>

        <div class="question-box" id="sajuInputBox">
            <p style="margin-bottom: 20px; color: #cbd5e1; font-size: 1.1rem;">당신의 태어난 우주의 기운을 입력해주세요.</p>
            <div class="saju-inputs">
                <input type="date" id="sajuDate" required>
                <input type="time" id="sajuTime" required>
                <select id="sajuGender">
                    <option value="남성">남성</option>
                    <option value="여성">여성</option>
                </select>
            </div>
            <br>
            <button class="draw-btn" id="sajuBtn" onclick="analyzeSaju()">
                <i class="fa-solid fa-yin-yang"></i> 주역 명리 분석 시작
            </button>
        </div>

        <div class="loader" id="sajuLoader">
            <i class="fa-solid fa-yin-yang"></i>
            <p style="color: var(--tarot-gold); margin-top: 15px;">천체의 기운과 오행을 맞추는 중입니다...</p>
        </div>

        <div class="saju-result-grid" id="sajuResultGrid" style="display: none; animation: fadeIn 1s;">
            <div class="saju-card">
                <h3><i class="fa-solid fa-sun" style="color: #fcd34d;"></i> 오늘의 운세</h3>
                <p id="resToday">...</p>
            </div>
            <div class="saju-card">
                <h3><i class="fa-solid fa-moon" style="color: #93c5fd;"></i> 이달의 기운</h3>
                <p id="resMonth">...</p>
            </div>
            <div class="saju-card">
                <h3><i class="fa-solid fa-dragon" style="color: #f87171;"></i> 올해 신년운세</h3>
                <p id="resYear">...</p>
            </div>
            <div class="saju-card">
                <h3><i class="fa-solid fa-om" style="color: #c084fc;"></i> 평생 타고난 팔자</h3>
                <p id="resLife">...</p>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 3rem; display: none;" id="sajuReloadBtn">
            <button class="draw-btn" onclick="location.reload()" style="font-size: 1rem; padding: 0.8rem 2rem;">
                <i class="fa-solid fa-rotate-right"></i> 다시 입력하기
            </button>
        </div>
    </div>

    <script>
        async function analyzeSaju() {
            const date = document.getElementById('sajuDate').value;
            const time = document.getElementById('sajuTime').value;
            const gender = document.getElementById('sajuGender').value;

            if(!date || !time) {
                alert('생년월일과 시간을 정확히 입력해 주세요.');
                return;
            }

            document.getElementById('sajuBtn').disabled = true;
            document.getElementById('sajuLoader').style.display = 'block';
            document.getElementById('sajuResultGrid').style.display = 'none';

            try {
                const response = await fetch('/api/saju/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date, time, gender })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('resToday').textContent = data.data.today;
                    document.getElementById('resMonth').textContent = data.data.month;
                    document.getElementById('resYear').textContent = data.data.year;
                    document.getElementById('resLife').textContent = data.data.life;

                    document.getElementById('sajuLoader').style.display = 'none';
                    document.getElementById('sajuInputBox').style.display = 'none';
                    document.getElementById('sajuResultGrid').style.display = 'grid';
                    document.getElementById('sajuReloadBtn').style.display = 'block';
                    
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    throw new Error(data.error);
                }
            } catch(e) {
                alert('명리 분석 중 에러가 발생했습니다: ' + e.message);
                document.getElementById('sajuBtn').disabled = false;
                document.getElementById('sajuLoader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
