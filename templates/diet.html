<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 다이어트 팩폭러</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a; 
            --primary: #8add36; /* Neon Green */
            --primary-dark: #65a30d; 
            --box-bg: #1e293b;
            --text-main: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 2rem; text-align: center; }

        header { margin-bottom: 2rem; }
        h1 { font-family: 'Black Han Sans', sans-serif; font-size: 3.5rem; color: var(--primary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 2px;}
        p.sub { color: #94a3b8; line-height: 1.6; }

        .upload-area {
            background: rgba(0,0,0,0.3);
            border: 2px dashed #475569;
            border-radius: 20px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 2rem;
            position: relative;
        }
        .upload-area:hover { border-color: var(--primary); background: rgba(138, 221, 54, 0.05); }

        .upload-area i { font-size: 4rem; color: #64748b; margin-bottom: 1rem; transition: 0.3s;}
        .upload-area:hover i { color: var(--primary); }
        #fileInput { display: none; }

        #previewImg {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            display: none;
            margin: 0 auto 1rem auto;
            border: 2px solid var(--primary);
        }

        .btn-eval {
            background: var(--primary);
            color: #000;
            border: 4px solid #000;
            padding: 1.2rem 3rem;
            border-radius: 0px; /* brutalist */
            font-size: 1.3rem;
            font-weight: 900;
            font-family: 'Black Han Sans', sans-serif;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-eval:hover { background: #fff; transform: translateY(-5px); box-shadow: 8px 8px 0px var(--primary); }

        .loader { display: none; margin: 2rem 0; color: var(--primary); }
        .loader i { font-size: 4rem; animation: shake 0.5s infinite; }

        .result-panel {
            display: none;
            background: var(--box-bg);
            border-top: 5px solid var(--primary);
            padding: 2.5rem 2rem;
            border-radius: 10px;
            margin-top: 2rem;
            text-align: left;
            animation: fadeIn 0.5s;
        }

        .cal-box {
            background: #000;
            color: var(--primary);
            padding: 20px;
            text-align: center;
            font-family: 'Black Han Sans';
            font-size: 2.5rem;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #334155;
        }
        .cal-box span { font-size: 1rem; color: #fff; font-family: 'Noto Sans KR'; vertical-align: middle;}

        .result-panel h3 { color: #fff; margin-top:20px; border-bottom: 2px solid #334155; padding-bottom: 5px; font-weight: 900;}
        .result-panel p { color: #cbd5e1; line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; margin: 0 0 1rem 0;}
        .penalty { color: #f43f5e; font-weight: bold; background: rgba(244, 63, 94, 0.1); padding: 15px; border-radius: 8px; border-left: 4px solid #f43f5e;}

        @keyframes fadeIn { from { opacity: 0; transform:translateY(20px);} to { opacity: 1; transform:translateY(0);} }
        @keyframes shake { 
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            50% { transform: translateX(5px) rotate(5deg); }
            75% { transform: translateX(-5px) rotate(-5deg); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:left; margin-bottom: 2rem;">
            <a href="/" style="color: #64748b; text-decoration: none; font-weight:bold;"><i class="fa-solid fa-person-running"></i> 도망치기 (홈으로)</a>
        </div>
        
        <header>
            <h1>지옥의 다이어트 코치</h1>
            <p class="sub">오늘 먹은 음식 사진, 또는 충격적인 배달 영수증을 올려보세요.<br>호랑이 PT 선생님이 눈물 쏙 빠지게 팩트 폭행해 드립니다.</p>
        </header>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <img id="previewImg" src="" alt="preview">
            <div id="uploadText">
                <i class="fa-solid fa-burger"></i>
                <h3 style="color:#f8fafc;">양심 고백할 사진 업로드</h3>
                <p style="color: #64748b; font-size:0.9rem;">(음식 사진, 빈 그릇, 배달 영수증 캡처 모두 가능)</p>
            </div>
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" onchange="handleFile(event)">
        </div>

        <button class="btn-eval" id="evalBtn" onclick="evaluateDiet()" style="display:none;">
            <i class="fa-solid fa-fire"></i> 체지방 및 죄악 분석 시작!
        </button>

        <div class="loader" id="loader">
            <i class="fa-solid fa-dumbbell"></i>
            <p style="margin-top:20px; font-weight:bold; color:#fff;">회원님, 그거 입에 넣은 거 스캔 중입니다...</p>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="cal-box" id="calBox">?<span style="display:inline-block; margin-left:10px;">kcal (추정)</span></div>
            
            <h3><i class="fa-solid fa-skull"></i> PT 선생님의 팩트 폭행</h3>
            <p id="roastText">...</p>

            <h3><i class="fa-solid fa-person-walking"></i> 내일의 속죄 플랜 (Penalty)</h3>
            <p class="penalty" id="planText">...</p>
        </div>
    </div>

    <script>
        let base64Image = null;

        function handleFile(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX = 800; 

                    if(width > height && width > MAX) {
                        height *= MAX / width;
                        width = MAX;
                    } else if(height > MAX) {
                        width *= MAX / height;
                        height = MAX;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    base64Image = dataUrl.split(',')[1];
                    
                    document.getElementById('previewImg').src = dataUrl;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('uploadText').style.display = 'none';
                    document.getElementById('evalBtn').style.display = 'block';
                    document.getElementById('resultPanel').style.display = 'none';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        async function evaluateDiet() {
            if(!base64Image) return alert('음식이나 영수증 사진을 올려주세요.');

            const btn = document.getElementById('evalBtn');
            const loader = document.getElementById('loader');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch('/api/diet/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('calBox').innerHTML = data.data.calories + "<span style='display:inline-block; margin-left:10px;'>kcal (추정치)</span>";
                    document.getElementById('roastText').textContent = data.data.roasts;
                    document.getElementById('planText').textContent = data.data.workout_plan;
                    document.getElementById('resultPanel').style.display = 'block';
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    throw new Error(data.error);
                }
            } catch(e) {
                alert("PT 선생님이 접속을 거부했습니다. (" + e.message + ")");
                btn.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
