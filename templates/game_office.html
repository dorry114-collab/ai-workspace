<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>회사원 육성 & 투자 시뮬레이터</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border-color: #334155;
            --stock-up: #ef4444; /* 한국식 주식 상승색(빨강) */
            --stock-down: #3b82f6; /* 한국식 주식 하락색(파랑) */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Nav */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.8rem 1rem; background: rgba(30, 41, 59, 0.8);
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }
        .navbar a { color: var(--text-muted); text-decoration: none; }
        .title { font-weight: 700; color: var(--primary); }

        /* Dash Area */
        .top-dash {
            display: flex; flex-direction: column; gap: 0.8rem; padding: 1rem;
            background: var(--panel-bg); border-bottom: 2px solid var(--border-color);
        }
        .header-stats { display: flex; justify-content: space-between; align-items: flex-end; }
        .age-info { font-size: 1.4rem; font-weight: 700; color: var(--text-main); }
        .title-info { font-size: 0.9rem; color: var(--primary); background: rgba(139, 92, 246, 0.2); padding: 0.2rem 0.6rem; border-radius: 8px;}
        .wealth-info { text-align: right; }
        .net-worth { font-size: 1.8rem; color: var(--accent); font-weight: 700; letter-spacing: -1px; margin-bottom: 0.2rem;}
        .salary { font-size: 0.85rem; color: var(--text-muted); }

        /* Time Bar */
        .time-box { background: #000; height: 8px; border-radius: 4px; overflow: hidden; position: relative; }
        .time-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #d946ef); width: 0%; transition: width 1s linear; }
        .time-label { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem;}

        /* Main layout split */
        .main-content {
            display: grid; grid-template-columns: 1fr; gap: 1rem; padding: 1rem;
        }
        @media(min-width: 900px) {
            .main-content { grid-template-columns: 1fr 1fr; }
            .stock-section { grid-column: 1 / -1; } /* 주식은 아래쪽 전체 양옆 차지 */
        }

        /* Chart & Gauges Section */
        .stats-section {
            background: var(--panel-bg); padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 1rem;
        }
        
        .stamina-box {
            background: #000; border-radius: 8px; padding: 0.5rem; border: 1px solid var(--border-color);
        }
        .hp-txt { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700;}
        .hp-bar-bg { width: 100%; height: 16px; background: #333; border-radius: 8px; overflow: hidden; margin-top: 0.3rem;}
        .hp-bar { height: 100%; background: var(--danger); width: 100%; transition: width 0.3s ease; }

        .radar-gage-wrap {
            display: flex; flex-direction: row; gap: 1rem; align-items: center;
        }
        .chart-container { width: 50%; max-width: 250px; aspect-ratio: 1/1; position: relative; }
        
        .gauges-container {
            width: 50%; display: flex; flex-direction: column; gap: 0.6rem;
        }
        .gauge-row { display: flex; flex-direction: column; gap: 0.2rem; }
        .gauge-label { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 600; color: var(--text-muted); }
        .gauge-bar-bg { width: 100%; height: 10px; background: #000; border-radius: 5px; overflow: hidden;}
        .gauge-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease;}
        .gauge-bar.maxed { background: var(--warning); } /* 100레벨일때 노란색 금빛 */

        /* Actions Section */
        .action-section {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; align-content: start;
        }
        .action-btn {
            background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-main);
            padding: 0.8rem; border-radius: 12px; cursor: pointer; text-align: left; transition: all 0.2s ease;
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .action-btn:hover:not(:disabled) { background: rgba(139, 92, 246, 0.1); border-color: var(--primary); transform: translateY(-2px);}
        .action-btn:active:not(:disabled) { transform: scale(0.95); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .act-icon { font-size: 1.3rem; margin-bottom: 0.2rem; }
        .act-title { font-weight: 700; font-size: 0.9rem; }
        .act-cost { font-size: 0.7rem; color: var(--danger); }
        .act-effect { font-size: 0.7rem; color: var(--accent); }

        /* Stock Market Section */
        .stock-section {
            background: var(--panel-bg); padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color);
        }
        .stock-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1rem;}
        .stock-title { font-size: 1.2rem; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem;}
        .stock-title .ticker { background: #333; color: var(--text-muted); font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
        .stock-price { font-size: 1.5rem; font-weight: 700; color: var(--stock-up); } /* 기본적으로 빨강, 떨어지면 파랑 클래스 주입 */
        .stock-price.down { color: var(--stock-down); }
        .stock-change { font-size: 0.85rem; font-weight: 600; }

        .stock-chart-wrapper { width: 100%; height: 200px; margin-bottom: 1rem; }
        
        .stock-controls { display: flex; flex-direction: column; gap: 0.5rem; }
        .stock-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); background: #000; padding: 0.5rem; border-radius: 8px;}
        .stock-info strong { color: var(--text-main); }
        
        .stock-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        .btn-buy { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--stock-up); color: var(--stock-up); padding: 0.6rem; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s;}
        .btn-buy:hover { background: var(--stock-up); color: #fff;}
        .btn-sell { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--stock-down); color: var(--stock-down); padding: 0.6rem; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.2s;}
        .btn-sell:hover { background: var(--stock-down); color: #fff;}

        /* Logs */
        .log-section {
            background: var(--panel-bg); margin: 0 1rem 1rem 1rem; padding: 1rem; border-radius: 12px;
            height: 120px; overflow-y: auto; border: 1px solid var(--border-color); font-size: 0.8rem;
        }
        .log-entry { margin-bottom: 0.4rem; border-bottom: 1px dashed rgba(255,255,255,0.05); padding-bottom: 0.4rem; color:var(--text-muted);}
        .log-entry strong { color: var(--text-main); }
        .log-entry.month { color: var(--primary); font-weight: 700; background: rgba(139,92,246,0.1); padding: 0.3rem; border-radius: 4px;}
        .log-entry.event { color: var(--warning); font-weight: 700;}

        /* Modal */
        .modal-bg {
            position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            z-index: 1000; display: none; justify-content: center; align-items: center; padding: 1rem;
        }
        .modal-content {
            background: var(--panel-bg); width: 100%; max-width: 400px; padding: 2rem; border-radius: 20px;
            border: 1px solid var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center;
        }
        .modal-icon { font-size: 3rem; margin-bottom: 1rem; }
        .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem;}
        .modal-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; text-align: left; background: rgba(0,0,0,0.3); padding: 1rem; border-radius:8px;}
        
        .modal-btns { display: flex; gap: 0.5rem; }
        .btn-yes { flex:1; padding: 1rem; background: var(--primary); color: white; border:none; border-radius: 12px; font-weight: 700; cursor: pointer;}
        .btn-no { flex:1; padding: 1rem; background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); border-radius: 12px; font-weight: 700; cursor: pointer;}
        
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/"><i class="fa-solid fa-arrow-left"></i> 워크스페이스</a>
        <div class="title">회사원 시뮬레이터 V3</div>
        <a href="#" onclick="resetGame()"><i class="fa-solid fa-rotate-right"></i></a>
    </nav>

    <div class="top-dash">
        <div class="header-stats">
            <div>
                <div class="age-info"><span id="uiYear">26</span>세 <span id="uiMonth" style="font-size:1rem; color:var(--text-muted);">1개월</span></div>
                <div class="title-info" id="uiJobTitle">신입사원</div>
            </div>
            <div class="wealth-info">
                <div class="net-worth" id="uiMoney">0원</div>
                <div class="salary">보유 현금: <strong id="uiCash" style="color:var(--text-main);">0원</strong> | 월급: <strong id="uiSalary" style="color:var(--primary);">0원</strong></div>
            </div>
        </div>
        <div>
            <div class="time-box"><div class="time-bar" id="uiTimeBar"></div></div>
            <div class="time-label">1개월 (월급) 까지: <span id="uiTimeLeft">3600</span>초 남음</div>
        </div>
    </div>

    <div class="main-content">
        
        <!-- Stats & Gauges -->
        <div class="stats-section">
            <div class="stamina-box">
                <div class="hp-txt"><span>체력 (Stamina)</span> <span id="uiStamina">100 / 100</span></div>
                <div class="hp-bar-bg"><div class="hp-bar" id="uiStaminaBar"></div></div>
            </div>

            <div class="radar-gage-wrap">
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
                <div class="gauges-container" id="gaugesWrap">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-section">
            <button class="action-btn" onclick="takeAction('work')">
                <div class="act-icon">💻</div>
                <div class="act-title">살인적 야근</div>
                <div class="act-cost">체력 -30</div>
                <div class="act-effect">업무능력 큰폭 상승</div>
            </button>
            <button class="action-btn" onclick="takeAction('comm')">
                <div class="act-icon">🍻</div>
                <div class="act-title">간 빼놓는 회식</div>
                <div class="act-cost">돈 -20만 | 체력 -20</div>
                <div class="act-effect">소통 대폭 상승</div>
            </button>
            <button class="action-btn" onclick="takeAction('lang')">
                <div class="act-icon">🗣️</div>
                <div class="act-title">심야 외국어 특강</div>
                <div class="act-cost">돈 -100만</div>
                <div class="act-effect">외국어 상승</div>
            </button>
            <button class="action-btn" onclick="takeAction('plan')">
                <div class="act-icon">📚</div>
                <div class="act-title">수면부족 기획구상</div>
                <div class="act-cost">체력 -15 | 돈 -30만</div>
                <div class="act-effect">기획력 상승</div>
            </button>
            <button class="action-btn" onclick="takeAction('lead')">
                <div class="act-icon">👑</div>
                <div class="act-title">최고위 리더십 과정</div>
                <div class="act-cost">돈 -500만</div>
                <div class="act-effect">리더십 획득</div>
            </button>
            <button class="action-btn" onclick="takeAction('rest')" style="border-color:var(--accent);">
                <div class="act-icon">🛌</div>
                <div class="act-title">주말 요양 (꿀잠)</div>
                <div class="act-cost" style="color:var(--text-muted);"><i class="fa-regular fa-clock"></i> 턴 소모</div>
                <div class="act-effect" style="color:var(--accent);">체력 만땅 회복</div>
            </button>
        </div>

        <!-- Stock Market -->
        <div class="stock-section">
            <div class="stock-header">
                <div class="stock-title"><i class="fa-solid fa-arrow-trend-up"></i> 광기전자 <span class="ticker">GWANG</span></div>
                <div style="text-align: right;">
                    <div class="stock-price" id="uiStockPrice">50,000원</div>
                    <div class="stock-change" id="uiStockChange">+0.00%</div>
                </div>
            </div>
            
            <div class="stock-chart-wrapper">
                <canvas id="stockChart"></canvas>
            </div>

            <div class="stock-controls">
                <div class="stock-info">
                    <span>보유 수량: <strong id="uiStockOwned">0주</strong></span>
                    <span>평가 금액: <strong id="uiStockValue" style="color:var(--accent);">0원</strong></span>
                </div>
                <div class="stock-btns">
                    <button class="btn-buy" onclick="buyStock(100000)">10만 매수</button>
                    <button class="btn-buy" onclick="buyStock(1000000)">100만 매수</button>
                    <button class="btn-buy" onclick="buyStock('MAX')" style="background:var(--stock-up); color:#fff;">풀 매수</button>
                    <button class="btn-sell" onclick="sellStock('MAX')" style="background:var(--stock-down); color:#fff;">풀 매도</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Logs -->
    <div class="log-section" id="logBox"></div>

    <!-- Event Modal -->
    <div class="modal-bg" id="eventModal">
        <div class="modal-content">
            <div class="modal-icon" id="evtIcon">✨</div>
            <div class="modal-title" id="evtTitle">이벤트</div>
            <div class="modal-desc" id="evtDesc"></div>
            <div class="modal-btns">
                <button class="btn-no" id="evtBtnNo" onclick="closeModal()">거절</button>
                <button class="btn-yes" id="evtBtnYes" onclick="acceptEvent()">수락</button>
            </div>
        </div>
    </div>

    <!-- Overlay Loader -->
    <div class="modal-bg" id="loadingModal" style="flex-direction:column;">
        <div style="font-size:3rem; margin-bottom:1rem; animation: rotation 2s infinite linear;"><i class="fa-solid fa-spinner" style="color:var(--primary);"></i></div>
        <div style="font-size:1.2rem; font-weight:700;" id="loadingText">오프라인 밀린 월급 정산 중...</div>
    </div>
    
    <style>@keyframes rotation { from {transform: rotate(0deg);} to {transform: rotate(359deg);} }</style>

    <script>
        // --- GAME SETTINGS ---
        const MONTH_SECONDS = 3600; // 1시간 = 1개월 (초고장기 게임)
        const END_AGE = 100;
        const STAT_MAX = 100;

        let s = {
            age: 26, month: 1, money: 2000000, 
            currSec: 0, secondsLived: 0,
            stamina: 100, maxStamina: 100,
            
            // Stats
            stats: { job: 5, comm: 5, lang: 2, plan: 2, lead: 0 },
            
            // Job & Events
            jobTitle: '신입사원', baseSalary: 3000000, companyType: '중소기업',
            lastEventAge: 0, lastSavedTime: Date.now(),
            
            // Stock
            stockOwned: 0, stockAvgPrice: 0
        };

        // UI Mapping
        const statLabels = {
            job: "업무(Hard)", comm: "소통(Comm)", lang: "외국어(Lang)", plan: "기획(Plan)", lead: "리더십(Lead)"
        };

        // Company Paths
        const CAREER_PATH = [
            { title: '사원', req: {job:0, comm:0}, mult: 1 },
            { title: '대리', req: {job:20, comm:15}, mult: 1.3 },
            { title: '과장', req: {job:40, plan:20, comm:30}, mult: 1.8 },
            { title: '차장', req: {job:60, plan:40, lead:20}, mult: 2.5 },
            { title: '부장', req: {job:80, lead:40, comm:50}, mult: 3.5 },
            { title: '임원', req: {job:90, lead:80, plan:70, lang:40}, mult: 8.0 },
            { title: '최고경영자', req: {lead:100, plan:100, comm:100, lang:80, job:100}, mult: 20.0 }
        ];

        const COMPANY_MUL = {
            '중소기업': 1.0, '중견기업': 1.5, '외국계': 2.0, '대기업': 2.5, '유니콘스타트업': 3.0
        };

        // --- STOCK LOGIC (High Volatility) ---
        let currentStockPrice = 50000;
        let stockHistory = Array(30).fill(50000);
        let stockLineChart;

        function updateStockPrice() {
            // 1초마다 가격 변동 - 초고스피드 심장 쫄깃 난수 알고리즘
            // -90% ~ +120%까지 폭등락이 가능한 구조
            let volatility = 0.05; // 5% base volatility per tick
            // 가끔씩 미친 폭락/폭등장 (1% 확률로 50% 떡락 또는 2배 폭등)
            if (Math.random() < 0.01) volatility = 0.8; 

            let changePercent = (Math.random() - 0.49) * volatility; 
            currentStockPrice = Math.max(10, currentStockPrice * (1 + changePercent)); // 최소 10원 보장 방어선 (상폐방지)
            
            // Queue shifting
            stockHistory.shift();
            stockHistory.push(currentStockPrice);

            updateStockUI();
        }

        function getNetWorth() {
            return s.money + (s.stockOwned * currentStockPrice);
        }

        // Action Buttons JS Logic
        function buyStock(amount) {
            let cashToSpend = amount === 'MAX' ? s.money : amount;
            if (cashToSpend <= 0) return alert("자금이 부족합니다.");
            if (s.money < cashToSpend) return alert("자금이 부족합니다.");

            let shares = Math.floor(cashToSpend / currentStockPrice);
            if (shares <= 0) return alert("주가가 너무 비싸 매수할 수 없습니다.");

            let totalCost = shares * currentStockPrice;
            
            // 평단가 계산
            let oldTotal = s.stockOwned * s.stockAvgPrice;
            let newTotal = oldTotal + totalCost;
            s.stockOwned += shares;
            s.stockAvgPrice = newTotal / s.stockOwned;
            
            s.money -= totalCost;
            logMsg(`📈 광기전자 ${shares}주 매수 완료! (현재가: ${formatMoney(Math.floor(currentStockPrice))})`);
            updateUI();
        }

        function sellStock(method) {
            if (s.stockOwned <= 0) return alert("보유 주식이 없습니다.");
            let shares = s.stockOwned; // All
            let revenu = shares * currentStockPrice;
            
            let profit = revenu - (shares * s.stockAvgPrice);
            let profitPrc = ((revenu / (shares * s.stockAvgPrice)) - 1) * 100;
            
            s.money += revenu;
            s.stockOwned = 0;
            s.stockAvgPrice = 0;

            let sign = profit > 0 ? '수익' : '손실';
            logMsg(`📉 주식 전량 매도 완료! ${sign}: <strong>${formatMoney(Math.abs(profit))}</strong> (${profitPrc.toFixed(2)}%)`, false, profit > 0);
            updateUI();
        }

        // --- CHARTS INITIALIZATION ---
        let radarChart;
        function initCharts() {
            // Radar
            const ctxR = document.getElementById('radarChart').getContext('2d');
            Chart.defaults.color = "#94a3b8";
            Chart.defaults.font.family = "Pretendard";
            
            radarChart = new Chart(ctxR, {
                type: 'radar',
                data: {
                    labels: ['업무(Job)', '소통(Comm)', '어학(Lang)', '리더십(Lead)', '기획(Plan)'],
                    datasets: [{
                        label: '내 능력치',
                        data: [s.stats.job, s.stats.comm, s.stats.lang, s.stats.lead, s.stats.plan],
                        backgroundColor: 'rgba(139, 92, 246, 0.4)',
                        borderColor: '#8b5cf6',
                        pointBackgroundColor: '#10b981',
                        borderWidth: 2,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { font: { size: 10, weight: '600' } },
                            ticks: { display: false, min: 0, max: STAT_MAX, stepSize: 20 }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // Stock
            const ctxS = document.getElementById('stockChart').getContext('2d');
            stockLineChart = new Chart(ctxS, {
                type: 'line',
                data: {
                    labels: Array(30).fill(''),
                    datasets: [{
                        label: 'Price',
                        data: stockHistory,
                        borderColor: '#ef4444',
                        borderWidth: 2,
                        tension: 0.1,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: false,
                    scales: {
                        x: { display: false },
                        y: { position: 'right', grid: { color: 'rgba(255,255,255,0.05)' }, ticks:{ callback: v => v > 10000 ? Math.floor(v/10000)+'만' : v } }
                    },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } }
                }
            });
            
            buildGauges();
        }

        function buildGauges() {
            let html = "";
            let keys = ['job', 'comm', 'lang', 'plan', 'lead'];
            keys.forEach(k => {
                html += `
                <div class="gauge-row">
                    <div class="gauge-label">
                        <span>${statLabels[k]}</span>
                        <span id="txt_${k}">${s.stats[k]} / ${STAT_MAX}</span>
                    </div>
                    <div class="gauge-bar-bg">
                        <div class="gauge-bar" id="bar_${k}"></div>
                    </div>
                </div>`;
            });
            document.getElementById('gaugesWrap').innerHTML = html;
        }

        function updateChartsAndGauges() {
            // Radar Update
            radarChart.data.datasets[0].data = [s.stats.job, s.stats.comm, s.stats.lang, s.stats.lead, s.stats.plan];
            radarChart.update();

            // Progress Bars Update
            let keys = ['job', 'comm', 'lang', 'plan', 'lead'];
            keys.forEach(k => {
                let val = s.stats[k];
                document.getElementById(`txt_${k}`).innerText = `Lv. ${val}`;
                let b = document.getElementById(`bar_${k}`);
                b.style.width = `${(val/STAT_MAX)*100}%`;
                if(val >= STAT_MAX) b.classList.add('maxed');
                else b.classList.remove('maxed');
            });
        }

        function updateStockUI() {
            let prev = stockHistory[stockHistory.length - 2] || currentStockPrice;
            let diff = currentStockPrice - prev;
            let perc = (diff / prev) * 100;
            
            let elPrice = document.getElementById('uiStockPrice');
            let elChange = document.getElementById('uiStockChange');
            
            elPrice.innerText = formatMoney(Math.floor(currentStockPrice));
            if (diff >= 0) {
                elPrice.className = "stock-price";
                elChange.innerText = `+${perc.toFixed(2)}% ▲`;
                elChange.style.color = "var(--stock-up)";
                stockLineChart.data.datasets[0].borderColor = "#ef4444";
            } else {
                elPrice.className = "stock-price down";
                elChange.innerText = `${perc.toFixed(2)}% ▼`;
                elChange.style.color = "var(--stock-down)";
                stockLineChart.data.datasets[0].borderColor = "#3b82f6";
            }

            stockLineChart.data.datasets[0].data = stockHistory;
            stockLineChart.update();

            document.getElementById('uiStockOwned').innerText = s.stockOwned.toLocaleString() + "주";
            document.getElementById('uiStockValue').innerText = formatMoney(Math.floor(s.stockOwned * currentStockPrice));
            
            // Updates Net Worth
            document.getElementById('uiMoney').innerText = formatMoney(getNetWorth());
        }

        // --- UTILS ---
        function formatMoney(num) {
            if (num < 10000) return Math.floor(num).toLocaleString() + "원";
            let res = "";
            let jo = Math.floor(num / 1000000000000);
            let uk = Math.floor((num % 1000000000000) / 100000000);
            let man = Math.floor((num % 100000000) / 10000);
            if (jo > 0) res += jo + "조 ";
            if (uk > 0) res += uk + "억 ";
            if (man > 0) res += man + "만 ";
            return res.trim() + "원";
        }

        function logMsg(msg, isMonth=false, isEvent=false) {
            let logBox = document.getElementById('logBox');
            let div = document.createElement('div');
            div.className = `log-entry ${isMonth ? 'month' : ''} ${isEvent ? 'event' : ''}`;
            let t = `[${s.age}세 ${s.month}월] `;
            div.innerHTML = `<span>${t}</span> ` + msg;
            logBox.appendChild(div);
            logBox.scrollTop = logBox.scrollHeight;
            if(logBox.childElementCount > 30) logBox.removeChild(logBox.firstChild);
        }

        // --- CORE ENGINE ---
        function gainStat(key, amount) {
            s.stats[key] = Math.min(STAT_MAX, s.stats[key] + amount);
        }

        function takeAction(type) {
            if(s.age >= END_AGE) return;

            if (type === 'work') {
                if(s.stamina < 30) return alert("스트레스/체력 고갈! 꿀잠 자고 오세요.");
                s.stamina -= 30;
                let inc = Math.floor(Math.random() * 3) + 3;
                gainStat('job', inc);
                logMsg(`🔥 야근 강행! 실무 능력이 크게 상승(+${inc})`);
            } 
            else if (type === 'comm') {
                if(s.money < 200000) return alert("회식비가 부족합니다.");
                if(s.stamina < 20) return alert("체력이 바닥입니다.");
                s.money -= 200000; s.stamina -= 20;
                let inc = Math.floor(Math.random() * 4) + 2;
                gainStat('comm', inc);
                logMsg(`🍻 신명나는 회식. 라인타기에 성공했습니다! 통솔력 상승(+${inc})`);
            }
            else if (type === 'lang') {
                if(s.money < 1000000) return alert("학원비가 부족합니다.");
                s.money -= 1000000;
                let inc = Math.floor(Math.random() * 3) + 2;
                gainStat('lang', inc);
                logMsg(`🗣️ 주말 특강 수료! 외국어 점수 상승(+${inc})`);
            }
            else if (type === 'plan') {
                if(s.money < 300000) return alert("돈이 부족합니다.");
                if(s.stamina < 15) return alert("머리가 안돌아갑니다. 자세요.");
                s.money -= 300000; s.stamina -= 15;
                let inc = Math.floor(Math.random() * 4) + 1;
                gainStat('plan', inc);
                logMsg(`📚 철야 기획구상 완료. 기획력 상승(+${inc})`);
            }
            else if (type === 'lead') {
                if(s.money < 5000000) return alert("연수비 500만원이 부족합니다.");
                s.money -= 5000000;
                let inc = Math.floor(Math.random() * 5) + 3;
                gainStat('lead', inc);
                logMsg(`👑 카네기 리더십 코스 수료. 리더십 급상승(+${inc})`);
            }
            else if (type === 'rest') {
                s.stamina = s.maxStamina;
                logMsg(`🛌 집구석 달콤휴식... 체력 100% 회복!`);
            }

            saveData();
            updateUI();
        }

        // --- TIME ENGINE & PROGRESSION ---
        let currentEvent = null;

        function calcSalary() {
            let myTitleObj = CAREER_PATH[0];
            for (let t of CAREER_PATH) {
                let reqMet = true;
                for (let k in t.req) { if (s.stats[k] < t.req[k]) reqMet = false; }
                if (reqMet) myTitleObj = t;
            }
            
            if (s.jobTitle !== myTitleObj.title) {
                logMsg(`🎉 피나는 노력 결실! <strong>[${myTitleObj.title}]</strong>(으)로 승진했습니다!`, false, true);
                s.jobTitle = myTitleObj.title;
            }

            let compMul = COMPANY_MUL[s.companyType] || 1;
            return s.baseSalary * myTitleObj.mult * compMul;
        }

        function triggerPayday(offlineCount = 1) {
            let actualSalary = calcSalary();
            let total = actualSalary * offlineCount;
            s.money += total;
            s.stamina = Math.min(s.maxStamina, s.stamina + 30 * offlineCount); 
            
            if(offlineCount === 1) {
                logMsg(`💰 월급날! <strong>${formatMoney(actualSalary)}</strong>이 입금되었습니다.`, true);
            }
        }

        function checkRandomEvents() {
            if (s.secondsLived % 12 === 0 && Math.random() < 0.5 && s.lastEventAge < s.age) {
                let evt = null;
                if (s.stats.lang >= 60 && s.stats.comm >= 50 && s.companyType !== '외국계') {
                    evt = {
                        title: "외국계 임원 스카웃", desc: "외국어 능통자를 대상으로 구글코리아 스카웃 제의가 왔습니다. 수락 시 연봉 배수 2배 점프 창출!",
                        yes: () => { s.companyType = '외국계'; logMsg("✈️ 헬반도를 탈출해 외국계 입성!", false, true); }
                    };
                }
                else if (s.stats.plan > 80 && s.stats.job > 80 && s.companyType !== '대기업') {
                    evt = {
                        title: "네/카/라/쿠/배 직행", desc: "압도적 실무력으로 판교 대기업 오퍼를 받습니다. (배수 2.5x)",
                        yes: () => { s.companyType = '대기업'; logMsg("🏢 판교행 막차 탑승 완료!", false, true); }
                    };
                }
                else if (s.stats.lead === STAT_MAX && s.stats.plan === STAT_MAX && s.companyType !== '유니콘스타트업') {
                    evt = {
                        title: "유니콘 CEO 취임 제의", desc: "당신의 완벽한 리더십 명성에 투자자들이 몰려옵니다. 스톡옵션과 함께 유니콘 스타트업을 이끌어주십시오! (배수 3.0x)",
                        yes: () => { s.companyType = '유니콘스타트업'; logMsg("🦄 유니콘 스타트업 등극!", false, true); }
                    };
                }
                if (evt) { s.lastEventAge = s.age; showModal(evt); }
            }
        }

        function processTimeTick(ticks) {
            for(let i=0; i<ticks; i++) {
                if(s.age >= END_AGE) break;
                
                s.currSec += 1;
                if (s.currSec >= MONTH_SECONDS) {
                    s.currSec = 0; s.month += 1; s.secondsLived += 1;
                    
                    triggerPayday(1);
                    checkRandomEvents();

                    if (s.month > 12) {
                        s.month = 1; s.age += 1;
                        logMsg(`🎂 새해가 밝았습니다. <strong>${s.age}세</strong>가 되었습니다!`, false, true);
                        if (s.age >= END_AGE) {
                            endGame();
                        }
                    }
                }
            }
        }

        // --- MAIN LOOP ---
        setInterval(() => {
            if(s.age >= END_AGE || currentEvent !== null) return;
            processTimeTick(1);
            s.lastSavedTime = Date.now();
            updateUI();
        }, 1000); 

        // Stock chart updates much faster to simulate high frequency trading
        setInterval(() => {
            if(s.age >= END_AGE || currentEvent !== null) return;
            updateStockPrice();
        }, 2000);

        setInterval(() => { saveData(); }, 5000); // Save every 5 real-sec

        // --- UI & Lifecycle ---
        function updateUI() {
            document.getElementById('uiYear').innerText = s.age;
            document.getElementById('uiMonth').innerText = s.month + "개월";
            document.getElementById('uiJobTitle').innerText = `[${s.companyType}] ${s.jobTitle}`;
            document.getElementById('uiCash').innerText = formatMoney(s.money);
            document.getElementById('uiSalary').innerText = formatMoney(calcSalary());

            document.getElementById('uiStamina').innerText = `${Math.floor(s.stamina)} / ${s.maxStamina}`;
            document.getElementById('uiStaminaBar').style.width = `${(s.stamina/s.maxStamina)*100}%`;
            
            let pct = (s.currSec / MONTH_SECONDS) * 100;
            document.getElementById('uiTimeBar').style.width = pct + '%';
            document.getElementById('uiTimeLeft').innerText = (MONTH_SECONDS - s.currSec);

            updateChartsAndGauges();
            // Note: 주식 UI는 updateStockUI에서 별도 처리되지만 돈(Net Worth) 계산을 위해 호출됨
        }

        function showModal(evtObj) {
            currentEvent = evtObj;
            document.getElementById('eventModal').style.display = 'flex';
            document.getElementById('evtTitle').innerHTML = evtObj.title;
            document.getElementById('evtDesc').innerHTML = evtObj.desc;
        }

        function closeModal() { document.getElementById('eventModal').style.display='none'; currentEvent=null; }
        function acceptEvent() { document.getElementById('eventModal').style.display='none'; if(currentEvent.yes) currentEvent.yes(); currentEvent=null; updateUI(); }

        function endGame() {
            showModal({
                title: "은퇴",
                desc: `100세가 되셨습니다. 치열했던 회사생활과 역대급 주식 투기판에서 잘 살아남으셨습니다.<br><br>최종 총자산: <strong>${formatMoney(getNetWorth())}</strong><br>최종 직장: <strong>${s.companyType} ${s.jobTitle}</strong><br><br>수고하셨습니다.`,
                yes: () => resetGame(), no: () => resetGame()
            });
            document.getElementById('evtBtnNo').style.display = 'none';
            document.getElementById('evtBtnYes').innerText = "환생하기";
        }

        // Data Management
        function saveData() { localStorage.setItem('officeLifeSaveV3', JSON.stringify(s)); }

        function loadData() {
            let j = localStorage.getItem('officeLifeSaveV3');
            if (j) {
                try {
                    let p = JSON.parse(j);
                    if(p.age >= 26) { s = Object.assign(s, p); }
                    
                    // Offline progress calculation
                    let now = Date.now();
                    let diffSeconds = Math.floor((now - s.lastSavedTime) / 1000);
                    
                    if (diffSeconds > 10 && s.age < END_AGE) {
                        document.getElementById('loadingModal').style.display = 'flex';
                        logMsg(`⚡ 오프라인 경과 시간: ${diffSeconds}초. 밀린 데이터 동기화 중...`);
                        
                        setTimeout(() => {
                            // Max catch-up limit = 24 real hours (86400 seconds = 24 months = 2 years game time)
                            let processSecs = Math.min(diffSeconds, 86400); 
                            processTimeTick(processSecs);
                            s.lastSavedTime = Date.now();
                            saveData();
                            document.getElementById('loadingModal').style.display = 'none';
                            updateUI();
                        }, 500);
                    }
                } catch(e) {}
            }
        }

        function resetGame() {
            if(confirm("완전 초기화하시겠습니까?")) {
                localStorage.removeItem('officeLifeSaveV3'); location.reload();
            }
        }

        window.onload = () => {
            loadData();
            initCharts();
            updateUI();
            updateStockUI();
        };

    </script>
</body>
</html>
