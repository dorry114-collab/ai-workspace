<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Optimizer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Highlight.js for markdown code formatting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: rgba(22, 27, 34, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #b100ff;
            --primary-hover: #d24dff;
            --text-main: #f0f6fc;
            --text-secondary: #8b949e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(177, 0, 255, 0.05), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.05), transparent 30%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .workspace {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #fff, #b100ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin: 0;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        
        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Forms & Inputs --- */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-text {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.2rem;
            color: var(--text-main);
            font-size: 1.1rem;
            transition: all 0.2s;
            box-sizing: border-box;
            outline: none;
        }

        .input-text:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(177, 0, 255, 0.2);
        }

        .primary-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(177, 0, 255, 0.4);
        }

        .primary-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Question Cards --- */
        .question-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .q-label {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .q-text {
            font-size: 1.15rem;
            margin-bottom: 0.5rem;
        }

        .q-example {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .q-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.8rem;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .q-input:focus {
            border-color: var(--primary);
        }

        /* --- Formatting markdown --- */
        .markdown-body {
            background: #0d1117;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            overflow-x: auto;
            line-height: 1.6;
        }
        .markdown-body pre {
            background: #161b22;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }
        .markdown-body code {
            font-family: monospace;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: rgba(177, 0, 255, 0.1);
        }

        /* --- Loader --- */
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        .big-loader {
            width: 50px;
            height: 50px;
            border-color: rgba(177, 0, 255, 0.3);
            border-top-color: var(--primary);
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-state {
            text-align: center;
            padding: 3rem 0;
            display: none;
        }
        .loading-state.active {
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #238636;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .workspace { padding: 1rem; }
            header { padding: 0.5rem; text-align: center; }
            header h1 { font-size: 1.8rem; justify-content: center; }
            .subtitle { font-size: 0.95rem; line-height: 1.4; }
            
            .row { flex-direction: column; }
            .panel { padding: 1.5rem 1rem; margin-bottom: 1rem; }
            
            #initialPrompt { font-size: 1rem; padding: 1rem; min-height: 120px; }
            button.primary-btn { width: 100%; box-sizing: border-box; text-align: center; justify-content: center; font-size: 1rem; padding: 1rem; }
            
            #answersForm { flex-direction: column !important; }
            #answersForm input { width: 100% !important; box-sizing: border-box; margin-bottom: 10px; }
            #answersForm button { width: 100% !important; box-sizing: border-box; justify-content: center; }
            
            .chat-container { padding: 10px; }
            .chat-message { max-width: 95%; font-size: 0.95rem; }
            .input-area { flex-direction: column; gap: 10px; }
            #answerInput { width: 100%; box-sizing: border-box; }
            #sendAnswerBtn { width: 100%; }
            
            .markdown-body { padding: 1rem; font-size: 0.95rem; }
            .copy-btn { width: 100%; justify-content: center; margin-top: 10px; }
        }
    
        /* Mobile Optimization */
        @media (max-width: 600px) {
            .container, .main-container { padding: 1rem; width: 100%; max-width: 100%; box-sizing: border-box; margin: 0; border-radius: 0; border: none; min-height: 100vh; }
            .input-area, .button-group { flex-direction: column; gap: 8px; }
            .input-area input[type="text"], .input-area button, .button-group button { width: 100%; box-sizing: border-box; }
            .modal-content { width: 95%; padding: 1.5rem; margin: 0 auto; }
            header { flex-direction: column; gap: 10px; text-align: center; }
            header h1 { font-size: 1.3rem; text-align: center; }
            .nav-bar, .navbar { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            .navbar > div { width: 100%; display: flex; justify-content: space-between; margin-top: 5px; }
            .result-card, .diary-card, .chat-box { width: 100%; box-sizing: border-box; padding: 15px; }
            .msg { max-width: 100%; padding: 1rem; font-size: 1rem; }
            .status-grid { flex-direction: column; gap: 5px; }
            .choice-btn { padding: 1rem; }
            .grid-container { grid-template-columns: 1fr; }
            button { word-break: keep-all; }
            img { max-width: 100%; height: auto; }
        }
</style>
</head>
<body>
    <div class="workspace">
        <header>
            <div style="display: flex; gap: 1rem; align-items: center; justify-content: center; margin-bottom: 0.5rem;">
                <a href="/" style="color: var(--text-secondary); font-size: 1.2rem; text-decoration: none; transition: color 0.3s;"><i class="fa-solid fa-house"></i></a>
                <h1><i class="fa-solid fa-wand-magic-sparkles" style="color: var(--primary); margin-right: 10px;"></i> AI Prompt Optimizer</h1>
            </div>
            <p class="subtitle">오픈AI의 GPT-4o-mini 엔진이 당신의 막연한 아이디어를 궁극의 마스터 프롬프트로 변환해 줍니다.</p>
        </header>

        <!-- Phase 1: Idea Input -->
        <div id="phase1" class="panel active">
            <h2 style="margin-top:0;">💡 1단계: 무엇을 만들고 싶으신가요?</h2>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">생각나는 대로 편하게 적어주세요. 나머지는 AI가 알아서 물어볼 것입니다.</p>
            
            <form id="ideaForm" class="input-group">
                <div style="text-align: right; margin-bottom: -10px;">
                    <button type="button" onclick="fillRandomPrompt()" style="background: rgba(177, 0, 255, 0.1); border: 1px solid var(--primary); color: var(--primary); padding: 5px 12px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; font-family: inherit; transition: 0.3s;">
                        <i class="fa-solid fa-dice"></i> 프롬프트 예시 채우기
                    </button>
                </div>
                <textarea id="ideaInput" class="input-text" rows="4" placeholder="예: 유튜브 대본을 써주는 프롬프트를 만들고 싶어. 주요 타겟은 2030 직장인이야."></textarea>
                <button type="submit" class="primary-btn" id="btnAsk">
                    <i class="fa-solid fa-brain"></i> 대화 시작하기
                </button>
            </form>
        </div>

        <!-- Phase 2: Questions -->
        <div id="phase2" class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; margin-bottom: 1.5rem;">
                <h2 style="margin:0;">📝 2단계: 대화형 질의응답 <span id="qProgress" style="font-size: 1.2rem; color: var(--primary);">(1/5)</span></h2>
            </div>
            
            <div id="chatHistory" style="margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
                <!-- History of Q&A goes here -->
            </div>
            
            <div id="currentQuestionBox" class="question-card" style="border-left-color: var(--text-main);">
                <div class="loader big-loader" id="qLoader" style="display:none; margin: 2rem auto; border-color: rgba(255,255,255,0.2); border-top-color: var(--primary);"></div>
                <div id="qContent">
                    <div class="q-label">AI의 질문</div>
                    <div class="q-text" id="qText">...</div>
                    <div class="q-example" id="qExample">...</div>
                    
                    <form id="answersForm" style="margin-top: 1rem; display: flex; gap: 10px;">
                        <input type="text" class="q-input" id="currentAnswerInput" placeholder="답변을 입력하세요. (건너뛰려면 비워두고 '다음' 클릭)" autocomplete="off" style="flex: 1;">
                        <button type="submit" class="primary-btn" style="padding: 0.8rem 1.5rem; font-size: 1rem;">
                            다음 <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </form>
                </div>
            </div>
            
            <div style="margin-top: 2rem; text-align: center;">
                <button type="button" class="copy-btn" onclick="resetApp()">처음부터 다시하기</button>
            </div>
        </div>

        <div id="loading2" class="loading-state">
            <div class="loader big-loader"></div>
            <h3>5개의 답변을 조립하여 완벽한 프롬프트를 생성중입니다...</h3>
        </div>

        <!-- Phase 3: Final Prompt -->
        <div id="phase3" class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin:0;">✨ 3단계: 당신만의 마스터 프롬프트</h2>
                <button class="copy-btn" onclick="copyPrompt()">
                    <i class="fa-regular fa-copy"></i> 복사하기
                </button>
            </div>
            
            <div id="finalPromptContainer" class="markdown-body"></div>
            
            <div style="margin-top: 2rem; text-align: center;">
                <button class="copy-btn" onclick="resetApp()">새로운 프롬프트 만들기</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">
        <span id="toastMessage">알림 메시지</span>
    </div>

    <script>
        let globalHistory = [];
        let currentQuestionIndex = 1;
        let finalPromptRaw = "";
        let currentIdea = "";
        let currentQuestionText = "";

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function switchPhase(hideId, showId) {
            document.querySelectorAll('.panel, .loading-state').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(showId).classList.add('active');
        }

        function resetApp() {
            document.getElementById('ideaInput').value = '';
            document.getElementById('chatHistory').innerHTML = '';
            globalHistory = [];
            currentQuestionIndex = 1;
            currentIdea = "";
            switchPhase('phase2', 'phase1');
            switchPhase('phase3', 'phase1');
        }

        async function fetchNextQuestion() {
            switchPhase('phase1', 'phase2');
            document.getElementById('qContent').style.display = 'none';
            document.getElementById('qLoader').style.display = 'block';
            document.getElementById('qProgress').textContent = `(${currentQuestionIndex}/5)`;
            document.getElementById('currentAnswerInput').value = '';

            try {
                const res = await fetch('/api/prompt/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idea: currentIdea, history: globalHistory, questionIndex: currentQuestionIndex })
                });
                const data = await res.json();
                
                if (data.success) {
                    currentQuestionText = data.question.question;
                    document.getElementById('qText').textContent = data.question.question;
                    document.getElementById('qExample').textContent = data.question.example || "";
                    document.getElementById('qLoader').style.display = 'none';
                    document.getElementById('qContent').style.display = 'block';
                    document.getElementById('currentAnswerInput').focus();
                } else {
                    showToast(data.error);
                }
            } catch (err) {
                showToast("서버 통신 오류가 발생했습니다.");
            }
        }

        // --- Phase 1: Ask ---
        document.getElementById('ideaForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const idea = document.getElementById('ideaInput').value.trim();
            if (!idea) {
                showToast("아이디어를 입력해주세요!");
                return;
            }
            currentIdea = idea;
            globalHistory = [];
            currentQuestionIndex = 1;
            document.getElementById('chatHistory').innerHTML = '';
            
            fetchNextQuestion();
        });

        // --- Phase 2: Iterate or Generate ---
        document.getElementById('answersForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ans = document.getElementById('currentAnswerInput').value.trim() || "특별히 지정하지 않음. 문맥에 맞게 알아서 설정해줘.";
            
            // Visual history
            const cHist = document.getElementById('chatHistory');
            cHist.innerHTML += `
                <div style="background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--primary); border-radius: 8px; padding: 1rem;">
                    <div style="color: var(--primary); font-size: 0.9rem; font-weight: bold; margin-bottom: 0.4rem;">Q${currentQuestionIndex}. ${currentQuestionText}</div>
                    <div style="color: var(--text-main); line-height: 1.4;">A. ${ans}</div>
                </div>
            `;
            
            globalHistory.push({
                question: currentQuestionText,
                answer: ans
            });
            
            if (currentQuestionIndex < 5) {
                currentQuestionIndex++;
                fetchNextQuestion();
            } else {
                switchPhase('phase2', 'loading2');

                try {
                    const res = await fetch('/api/prompt/generate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ idea: currentIdea, answers: globalHistory })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
                        finalPromptRaw = data.prompt;
                        const container = document.getElementById('finalPromptContainer');
                        container.innerHTML = marked.parse(data.prompt);
                        
                        document.querySelectorAll('pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                        
                        switchPhase('loading2', 'phase3');
                        showToast("성공적으로 마스터 프롬프트가 완성되었습니다!");
                    } else {
                        showToast(data.error);
                        switchPhase('loading2', 'phase2');
                    }
                } catch (err) {
                    showToast("서버 통신 오류가 발생했습니다.");
                    switchPhase('loading2', 'phase2');
                }
            }
        });

        // --- Copy Logic ---
        function copyPrompt() {
            // Strip out markdown code block backticks if the AI wrapped the entire thing in it,
            // or just copy the raw text. 
            let textToCopy = finalPromptRaw;
            if (textToCopy.startsWith('```markdown')) {
                textToCopy = textToCopy.substring(11);
                if (textToCopy.endsWith('```')) {
                    textToCopy = textToCopy.substring(0, textToCopy.length - 3);
                }
            } else if (textToCopy.startsWith('```')) {
                textToCopy = textToCopy.substring(3);
                if (textToCopy.endsWith('```')) {
                    textToCopy = textToCopy.substring(0, textToCopy.length - 3);
                }
            }

            navigator.clipboard.writeText(textToCopy.trim()).then(() => {
                showToast("클립보드에 복사 완료! ChatGPT에 가서 붙여넣기 하세요!");
            });
        }

        const samplePrompts = [
            "인스타그램 릴스 대본을 기획해주는 프롬프트. MBTI J 성향처럼 딱딱 떨어지는 bullet point로 정리해주면 좋겠어.",
            "신입 개발자 기술 면접을 대비해서 압박 면접 질문을 던져주고 내 대답을 평가해주는 AI 면접관 프롬프트.",
            "초등학생이 이해할 수 있을 정도로 엄청나게 쉽게 양자역학, 블랙홀 같은 우주 과학 상식을 설명해주는 봇 프롬프트.",
            "소설 작가 지망생인데 나랑 같이 티키타카 하면서 로맨스 판타지 세계관을 같이 짜주는 코파일럿 프롬프트를 만들고 싶어."
        ];

        function fillRandomPrompt() {
            const ta = document.getElementById('ideaInput');
            const randomText = samplePrompts[Math.floor(Math.random() * samplePrompts.length)];
            ta.value = "";
            let i = 0;
            const typeWriter = setInterval(() => {
                if (i < randomText.length) {
                    ta.value += randomText.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriter);
                }
            }, 30);
        }
    </script>
</body>
</html>
