<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 몽환의 꿈 해몽가</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b1021;
            --container-bg: rgba(18, 25, 48, 0.8);
            --primary: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Gowun Dodum', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 20%, rgba(139, 92, 246, 0.15), transparent 60%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 3rem 1.5rem; text-align: center; }

        header h1 {
            font-family: 'Noto Serif KR', serif;
            font-size: 3rem;
            color: #d8b4fe;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(216, 180, 254, 0.3);
        }

        .input-panel {
            background: var(--container-bg);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 24px;
            padding: 2.5rem;
            margin: 2rem 0;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(139, 92, 246, 0.4);
            color: #fff;
            padding: 1.5rem;
            border-radius: 16px;
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            box-sizing: border-box;
        }
        textarea:focus { outline: none; border-color: #d8b4fe; box-shadow: 0 0 15px rgba(216, 180, 254, 0.2); }

        .btn-analyze {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 30px;
            font-size: 1.2rem;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif KR', serif;
        }
        .btn-analyze:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(124, 58, 237, 0.4); }

        .result-panel {
            display: none;
            animation: fadeIn 1s ease-out;
            margin-top: 3rem;
            text-align: left;
        }

        .card {
            background: var(--container-bg);
            border-left: 4px solid var(--primary);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }
        .card h3 { color: #d8b4fe; margin-top: 0; font-family: 'Noto Serif KR', serif; font-size: 1.4rem; }
        .card p { line-height: 1.8; font-size: 1.1rem; color: #cbd5e1; white-space: pre-wrap; margin: 0; }
        
        .lotto-box {
            background: linear-gradient(to right, rgba(251, 191, 36, 0.1), transparent);
            border-left: 4px solid #f59e0b;
        }
        .lotto-box h3 { color: #fcd34d; }

        .loader { display: none; margin: 2rem 0; color: #d8b4fe; }
        .loader i { font-size: 3rem; animation: spin 3s linear infinite; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" style="color: var(--text-muted); text-decoration: none; font-size: 1.2rem;"><i class="fa-solid fa-arrow-left"></i> 홈으로</a>
        
        <header style="margin-top:2rem;">
            <h1><i class="fa-solid fa-cloud-moon"></i> 무의식의 거울, 꿈 해몽기</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">간밤의 꿈은 우연이 아닙니다. 길몽인지, 당신의 스트레스인지 AI가 읽어드립니다.</p>
        </header>

        <div class="input-panel" id="inputPanel">
            <div style="text-align: right; margin-bottom: 10px;">
                <button type="button" onclick="fillRandomDream()" style="background: rgba(139, 92, 246, 0.2); border: 1px solid var(--primary); color: #d8b4fe; padding: 5px 12px; border-radius: 12px; cursor: pointer; font-size: 0.9rem; font-family: inherit; transition: 0.3s;">
                    <i class="fa-solid fa-dice"></i> 예시 꿈 채워보기
                </button>
            </div>
            <textarea id="dreamInput" placeholder="예: 이빨이 와르르 빠졌는데 피는 안 났어요... 누군가에게 쫓기는 꿈을 꿨어요. (자세히 적을수록 정확합니다)"></textarea>
            <button class="btn-analyze" onclick="analyzeDream()"><i class="fa-solid fa-wand-magic-sparkles"></i> 무의식 해독하기</button>
        </div>

        <div class="loader" id="loader">
            <i class="fa-solid fa-star-and-crescent"></i>
            <p>꿈의 잔상을 쫓는 중입니다...</p>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="card">
                <h3><i class="fa-solid fa-yin-yang"></i> 전통적 해몽 (길몽/흉몽)</h3>
                <p id="resTradition">...</p>
            </div>
            <div class="card">
                <h3><i class="fa-solid fa-brain"></i> 심리학적 무의식 분석</h3>
                <p id="resPsycho">...</p>
            </div>
            <div class="card lotto-box">
                <h3><i class="fa-solid fa-clover"></i> 우주의 기운이 담긴 추천 번호 6개</h3>
                <p id="resLotto" style="font-size: 1.3rem; font-weight: bold; letter-spacing: 5px;">...</p>
            </div>
            <div style="text-align:center; margin-top:2rem;">
                <button class="btn-analyze" onclick="location.reload()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">다시 해석하기</button>
            </div>
        </div>
    </div>

    <script>
        async function analyzeDream() {
            const dream = document.getElementById('dreamInput').value.trim();
            if(!dream) return alert('꿈 내용을 적어주세요.');

            document.getElementById('inputPanel').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            try {
                const res = await fetch('/api/dream/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dream })
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('resTradition').innerHTML = data.data.tradition;
                    document.getElementById('resPsycho').innerHTML = data.data.psycho;
                    document.getElementById('resLotto').innerHTML = data.data.lotto;
                    
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('resultPanel').style.display = 'block';
                } else {
                    throw new Error(data.error);
                }
            } catch(e) {
                alert(e.message);
                document.getElementById('inputPanel').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }

        const sampleDreams = [
            "하늘을 날고 있었는데 갑자기 투명한 바다 속으로 푹 빠졌어요. 숨쉬기가 힘들지는 않았고 주변에 엄청 큰 거북이들이 헤엄쳐 다녔습니다.",
            "화장실을 찾는데 계속 문이 잠겨있거나 너무 더러워서 볼일을 못 보고 참다가 깼어요.",
            "이빨이 흔들리더니 갑자기 입 안에서 와르르 쏟아져 내렸어요. 피는 하나도 안 났고 너무 당황해서 깼습니다.",
            "누군지 모르는 검은 그림자에게 계속 쫓기고 있었어요. 발이 안 떨어져서 도망가기 너무 힘들었어요."
        ];

        function fillRandomDream() {
            const ta = document.getElementById('dreamInput');
            const randomText = sampleDreams[Math.floor(Math.random() * sampleDreams.length)];
            ta.value = "";
            let i = 0;
            const typeWriter = setInterval(() => {
                if (i < randomText.length) {
                    ta.value += randomText.charAt(i);
                    i++;
                } else {
                    clearInterval(typeWriter);
                }
            }, 30);
        }
    </script>
</body>
</html>
