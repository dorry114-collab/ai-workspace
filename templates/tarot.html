<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 타로 상담소</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --tarot-purple: #a855f7;
            --tarot-gold: #fbbf24;
            --text-main: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nanum Myeongjo', serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(251, 191, 36, 0.1), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem; text-align: center; }

        header { margin-bottom: 2rem; animation: fadeInDown 1s ease-out; }
        h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: var(--tarot-gold); margin-bottom: 0.5rem; text-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
        p.subtitle { color: #cbd5e1; font-size: 1.1rem; line-height: 1.6; }

        .question-box {
            background: rgba(30, 41, 59, 0.6); border: 1px solid var(--tarot-purple); border-radius: 16px;
            padding: 2rem; margin-bottom: 3rem; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .question-input {
            width: 90%; max-width: 600px; padding: 1rem; font-size: 1.1rem;
            border: 1px solid rgba(251, 191, 36, 0.5); border-radius: 12px; background: rgba(0,0,0,0.4);
            color: white; font-family: 'Nanum Myeongjo', serif; outline: none; text-align: center; margin-bottom: 1.5rem; transition: all 0.3s;
        }

        .question-input:focus { border-color: var(--tarot-gold); box-shadow: 0 0 15px rgba(251, 191, 36, 0.3); }

        .draw-btn {
            background: linear-gradient(135deg, #a855f7, #7e22ce); color: white; border: 2px solid var(--tarot-gold);
            padding: 1rem 3rem; border-radius: 30px; font-size: 1.2rem; font-family: 'Nanum Myeongjo', serif; font-weight: 700;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 10px;
        }

        .draw-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 25px rgba(168, 85, 247, 0.5); }
        .draw-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .cards-container {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; margin-bottom: 3rem; display: none; animation: fadeIn 1s ease-out;
        }

        .card-wrapper { perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; padding-bottom: 150%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .card-wrapper.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid var(--tarot-gold); overflow: hidden;
        }

        .card-back {
            background: linear-gradient(135deg, #4c1d95, #1e1b4b);
            background-image: radial-gradient(circle at 50% 50%, rgba(251, 191, 36, 0.2), transparent 50%),
                              repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px);
        }
        
        .card-back i { font-size: 4rem; color: var(--tarot-gold); opacity: 0.8; filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.5)); }

        .card-front { background: linear-gradient(to bottom, #1e293b, #0f172a); transform: rotateY(180deg); padding: 1.5rem; }
        .card-front h3 { color: var(--tarot-gold); font-size: 1.2rem; margin: 0 0 1rem 0; border-bottom: 1px dashed rgba(251,191,36,0.3); padding-bottom: 0.5rem; font-family: 'Cinzel', serif; }
        .card-front p { color: #e2e8f0; font-size: 1.1rem; line-height: 1.6; margin: 0; word-break: keep-all; }

        .reading-result {
            background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(168, 85, 247, 0.4); border-radius: 20px;
            padding: 2.5rem; margin-top: 2rem; text-align: left; display: none; animation: fadeIn 1.5s ease-out; box-shadow: 0 0 40px rgba(168, 85, 247, 0.2);
        }

        .reading-result h2 { color: var(--tarot-purple); text-align: center; font-size: 2rem; margin-top: 0; margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .reading-text { color: #f8fafc; font-size: 1.15rem; line-height: 2.0; white-space: pre-wrap; }

        .loader { display: none; text-align: center; margin: 2rem 0; }
        .loader i { font-size: 3rem; color: var(--tarot-gold); animation: spin 2s linear infinite; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .cards-container { grid-template-columns: 1fr; max-width: 300px; margin: 0 auto 3rem auto;}
            h1 { font-size: 2.2rem; }
            .question-input { width: 100%; box-sizing: border-box; }
        }
    
        /* Mobile Optimization */
        @media (max-width: 600px) {
            .container, .main-container { padding: 1rem; width: 100%; max-width: 100%; box-sizing: border-box; margin: 0; border-radius: 0; border: none; min-height: 100vh; }
            .input-area, .button-group { flex-direction: column; gap: 8px; }
            .input-area input[type="text"], .input-area button, .button-group button { width: 100%; box-sizing: border-box; }
            .modal-content { width: 95%; padding: 1.5rem; margin: 0 auto; }
            header { flex-direction: column; gap: 10px; text-align: center; }
            header h1 { font-size: 1.3rem; text-align: center; }
            .nav-bar, .navbar { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            .navbar > div { width: 100%; display: flex; justify-content: space-between; margin-top: 5px; }
            .result-card, .diary-card, .chat-box { width: 100%; box-sizing: border-box; padding: 15px; }
            .msg { max-width: 100%; padding: 1rem; font-size: 1rem; }
            .status-grid { flex-direction: column; gap: 5px; }
            .choice-btn { padding: 1rem; }
            .grid-container { grid-template-columns: 1fr; }
            button { word-break: keep-all; }
            img { max-width: 100%; height: auto; }
        }
</style>
</head>
<body>

    <div class="container">
        <header>
            <div style="margin-bottom: 2rem;">
                <a href="/" style="color: var(--text-main); text-decoration: none; font-size: 1.2rem; font-family: 'Outfit', sans-serif;"><i class="fa-solid fa-arrow-left"></i> 홈으로</a>
            </div>
            <h1>The Oracle</h1>
            <p class="subtitle">모든 해답은 이미 당신 안에 있습니다.<br>마음을 비우고, 우주의 기운이 담긴 타로 카드를 통해 길을 찾아보세요.</p>
        </header>

        <div class="question-box">
            <input type="text" id="questionInput" class="question-input" placeholder="어떤 고민이 있으신가요? (예: 올해 이직해도 될까요?)" autocomplete="off">
            <br>
            <button class="draw-btn" id="drawBtn" onclick="drawCards()">
                <i class="fa-solid fa-sparkles"></i> 운명의 카드 3장 뽑기
            </button>
        </div>

        <div class="loader" id="loader">
            <i class="fa-solid fa-sun"></i>
            <p style="color: var(--tarot-gold); margin-top: 15px;">운명의 흐름을 읽는 중입니다...</p>
        </div>

        <div class="cards-container" id="cardsContainer">
            <div class="card-wrapper" id="card1" onclick="flipCard(1)">
                <div class="card-inner">
                    <div class="card-face card-back"><i class="fa-solid fa-moon"></i></div>
                    <div class="card-face card-front" style="border-color: #60a5fa;">
                        <h3>[ 과거의 투영 ]</h3>
                        <p id="cardName1">...</p>
                    </div>
                </div>
            </div>

            <div class="card-wrapper" id="card2" onclick="flipCard(2)">
                <div class="card-inner">
                    <div class="card-face card-back"><i class="fa-solid fa-star"></i></div>
                    <div class="card-face card-front" style="border-color: #34d399;">
                        <h3>[ 현재의 직면 ]</h3>
                        <p id="cardName2">...</p>
                    </div>
                </div>
            </div>

            <div class="card-wrapper" id="card3" onclick="flipCard(3)">
                <div class="card-inner">
                    <div class="card-face card-back"><i class="fa-solid fa-sun"></i></div>
                    <div class="card-face card-front" style="border-color: #f472b6;">
                        <h3>[ 미래의 계시 ]</h3>
                        <p id="cardName3">...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="reading-result" id="readingResult">
            <div id="captureAreaTarot" style="background: var(--bg-dark); padding: 20px; border-radius: 12px; margin-bottom: 2rem;">
                <h2><i class="fa-solid fa-crystal-ball"></i> 신탁의 해설</h2>
                <div class="reading-text" id="readingText"></div>
            </div>
            
            <div style="text-align: center; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">
                <button class="draw-btn" onclick="captureAndDownloadTarot()" style="font-size: 1rem; padding: 0.8rem 1.5rem; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: white;">
                    <i class="fa-solid fa-camera"></i> 이미지로 캡처
                </button>
                <button class="draw-btn" onclick="saveToArchiveTarot()" style="font-size: 1rem; padding: 0.8rem 1.5rem; background: rgba(251, 191, 36, 0.1); border-color: var(--tarot-gold); color: var(--tarot-gold);">
                    <i class="fa-solid fa-star"></i> 보관함에 저장
                </button>
                <button class="draw-btn" onclick="location.reload()" style="font-size: 1rem; padding: 0.8rem 1.5rem;">
                    <i class="fa-solid fa-rotate-right"></i> 새로운 질문하기
                </button>
            </div>
        </div>
    </div>

    <script>
        let flippedCount = 0;
        let aiFullReading = "";

        async function drawCards() {
            const q = document.getElementById('questionInput').value.trim();
            if(!q) {
                alert("고민을 먼저 입력해주세요!");
                return;
            }

            document.getElementById('drawBtn').disabled = true;
            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch('/api/tarot/draw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: q })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('cardName1').textContent = data.cards[0];
                    document.getElementById('cardName2').textContent = data.cards[1];
                    document.getElementById('cardName3').textContent = data.cards[2];
                    aiFullReading = data.reading;

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('cardsContainer').style.display = 'grid';
                    document.querySelector('.question-box').style.display = 'none';
                    
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    throw new Error(data.error);
                }
            } catch(e) {
                alert('해석 중 에러가 발생했습니다: ' + e.message);
                document.getElementById('drawBtn').disabled = false;
                document.getElementById('loader').style.display = 'none';
            }
        }

        function flipCard(id) {
            const el = document.getElementById('card' + id);
            if (!el.classList.contains('flipped')) {
                el.classList.add('flipped');
                flippedCount++;
                
                if (flippedCount === 3) {
                    setTimeout(() => {
                        const rr = document.getElementById('readingResult');
                        rr.style.display = 'block';
                        document.getElementById('readingText').textContent = aiFullReading;
                        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                    }, 1000);
                }
            }
        }

        function saveToArchiveTarot() {
            if(!aiFullReading) return alert("저장할 신탁이 없습니다.");
            let archive = JSON.parse(localStorage.getItem('antigravity_archive') || '[]');
            
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            
            archive.push({
                type: 'tarot',
                title: `나의 타로 상담 결과`,
                date: dateStr,
                data: aiFullReading
            });
            localStorage.setItem('antigravity_archive', JSON.stringify(archive));
            alert("보관함에 성공적으로 저장되었습니다!");
        }

        async function captureAndDownloadTarot() {
            const captureArea = document.getElementById('captureAreaTarot');
            try {
                const canvas = await html2canvas(captureArea, {
                    backgroundColor: '#1a1a2e',
                    scale: 2
                });
                const link = document.createElement('a');
                link.download = 'AI타로결과.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (err) {
                alert("캡처 중 오류가 발생했습니다: " + err.message);
            }
        }
    </script>
</body>
</html>
