<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 인터랙티브 소설 (TRPG)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --primary: #d946ef;
            --primary-hover: #c026d3;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --novel-bg: #ffffff;
            --novel-text: #24292f;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .navbar {
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 600;
        }
        .navbar a:hover { color: #fff; }
        .title { font-weight: 700; color: var(--primary); font-size: 1.2rem; }

        /* Main Layout */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            padding: 1rem;
            box-sizing: border-box;
            min-height: 0;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 8px; }
        .chat-area::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        /* Message Bubbles */
        .msg {
            max-width: 90%;
            padding: 1.5rem;
            border-radius: 12px;
            line-height: 1.8;
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1.1rem;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

        .msg-ai {
            background: rgba(217, 70, 239, 0.05);
            border-left: 4px solid var(--primary);
            align-self: flex-start;
            color: #f0f6fc;
        }
        .msg-ai strong { color: var(--primary); }
        .msg-ai em { color: #aaa; font-style: italic; }

        .msg-user {
            background: #1f2428;
            border-right: 4px solid #3b82f6;
            align-self: flex-end;
            text-align: right;
            color: #8ab4f8;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
        }

        /* Input Widget */
        .input-area {
            display: flex;
            gap: 1rem;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1rem;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            outline: none;
        }

        .input-area button {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.8rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:hover { background: var(--primary-hover); transform: scale(1.05); }
        .input-area button:disabled { background: #555; cursor: not-allowed; transform: none; }

        /* Setup Modal */
        #setupModal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
        }
        .modal-content h2 { margin-top: 0; color: var(--primary); margin-bottom: 1.5rem; }
        .setup-group { text-align: left; margin-bottom: 1.5rem; }
        .setup-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .setup-group input { 
            width: 100%; box-sizing: border-box; 
            padding: 0.8rem; border-radius: 8px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-color); 
            color: #fff; outline: none; font-size: 1rem;
        }
        .setup-group input:focus { border-color: var(--primary); }
        .preset-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.8rem; }
        .preset-tag { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 0.3rem 0.8rem; border-radius: 15px; font-size: 0.85rem; color: var(--text-muted);
            cursor: pointer; transition: 0.2s;
        }
        .preset-tag:hover { background: rgba(217, 70, 239, 0.1); border-color: var(--primary); color: #fff; }
        .btn-start {
            background: var(--primary); color: #fff; border:none; padding: 1rem; width: 100%;
            border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s;
        }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(217, 70, 239, 0.4); }

        /* Loading */
        .typing-indicator { display: none; align-items: center; gap: 5px; padding: 1rem; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Export Modal (The Book) */
        #bookModal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: white; color: black; z-index: 2000;
            display: none; flex-direction: column;
            overflow-y: auto; padding: 4rem 2rem;
            font-family: 'Nanum Myeongjo', serif;
        }
        .book-content { max-width: 700px; margin: 0 auto; line-height: 2.0; font-size: 1.15rem; }
        .book-content h1 { text-align: center; margin-bottom: 3rem; font-family: 'Outfit', sans-serif; }
        .book-content p { margin-bottom: 1.5rem; text-indent: 10px; }
        .close-book { position: fixed; top: 20px; right: 20px; background: #000; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-family: 'Outfit', sans-serif; }
        
        /* Interactive Choice Buttons */
        .choices-wrapper {
            margin-top: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }
        
        .choice-btn {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 2px solid rgba(217, 70, 239, 0.3);
            color: #fff;
            padding: 1.5rem 1.2rem;
            border-radius: 16px;
            text-align: center;
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1.15rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .choice-btn i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 5px;
            transition: transform 0.3s;
        }
        .choice-btn:hover {
            background: linear-gradient(145deg, rgba(217, 70, 239, 0.2), rgba(192, 38, 211, 0.1));
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(217, 70, 239, 0.4);
        }
        .choice-btn:hover i {
            transform: scale(1.2);
        }
        
        /* Mobile UI Optimization */
        @media (max-width: 600px) {
            .choices-wrapper { list-style: column; grid-template-columns: 1fr; }

            .navbar { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            .navbar > div { width: 100%; display: flex; justify-content: space-between; margin-top: 10px; }
            .msg { max-width: 100%; padding: 1rem; font-size: 1rem; }
            .modal-content { padding: 1.5rem; width: 95%; }
            .main-container { padding: 0.5rem; }
            .chat-area { padding: 0.5rem; gap: 1rem; }
            .input-area { flex-direction: column; gap: 0.5rem; padding: 0.8rem; border-radius: 12px; margin-top: 5px; }
            .input-area input { padding: 0.5rem; font-size: 1rem; text-align: center; }
            .input-area button { padding: 0.8rem; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div>
            <a href="/"><i class="fa-solid fa-arrow-left"></i> 홈</a>
            <a href="#" onclick="resetGame()" style="margin-left: 15px; color:#ef4444;"><i class="fa-solid fa-rotate-right"></i> 새게임</a>
        </div>
        <div class="title"><i class="fa-solid fa-book-journal-whills"></i> 무한의 AI 소설</div>
        <div>
            <a href="#" onclick="renameWord()" style="color:#8b5cf6; margin-right:15px;" title="이름/명사 강제 변경"><i class="fa-solid fa-pen-to-square"></i> 단어변경</a>
            <a href="#" onclick="exportBook()" style="color:var(--primary);" title="소설책으로 만들기"><i class="fa-solid fa-book-open"></i> 출판</a>
        </div>
    </nav>

    <!-- Setup Modal -->
    <div id="setupModal">
        <div class="modal-content">
            <h2>나만의 서사 만들기</h2>
            <div class="setup-group">
                <label>어떤 장르의 소설인가요?</label>
                <div class="preset-tags">
                    <span class="preset-tag" onclick="setPreset('setupGenre', '정통 판타지')">정통 판타지</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '사이버펑크')">사이버펑크</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '현대 스릴러')">현대 스릴러</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '포스트 아포칼립스')">포스트 아포칼립스</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '정통 무협')">정통 무협</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '로맨스 판타지')">로맨스 판타지</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '우주 SF')">우주 SF</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '크툴루 호러')">크툴루 호러</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '학교 괴담/미스터리')">학교 괴담/미스터리</span>
                    <span class="preset-tag" onclick="setPreset('setupGenre', '대체 역사')">대체 역사</span>
                </div>
                <input type="text" id="setupGenre" placeholder="직접 입력 (예: 좀비 아포칼립스)" value="정통 판타지">
            </div>
            <div class="setup-group">
                <label>당신(주인공)의 캐릭터는?</label>
                <div class="preset-tags">
                    <span class="preset-tag" onclick="setPreset('setupChar', '가난한 용병')">가난한 용병</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '천재 해커')">천재 해커</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '기억을 잃은 마법사')">기억을 잃은 마법사</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '재벌 3세 형사')">재벌 3세 형사</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '은퇴한 우주비행사')">은퇴한 우주비행사</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '빙의한 평민 소녀')">빙의한 평민 소녀</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '저주받은 검사')">저주받은 검사</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '비리 정치인')">비리 정치인</span>
                    <span class="preset-tag" onclick="setPreset('setupChar', '안드로이드')">안드로이드</span>
                </div>
                <input type="text" id="setupChar" placeholder="직접 입력 (예: 은퇴한 암살자)" value="평범한 시골 검사">
            </div>
            <div class="setup-group">
                <label>이 소설의 최종 목표나 시작 배경은?</label>
                <div class="preset-tags">
                    <span class="preset-tag" onclick="setPreset('setupGoal', '마왕 타도')">마왕 타도</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '행방불명된 동생 찾기')">동생 찾기</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '거대 기업의 음모 파헤치기')">기업의 음모</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '좀비 떼로부터 생존하기')">좀비 생존</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '과거로 돌아가 역사 바꾸기')">역사 개변</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '살인 사건의 진범 찾기')">살인마 추적</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '외계 행성에서 탈출하기')">외계 탈출</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '무림 맹주가 되기')">무림 제패</span>
                    <span class="preset-tag" onclick="setPreset('setupGoal', '시한부 인생의 마지막 소원 성취')">버킷리스트</span>
                </div>
                <input type="text" id="setupGoal" placeholder="직접 입력 (예: 숨겨진 보물을 찾는다)" value="세상을 멸망시키려는 마왕을 물리쳐야 한다">
            </div>
            <button class="btn-start" onclick="startGame()">세계 생성하기</button>
        </div>
    </div>

    <!-- Export Book Modal -->
    <div id="bookModal">
        <button class="close-book" onclick="document.getElementById('bookModal').style.display='none'">닫기</button>
        <div class="book-content" id="bookHtml">
            <!-- Book content rendered here -->
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="main-container">
        <div class="chat-area" id="chatbox">
            <!-- Messages go here -->
            <div class="typing-indicator" id="typing">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <span style="color:var(--text-muted);font-size:0.9rem;margin-left:10px;">마스터가 다음 이야기를 구상 중입니다...</span>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="당신의 행동을 묘사하거나 대답하세요. (예: 문을 벌컥 열어젖힌다)" onkeypress="if(event.key==='Enter') sendTurn()">
            <button id="sendBtn" onclick="sendTurn()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let messageHistory = [];
        let storyTurns = 0;

        function setPreset(inputId, value) {
            document.getElementById(inputId).value = value;
        }

        function appendMessage(role, content) {
            let chatbox = document.getElementById('chatbox');
            let typingIndicator = document.getElementById('typing');
            
            let div = document.createElement('div');
            div.className = role === 'user' ? 'msg msg-user' : 'msg msg-ai';
            
            if (role === 'ai') {
                // 파싱: [선택 A] 등 객관식 텍스트를 추출하여 버튼으로 변환
                let choices = [];
                // 매치 패턴: [선택 1], **[선택 A]**, [선택 B]: 등 알파벳과 숫자 모두 유연하게 포착
                let cleanContent = content.replace(/(?:\*\*)?\[선택\s*[A-Z0-9가-힣]+\](?:\*\*)?\s*:?\s*(.*)/gi, (match, choiceText) => {
                    let text = choiceText.trim().replace(/[*_]/g, '');
                    if(text) choices.push(text);
                    return ''; // 원본 텍스트에서는 숨김
                });
                
                div.innerHTML = marked.parse(cleanContent.trim());
                
                // 선택지 버튼들 동적 추가 (그래 결심했어 스타일!)
                if (choices.length > 0) {
                    let choicesContainer = document.createElement('div');
                    choicesContainer.className = 'choices-wrapper';
                    
                    choices.forEach((choiceText, idx) => {
                        let btn = document.createElement('button');
                        btn.className = 'choice-btn';
                        let icon = idx === 0 ? 'fa-check-circle' : 'fa-times-circle'; // A/B 느낌
                        let color = idx === 0 ? '#10b981' : '#f43f5e';
                        
                        btn.innerHTML = `<i class="fa-solid ${icon}" style="color:${color};"></i> <span>${choiceText}</span>`;
                        btn.onclick = () => {
                            document.getElementById('userInput').value = choiceText;
                            sendTurn();
                        };
                        choicesContainer.appendChild(btn);
                    });
                    
                    div.appendChild(choicesContainer);
                }
            } else {
                div.textContent = content;
            }

            chatbox.insertBefore(div, typingIndicator);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        async function startGame() {
            let genre = document.getElementById('setupGenre').value.trim() || '소설';
            let char = document.getElementById('setupChar').value.trim() || '주인공';
            let goal = document.getElementById('setupGoal').value.trim() || '모험';

            document.getElementById('setupModal').style.display = 'none';

            let firstPrompt = `[설정 시작] 이 소설의 장르는 '${genre}'입니다. 주인공은 '${char}'이며, 주요 상황/목표는 '${goal}'입니다. 
당신은 이 세계의 마스터입니다. 흥미진진한 프롤로그(1막)를 묘사해주시고, 마지막에 주인공이 어떤 행동을 취할 것인지 물어봐주세요.`;
            
            // System prompt injection handled in backend
            messageHistory.push({"role": "user", "content": firstPrompt});
            await fetchAI();
        }

        async function sendTurn() {
            let inputTag = document.getElementById('userInput');
            let btn = document.getElementById('sendBtn');
            let text = inputTag.value.trim();
            if(!text) return;

            inputTag.value = '';
            inputTag.disabled = true;
            btn.disabled = true;

            appendMessage('user', text);
            messageHistory.push({"role": "user", "content": text});
            
            storyTurns++;

            await fetchAI();

            inputTag.disabled = false;
            btn.disabled = false;
            inputTag.focus();
        }

        async function fetchAI() {
            let typingIndicator = document.getElementById('typing');
            typingIndicator.style.display = 'flex';
            document.getElementById('chatbox').scrollTop = document.getElementById('chatbox').scrollHeight;

            try {
                let res = await fetch('/api/novel/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: messageHistory})
                });
                let data = await res.json();
                
                typingIndicator.style.display = 'none';

                if(data.success) {
                    let aiReply = data.reply;
                    messageHistory.push({"role": "assistant", "content": aiReply});
                    appendMessage('ai', aiReply);
                    saveLocalHistory();
                } else {
                    alert('마스터 오류: ' + data.error);
                    messageHistory.pop(); // Revert user message on fail
                    saveLocalHistory();
                }
            } catch(e) {
                typingIndicator.style.display = 'none';
                messageHistory.pop();
                saveLocalHistory();
                alert('통신 오류가 발생했습니다.');
            }
        }

        function exportBook() {
            if(messageHistory.length < 2) {
                return alert("아직 소설이 충분히 진행되지 않았습니다.");
            }

            let title = document.getElementById('setupGenre').value + "의 기억";
            let html = `<h1>${title}</h1>`;
            
            messageHistory.forEach((msg, index) => {
                if(msg.role === 'assistant') {
                    html += marked.parse(msg.content);
                    html += `<hr style="border:none; border-bottom:1px dashed #ccc; margin: 2rem 0;">`;
                } else if(msg.role === 'user' && index > 0) { // skip first setup prompt
                    html += `<p style="text-align:right; font-weight:bold; color:#555;">> ${msg.content}</p>`;
                }
            });

            document.getElementById('bookHtml').innerHTML = html;
            document.getElementById('bookModal').style.display = 'flex';
        }

        function renameWord() {
            if (messageHistory.length === 0) return alert("아직 소설이 시작되지 않았습니다.");
            let oldWord = prompt("소설 전체에서 수정하고 싶은 단어(또는 이름)를 입력하세요.\n(예: 에린)");
            if (!oldWord) return;
            let newWord = prompt("'" + oldWord + "'를 어떤 단어로 바꾸시겠습니까?\n(예: 철수)");
            if (!newWord) return;
            
            let count = 0;
            let regex = new RegExp(oldWord, "g");
            for (let i = 0; i < messageHistory.length; i++) {
                let current = messageHistory[i].content;
                let replaced = current.replace(regex, newWord);
                if (current !== replaced) {
                    messageHistory[i].content = replaced;
                    count++;
                }
            }
            if (count > 0) {
                // Re-render chatbox completely
                let chatbox = document.getElementById('chatbox');
                let typingIndicator = document.getElementById('typing');
                chatbox.innerHTML = '';
                
                messageHistory.forEach((msg, idx) => {
                    if(idx === 0 && msg.role === 'user') return; // skip system setup message visual
                    appendMessage(msg.role === 'assistant' ? 'ai' : msg.role, msg.content);
                });
                chatbox.appendChild(typingIndicator);
                chatbox.scrollTop = chatbox.scrollHeight;
                saveLocalHistory();
                alert(`성공적으로 '${oldWord}'(을)를 '${newWord}'(으)로 모두 변경했습니다!`);
            } else {
                alert("해당 단어를 찾을 수 없습니다.");
            }
        }

        // --- Local Storage Management ---
        function saveLocalHistory() {
            localStorage.setItem('trpg_history', JSON.stringify(messageHistory));
        }

        function restoreLocalHistory() {
            let saved = localStorage.getItem('trpg_history');
            if (saved) {
                try {
                    let parsed = JSON.parse(saved);
                    if (parsed && parsed.length > 0) {
                        messageHistory = parsed;
                        document.getElementById('setupModal').style.display = 'none';
                        
                        let typingIndicator = document.getElementById('typing');
                        
                        messageHistory.forEach((msg, idx) => {
                            if (idx === 0 && msg.role === 'system') return; // Backwards compatible check
                            if (idx === 0 && msg.role === 'user' && msg.content.startsWith('[설정 시작]')) return;
                            appendMessage(msg.role === 'assistant' ? 'ai' : msg.role, msg.content);
                        });
                        
                        document.getElementById('chatbox').appendChild(typingIndicator);
                        document.getElementById('chatbox').scrollTop = document.getElementById('chatbox').scrollHeight;
                    }
                } catch(e) {
                    console.error("Local storage load failed", e);
                }
            }
        }

        function resetGame() {
            if (confirm("정말 현재 소설을 초기화하고 새 게임을 시작하시겠습니까?")) {
                localStorage.removeItem('trpg_history');
                location.reload();
            }
        }

        window.onload = restoreLocalHistory;
    </script>
</body>
</html>
