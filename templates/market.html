<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 주식 시장 트렌드 스캐너</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Markdown Parser (marked.js) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: rgba(22, 27, 34, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.4);
            --secondary: #ff0055;
            --secondary-glow: rgba(255, 0, 85, 0.4);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --positive: #00ff88;
            --negative: #ff0055;
            --gold: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: 80px;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 i {
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-action {
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            transform: translateY(-1px);
        }

        .btn-refresh {
            background: linear-gradient(135deg, #00f0ff, #0088ff);
            color: #000;
            border: none;
        }

        .btn-refresh:hover {
            background: linear-gradient(135deg, #0088ff, #00f0ff);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            align-items: start;
        }

        /* Leaderboard */
        .leaderboard-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary);
        }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .stock-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .stock-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .rank-badge {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-right: 15px;
            color: var(--text-muted);
        }

        .rank-1 { background: rgba(255, 215, 0, 0.2); color: var(--gold); border: 1px solid rgba(255, 215, 0, 0.4); }
        .rank-2 { background: rgba(192, 192, 192, 0.2); color: #c0c0c0; border: 1px solid rgba(192, 192, 192, 0.4); }
        .rank-3 { background: rgba(205, 127, 50, 0.2); color: #cd7f32; border: 1px solid rgba(205, 127, 50, 0.4); }

        .stock-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stock-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stock-code {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .stock-metrics {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            align-items: center;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .metric-label {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .positive { color: var(--positive); }
        .negative { color: var(--negative); }

        .btn-analyze {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn-analyze:hover {
            background: rgba(0, 240, 255, 0.1);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* AI Report */
        .ai-report-container {
            background: linear-gradient(180deg, rgba(22, 27, 34, 0.8), rgba(11, 14, 20, 0.9));
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 2px solid var(--primary);
        }

        .ai-report-content {
            margin-top: 1rem;
            color: #e6edf3;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .ai-report-content h1, .ai-report-content h2, .ai-report-content h3 {
            color: var(--primary);
            margin: 1.5rem 0 0.8rem 0;
            font-size: 1.1rem;
        }
        
        .ai-report-content p {
            margin-bottom: 1rem;
        }

        .ai-report-content strong {
            color: #fff;
            background: rgba(255,255,255,0.1);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* Loading Spinner */
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
        }

        .spinner {
            font-size: 3rem;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }

        .loader-text {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 500;
            text-shadow: 0 0 10px rgba(0,240,255,0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 70px;
            background: rgba(11, 14, 20, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
        .nav-item {
            text-decoration: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
            gap: 5px;
            transition: 0.2s;
            width: 25%;
        }
        .nav-item i { font-size: 1.5rem; }
        .nav-item.active, .nav-item:hover { color: var(--primary); }

        @media (max-width: 992px) {
            main {
                grid-template-columns: 1fr;
            }
            .ai-report-container {
                position: relative;
                top: 0;
            }
        }
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                padding: 1rem;
            }
            h1 {
                font-size: 1.2rem;
            }
            .header-actions {
                width: 100%;
                justify-content: space-between;
            }
            .stock-card {
                padding: 1rem;
            }
            .stock-metrics {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
            .btn-analyze {
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            .rank-badge {
                width: 25px;
                height: 25px;
                font-size: 0.9rem;
                margin-right: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="/" style="color: #8b949e; font-size: 1.2rem; text-decoration: none; transition: color 0.3s;"><i class="fa-solid fa-house"></i></a>
            <h1><i class="fa-solid fa-fire-flame-curved"></i> AI 주식 시장 트렌드 스캐너</h1>
        </div>
        <div class="header-actions">
            <a href="/stock" class="btn-action"><i class="fa-solid fa-magnifying-glass-chart"></i> 개별 종목 분석</a>
            <button class="btn-action btn-refresh" onclick="fetchMarketTrend()"><i class="fa-solid fa-rotate-right"></i> 최신화</button>
        </div>
    </header>

    <main>
        <div class="leaderboard-container">
            <div class="section-title">
                <i class="fa-solid fa-ranking-star"></i> 오늘자 거래대금 TOP 10
            </div>
            <div class="stock-list" id="stockList">
                <!-- Stocks will be injected here -->
            </div>
        </div>

        <div class="ai-report-container">
            <div class="section-title" style="color: var(--primary); margin-bottom: 0.5rem;">
                <i class="fa-solid fa-brain"></i> AI 시장 인사이트
            </div>
            <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">
                * 거래대금 상위 10종목의 테마와 자금 흐름을 종합 분석한 리포트입니다.
            </div>
            <div class="ai-report-content" id="aiReport">
                <!-- AI Report will be injected here -->
                <div style="color: var(--text-muted); font-style: italic;">좌측 [최신화] 버튼을 눌러 스캔을 시작하세요.</div>
            </div>
        </div>
    </main>

    <div class="loader-overlay" id="loader">
        <i class="fa-solid fa-circle-notch spinner"></i>
        <div class="loader-text">전 종목 거래대금 스캔 및 AI 분석 중...</div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <a href="/" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>홈</span>
        </a>
        <a href="/stock" class="nav-item">
            <i class="fa-solid fa-chart-line"></i>
            <span>종목분석</span>
        </a>
        <a href="/market" class="nav-item active">
            <i class="fa-solid fa-fire"></i>
            <span>트렌드</span>
        </a>
        <a href="/diary" class="nav-item">
            <i class="fa-solid fa-book"></i>
            <span>다이어리</span>
        </a>
    </div>

    <script>
        const formatMoney = (val) => {
            if (val >= 1000000000000) {
                return (val / 1000000000000).toFixed(1) + '조';
            } else if (val >= 100000000) {
                return (val / 100000000).toFixed(0) + '억';
            }
            return new Intl.NumberFormat('ko-KR').format(val);
        };

        const formatPrice = (val) => new Intl.NumberFormat('ko-KR').format(val) + '원';

        async function fetchMarketTrend() {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('stockList').innerHTML = '';
            document.getElementById('aiReport').innerHTML = '<div style="color: var(--text-muted); font-style: italic;">분석 중...</div>';
            
            try {
                const response = await fetch('/api/stock/market_trend');
                const data = await response.json();
                
                if (!data.success) {
                    alert("데이터를 가져오는 중 오류가 발생했습니다: " + data.error);
                    return;
                }
                
                // 1. Render Stocks
                const listEl = document.getElementById('stockList');
                data.top_stocks.forEach((s, idx) => {
                    const rank = idx + 1;
                    let rankClass = '';
                    if (rank === 1) rankClass = 'rank-1';
                    else if (rank === 2) rankClass = 'rank-2';
                    else if (rank === 3) rankClass = 'rank-3';

                    const isUp = s.changes_ratio > 0;
                    const isDown = s.changes_ratio < 0;
                    let colorClass = '';
                    let iconHtml = '';
                    
                    if (isUp) {
                        colorClass = 'positive';
                        iconHtml = '<i class="fa-solid fa-caret-up"></i>';
                    } else if (isDown) {
                        colorClass = 'negative';
                        iconHtml = '<i class="fa-solid fa-caret-down"></i>';
                    } else {
                        colorClass = 'text-muted';
                        iconHtml = '-';
                    }
                    
                    let aiBadge = '';
                    let aiPricePanel = '';
                    
                    if (data.ai_report && data.ai_report.stock_analysis) {
                        const aiStock = data.ai_report.stock_analysis.find(x => x.code === s.code || x.code === s.code.replace('.KS', '').replace('.KQ', ''));
                        if (aiStock) {
                            let recIcon = '🤖';
                            if (aiStock.recommendation.includes('적극')) recIcon = '🔥';
                            else if (aiStock.recommendation.includes('매수')) recIcon = '🟢';
                            else if (aiStock.recommendation.includes('관망')) recIcon = '🟡';
                            else if (aiStock.recommendation.includes('매도')) recIcon = '🔴';
                            
                            aiBadge = `<div style="display:inline-block; margin-left: 8px; font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); white-space: nowrap;">${recIcon} ${aiStock.recommendation}</div>`;
                            
                            aiPricePanel = `
                            <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px; border-left: 3px solid var(--primary);">
                                <div style="display: flex; flex-wrap: wrap; gap: 15px; font-size: 0.9rem;">
                                    <div style="white-space: nowrap;"><span style="color:var(--text-muted);">🎯 목표가:</span> <span style="font-weight:700; color:var(--primary); font-size: 1rem;">${formatPrice(aiStock.target_price)}</span></div>
                                    <div style="white-space: nowrap;"><span style="color:var(--text-muted);">🛡️ 손절가:</span> <span style="font-weight:700; color:var(--secondary); font-size: 1rem;">${formatPrice(aiStock.stop_loss)}</span></div>
                                </div>
                                <div style="font-size: 0.85rem; color: #b0c4de; font-style: italic; line-height: 1.4; word-break: keep-all;">
                                    <i class="fa-solid fa-comment-dots" style="color: var(--primary);"></i> ${aiStock.reason}
                                </div>
                            </div>
                            `;
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'stock-card';
                    card.style.flexDirection = 'column';
                    card.style.alignItems = 'stretch';
                    card.innerHTML = `
                        <div style="display: flex; align-items: flex-start; justify-content: space-between; width: 100%; gap: 10px;">
                            <div style="display: flex; align-items: flex-start; flex: 1; min-width: 0;">
                                <div class="rank-badge ${rankClass}" style="flex-shrink: 0;">${rank}</div>
                                <div class="stock-info" style="min-width: 0; word-break: keep-all;">
                                    <div class="stock-name" style="flex-wrap: wrap; line-height: 1.3;">
                                        <span>${s.name}</span> <span class="stock-code" style="white-space: nowrap;">${s.code}</span> ${aiBadge}
                                    </div>
                                    <div class="stock-metrics" style="margin-top: 4px;">
                                        <div class="metric ${colorClass}" style="font-weight: 600; white-space: nowrap;">
                                            ${formatPrice(s.close)} (${iconHtml} ${Math.abs(s.changes_ratio).toFixed(2)}%)
                                        </div>
                                        <div class="metric" style="white-space: nowrap;">
                                            <span class="metric-label">거래대금:</span> <span style="color:#ffd700; font-weight:500;">${formatMoney(s.amount)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <a href="/stock?ticker=${encodeURIComponent(s.name)}" class="btn-analyze" style="flex-shrink: 0; white-space: nowrap;">
                                <i class="fa-solid fa-chart-pie"></i> 차트 보기
                            </a>
                        </div>
                        ${aiPricePanel}
                    `;
                    listEl.appendChild(card);
                });

                // 2. Render AI Report
                if (data.ai_report && data.ai_report.overall_summary) {
                    document.getElementById('aiReport').innerHTML = marked.parse(data.ai_report.overall_summary);
                } else {
                    document.getElementById('aiReport').innerHTML = '<div style="color: var(--negative);">AI 리포트를 생성하지 못했습니다. (API Key 확인 필요 또는 JSON 형식 오류)</div>';
                }

            } catch (err) {
                console.error(err);
                alert("네트워크 오류가 발생했습니다.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        // Auto load on init
        window.addEventListener('DOMContentLoaded', fetchMarketTrend);
    </script>
</body>
</html>
