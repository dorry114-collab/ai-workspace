<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 영어 공부 튜터</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f0fdf4; /* 듀오링고 스타일의 밝은 초록 배경 */
            --panel-bg: #ffffff;
            --border-color: #e5e7eb;
            --primary: #22c55e;
            --primary-hover: #16a34a;
            --secondary: #eab308;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --error-color: #ef4444;
            --ai-bubble: #f3f4f6;
            --user-bubble: #dcfce7;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', 'Outfit', sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* Navbar */
        .navbar {
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 2px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        .navbar a, .navbar button {
            color: var(--text-muted);
            text-decoration: none; font-weight: 600; font-size: 1rem;
            background: none; border: none; cursor: pointer; transition: 0.2s;
        }
        .navbar a:hover, .navbar button:hover { color: var(--primary); }
        .title { font-weight: 700; color: var(--primary); font-size: 1.3rem; }

        /* Layout */
        .main-container {
            flex: 1; display: flex; flex-direction: column;
            max-width: 800px; margin: 0 auto; width: 100%;
            padding: 1rem; box-sizing: border-box; min-height: 0;
        }

        .chat-area {
            flex: 1; overflow-y: auto; padding: 1rem;
            display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 8px; }
        .chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        /* Bubbles */
        .msg {
            max-width: 85%; padding: 1.2rem;
            border-radius: 20px; line-height: 1.6;
            font-size: 1.1rem; position: relative;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

        .msg-ai {
            background: var(--ai-bubble);
            border-bottom-left-radius: 4px; border: 1px solid var(--border-color);
            align-self: flex-start; color: var(--text-main);
        }
        .translation {
            display: block; font-size: 0.9rem; color: var(--text-muted);
            margin-top: 8px; border-top: 1px dashed #d1d5db; padding-top: 8px;
            filter: blur(4.5px); cursor: pointer; transition: filter 0.3s ease;
            user-select: none;
        }
        .translation:hover { filter: blur(3px); }
        .translation.revealed { filter: blur(0); cursor: text; user-select: auto; }
        .correction-box {
            background: #fee2e2; border-left: 4px solid var(--error-color);
            padding: 1rem; margin-top: 10px; border-radius: 8px;
            font-size: 0.95rem; color: #991b1b;
        }

        .preset-grid {
            display: grid; grid-template-columns: 1fr; gap: 10px;
            margin-bottom: 20px;
        }
        .preset-btn {
            background: #fff; border: 2px solid #e5e7eb; border-radius: 12px;
            padding: 12px; cursor: pointer; text-align: left; font-weight: bold;
            transition: all 0.2s; font-size: 1rem; color: #4b5563;
        }
        .preset-btn:hover { border-color: #d1d5db; background: #f9fafb; }
        .preset-btn.active { border-color: var(--primary); background: #f0fdf4; color: var(--primary); }
        
        .diff-grid { display: flex; gap: 8px; justify-content: space-between; margin-bottom: 20px; }
        .diff-btn { 
            flex:1; background: #fff; border: 2px solid #e5e7eb; border-radius: 12px;
            padding: 10px 0; cursor: pointer; text-align: center; font-weight: bold; font-size: 1rem; color: #4b5563; transition: all 0.2s;
        }
        .diff-btn small { display: block; font-size: 0.75rem; font-weight: normal; color: #6b7280; margin-top:3px; }
        .diff-btn:hover { border-color: #d1d5db; }
        .diff-btn.active { border-color: var(--primary); background: #f0fdf4; color: var(--primary); }
        .diff-btn.active small { color: var(--primary); }

        .custom-input {
            width: 100%; box-sizing: border-box; padding: 1rem; border-radius: 12px;
            border: 2px solid var(--border-color); outline: none; font-size: 1rem; margin-bottom: 2rem;
        }
        .custom-input:focus { border-color: var(--primary); }

        .emotion-avatar {
            font-size: 2.2rem; background: #fff; border-radius: 50%;
            height: 45px; width: 45px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border-color);
            flex-shrink: 0; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .xp-bar-container {
            background: var(--panel-bg); padding: 12px 20px; border-bottom: 1px solid var(--border-color);
            display: flex; flex-direction: column; gap: 5px;
        }
        .xp-track { height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; width:100%;}
        .xp-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .floating-xp {
            position: absolute; color: var(--primary); font-weight: bold; font-size: 1.2rem;
            animation: floatUp 1.5s ease-out forwards; pointer-events: none; z-index: 100;
        }
        @keyframes floatUp { 0%{opacity:1; transform:translateY(0);} 100%{opacity:0; transform:translateY(-30px);} }
        @keyframes popIn { 0%{transform:scale(0);} 100%{transform:scale(1);} }

        .msg-user {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            align-self: flex-end; text-align: left;
            color: #166534; font-weight: 500;
        }

        /* Input Widget */
        .input-area {
            display: flex; gap: 0.8rem;
            background: var(--panel-bg); border: 2px solid var(--border-color);
            padding: 0.8rem; border-radius: 24px; margin-top: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .input-area input {
            flex: 1; background: transparent; border: none;
            color: var(--text-main); font-family: inherit; font-size: 1.1rem;
            outline: none; padding: 0.5rem;
        }
        .input-area button {
            background: var(--primary); color: #fff;
            border: none; border-radius: 18px; padding: 0.8rem 1.5rem;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .input-area button:hover:not(:disabled) { background: var(--primary-hover); transform: scale(1.05); }
        .input-area button:disabled { background: #9ca3af; cursor: not-allowed; }

        /* Choice Buttons */
        .options-container { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn {
            background: #fff; border: 2px solid var(--primary); color: var(--primary);
            padding: 1rem; border-radius: 12px; font-weight: 600; font-size: 1.05rem;
            text-align: left; cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover { background: var(--primary); color: #fff; transform: translateY(-2px); }

        /* Setup Modal */
        #setupModal, #evalModal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 1000; display: flex; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--panel-bg); border-radius: 24px;
            padding: 2.5rem; width: 90%; max-width: 500px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-content h2 { margin-top: 0; color: var(--text-main); margin-bottom: 0.5rem; }
        .modal-content p { color: var(--text-muted); margin-bottom: 2rem; }

        .preset-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
        .preset-btn {
            background: #f3f4f6; border: 2px solid transparent; padding: 1rem;
            border-radius: 12px; font-weight: 600; color: var(--text-main);
            cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .preset-btn:hover { background: #e5e7eb; }
        .preset-btn.active { border-color: var(--primary); background: #dcfce7; color: #166534; }
        
        .custom-input {
            width: 100%; box-sizing: border-box; padding: 1rem; border-radius: 12px;
            border: 2px solid var(--border-color); outline: none; font-size: 1rem; margin-bottom: 2rem;
        }
        .custom-input:focus { border-color: var(--primary); }

        .btn-start {
            background: var(--primary); color: #fff; border:none; padding: 1.2rem; width: 100%;
            border-radius: 16px; font-weight: 700; font-size: 1.2rem; cursor: pointer; transition: 0.2s;
        }
        .btn-start:hover { box-shadow: 0 10px 15px rgba(34, 197, 94, 0.4); transform: translateY(-2px); }

        /* Loader */
        .typing-indicator { display: none; align-items: center; gap: 6px; padding: 1rem; }
        .dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.5); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        /* Evaluation UI */
        .eval-box { text-align: left; margin: 1.5rem 0; background: #f8fafc; padding: 1.5rem; border-radius: 12px; border: 1px solid #e2e8f0; }
        .eval-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 8px; }
        .eval-content { font-size: 0.95rem; color: #475569; line-height: 1.5; margin-bottom: 1.5rem; }

        @media (max-width: 600px) {
            .navbar { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            .navbar > div { display: flex; gap: 15px; }
            .msg { max-width: 95%; padding: 1rem; }
            .modal-content { padding: 1.5rem; width: 95%; }
            .input-area { flex-direction: column; border-radius: 16px; }
            .input-area button { padding: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div>
            <a href="/"><i class="fa-solid fa-arrow-left"></i> 홈</a>
            <button onclick="resetGame()" style="margin-left: 15px; color: var(--error-color);"><i class="fa-solid fa-rotate-right"></i> 초기화</button>
        </div>
        <div class="title"><i class="fa-solid fa-graduation-cap"></i> AI 영어 회화</div>
        <div>
            <button onclick="openWordbook()" style="color: var(--primary); margin-right: 15px;" title="저장된 내 단어장 보기"><i class="fa-solid fa-star"></i> 단어장</button>
            <button onclick="document.getElementById('evalModal').style.display='flex'" style="color: var(--secondary);" title="종합 리뷰창 임시로 열기"><i class="fa-solid fa-chart-pie"></i> 리포트</button>
        </div>
    </nav>

    <!-- Setup Modal -->
    <div id="setupModal">
        <div class="modal-content">
            <h2>대화 상황 선택하기</h2>
            <p>오늘 배우고 싶은 롤플레잉 상황을 골라주세요.</p>
            
            <div class="preset-grid">
                <button class="preset-btn" onclick="selectPreset(this, '스타벅스에서 커피 주문하기')">☕ 스타벅스에서 커피 주문하기</button>
                <button class="preset-btn" onclick="selectPreset(this, '해외 공항 임국심사 받기')">✈️ 해외 공항 입국심사 받기</button>
                <button class="preset-btn" onclick="selectPreset(this, '호텔 카운터에서 체크인하기')">🏨 호텔 카운터에서 체크인하기</button>
                <button class="preset-btn" onclick="selectPreset(this, '외국인 친구와 어색한 첫 인사')">👋 외국인 친구와 인사하기</button>
                <button class="preset-btn" onclick="selectPreset(this, '길을 잃어서 행인에게 길 묻기')">🗺️ 길을 잃어서 행인에게 길 묻기</button>
            </div>
            
            <p style="text-align:left; font-weight:bold; margin-bottom:10px; color:#374151;">난이도를 선택해주세요.</p>
            <div class="diff-grid">
                <button class="diff-btn" data-level="1" data-label="왕초보" onclick="setDiff(this)">Lv.1<br><small>단어 위주</small></button>
                <button class="diff-btn" data-level="2" data-label="기초" onclick="setDiff(this)">Lv.2<br><small>짧은 문장</small></button>
                <button class="diff-btn active" data-level="3" data-label="중급" onclick="setDiff(this)">Lv.3<br><small>표준 회화</small></button>
                <button class="diff-btn" data-level="4" data-label="고급" onclick="setDiff(this)">Lv.4<br><small>복잡한 숙어</small></button>
                <button class="diff-btn" data-level="5" data-label="원어민" onclick="setDiff(this)">🔥<br><small>실전 속도</small></button>
            </div>
            
            <input type="text" id="customSituation" class="custom-input" placeholder="또는 직접 입력 (예: 레스토랑 불만 제기)">
            <button class="btn-start" onclick="startGame()">대화 시작하기 <i class="fa-solid fa-play"></i></button>
        </div>
    </div>

    <!-- Evaluation Modal -->
    <div id="evalModal" style="display:none;">
        <div class="modal-content" style="position:relative;">
            <button onclick="document.getElementById('evalModal').style.display='none'" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-muted);"><i class="fa-solid fa-xmark"></i></button>
            <h2>🎉 롤플레잉 피드백</h2>
            <p>현재까지의 롤플레잉 리포트입니다.</p>
            
            <div class="eval-box">
                <div class="eval-title" style="color: #16a34a;"><i class="fa-solid fa-thumbs-up"></i> 잘한 점 (Strengths)</div>
                <div class="eval-content" id="evalStrengths">...</div>
                
                <div class="eval-title" style="color: #ea580c;"><i class="fa-solid fa-hammer"></i> 보완할 점 (Weaknesses)</div>
                <div class="eval-content" id="evalWeaknesses">...</div>
            </div>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-start" onclick="document.getElementById('evalModal').style.display='none'" style="background:var(--user-bubble); color:#166534; flex:1;">이어서 대화하기 <i class="fa-solid fa-comment-dots"></i></button>
                <button class="btn-start" onclick="resetGame()" style="background:var(--secondary); color:#000; flex:1;">새로운 상황 도전 <i class="fa-solid fa-arrow-rotate-right"></i></button>
            </div>
        </div>
    </div>

    <!-- Wordbook Modal -->
    <div id="wordbookModal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content" style="position:relative; max-height:80vh; display:flex; flex-direction:column;">
            <button onclick="closeWordbook()" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-muted);"><i class="fa-solid fa-xmark"></i></button>
            <h2>⭐️ 내 단어장</h2>
            <p style="margin-bottom:1rem;">스크랩한 유용한 표현들입니다.</p>
            <div id="wordbookContainer" style="overflow-y:auto; flex:1; text-align:left; display:flex; flex-direction:column; gap:10px; padding: 5px;"></div>
        </div>
    </div>

    <!-- XP Bar -->
    <div class="xp-bar-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="levelDisplay" style="font-weight:800; color:var(--primary); font-size:1.05rem;">Lv. 1 Learner</span>
            <span id="xpDisplay" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;">0 / 100 XP</span>
        </div>
        <div class="xp-track">
            <div class="xp-fill" id="xpFill"></div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="main-container" style="position:relative;">
        <div class="chat-area" id="chatbox">
            <!-- Messages go here -->
            <div class="typing-indicator" id="typing">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                <span style="color:var(--text-muted);font-size:0.9rem;margin-left:10px;">튜터가 답변을 작성 중입니다...</span>
            </div>
        </div>

        <div id="hintChipsContainer" style="display:none; gap:10px; flex-direction:column; margin-bottom:10px;"></div>
        <div class="input-area" id="inputArea">
            <button id="hintBtn" onclick="fetchHint()" style="background:var(--primary); color:#fff; border-radius:18px; padding:0.8rem 1rem;" title="힌트 보기"><i class="fa-solid fa-lightbulb"></i></button>
            <button id="micBtn" onclick="toggleDictation()" style="background:var(--secondary); color:#000;" title="음성 인식 켜기/끄기"><i class="fa-solid fa-microphone"></i></button>
            <input type="text" id="userInput" placeholder="영어로 답변해 보세요..." onkeypress="if(event.key==='Enter') sendTurn()">
            <button id="sendBtn" onclick="sendTurn()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        let messageHistory = [];
        let selectedSituation = "";
        let recognition = null;
        let isDictating = false;
        
        let currentXP = 0;
        let currentLevel = 1;

        // --- Gamification Logic ---
        function loadGamification() {
            let savedXP = localStorage.getItem('english_tutor_xp');
            if (savedXP) {
                currentXP = parseInt(savedXP);
                currentLevel = Math.floor(currentXP / 100) + 1;
            }
            updateXPUI();
        }

        function gainXP(amount, x, y) {
            currentXP += amount;
            currentLevel = Math.floor(currentXP / 100) + 1;
            localStorage.setItem('english_tutor_xp', currentXP);
            updateXPUI();
            
            if (x && y) {
                let floater = document.createElement('div');
                floater.className = 'floating-xp';
                floater.style.left = x + 'px';
                floater.style.top = y + 'px';
                floater.textContent = '+' + amount + ' XP';
                document.querySelector('.main-container').appendChild(floater);
                setTimeout(() => floater.remove(), 1500);
            }
        }

        function updateXPUI() {
            document.getElementById('levelDisplay').textContent = 'Lv. ' + currentLevel + ' Learner';
            document.getElementById('xpDisplay').textContent = (currentXP % 100) + ' / 100 XP';
            document.getElementById('xpFill').style.width = (currentXP % 100) + '%';
        }

        let currentAudio = null;

        // TTS (Text-to-Speech) Functionality using Edge-TTS Backend
        async function speakEnglish(text, btnElement=null) {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel(); // 혹시 모를 로컬 TTS 정지
            
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            
            let originalIcon = "";
            if (btnElement) {
                originalIcon = btnElement.innerHTML;
                btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            }

            try {
                let res = await fetch('/api/english/tts', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text: text, voice: 'en-US-AriaNeural'}) // 선명하고 자연스러운 여성 목소리
                });
                
                if (res.ok) {
                    let blob = await res.blob();
                    let url = URL.createObjectURL(blob);
                    currentAudio = new Audio(url);
                    currentAudio.onended = () => {
                        if (btnElement) btnElement.innerHTML = originalIcon;
                    };
                    currentAudio.play();
                } else {
                    console.error("Neural TTS 실패");
                    if (btnElement) btnElement.innerHTML = originalIcon;
                }
            } catch(e) {
                console.error("TTS 통신 에러", e);
                if (btnElement) btnElement.innerHTML = originalIcon;
            }
        }

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                return false; // 지원 안함
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false; // 말 멈추면 종료
            recognition.interimResults = true; // 중간 결과도 보여줌
            recognition.lang = 'en-US'; // 영어 인식 모드
            
            recognition.onstart = function() {
                isDictating = true;
                let micBtn = document.getElementById('micBtn');
                micBtn.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
                micBtn.style.background = 'var(--error-color)';
                micBtn.style.color = '#fff';
                document.getElementById('userInput').placeholder = "듣고 있습니다... 말을 마치면 전송을 누르세요.";
            };
            
            recognition.onresult = function(event) {
                let currentFinal = '';
                let currentInterim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        currentFinal += event.results[i][0].transcript;
                    } else {
                        currentInterim += event.results[i][0].transcript;
                    }
                }
                
                // 중간 결과나 최종 결과 모두 그대로 화면에 덮어씌워서 최신 상태 유지 (중복 입력 방지)
                document.getElementById('userInput').value = currentFinal + currentInterim;
            };
            
            recognition.onend = function() {
                isDictating = false;
                let micBtn = document.getElementById('micBtn');
                micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                micBtn.style.background = 'var(--secondary)';
                micBtn.style.color = '#000';
                document.getElementById('userInput').placeholder = "영어로 답변해 보세요...";
            };
            
            recognition.onerror = function(event) {
                console.error("음성 인식 에러", event.error);
                isDictating = false;
                let micBtn = document.getElementById('micBtn');
                micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                micBtn.style.background = 'var(--secondary)';
                micBtn.style.color = '#000';
                document.getElementById('userInput').placeholder = "영어로 답변해 보세요...";
                
                if (event.error === 'not-allowed') {
                    alert("마이크 권한이 거부되었습니다. 브라우저 주소창 왼쪽의 자물쇠 아이콘을 눌러 마이크 권한을 허용해주세요!");
                }
            };
            return true;
        }

        function toggleDictation() {
            if (!recognition && !initSpeechRecognition()) {
                alert("현재 크롬/사파리/엣지 등 최신 브라우저에서만 음성 인식을 지원합니다.");
                return;
            }
            
            if (isDictating) {
                recognition.stop();
            } else {
                document.getElementById('userInput').value = ''; // 새로 말할 땐 기존 입력 날림
                try {
                    recognition.start();
                } catch(e) {
                    console.log("마이크 시작 오류 (이미 실행중일 수 있음)", e);
                }
            }
        }

        function selectPreset(btn, text) {
            document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('customSituation').value = text;
        }

        let selectedDifficulty = "Lv.3 (중급)";
        
        function setDiff(btn) {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedDifficulty = btn.querySelector('small').textContent + ' (레벨 ' + btn.getAttribute('data-level') + ')';
        }

        function appendMessageUser(text) {
            let chatbox = document.getElementById('chatbox');
            let typingIndicator = document.getElementById('typing');
            
            let div = document.createElement('div');
            div.className = 'msg msg-user';
            div.textContent = text;
            
            chatbox.insertBefore(div, typingIndicator);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function appendMessageAI(data, isRestore=false) {
            let chatbox = document.getElementById('chatbox');
            let typingIndicator = document.getElementById('typing');
            
            let div = document.createElement('div');
            div.className = 'msg msg-ai';
            
            let status = data.status || 'good';

            if (status === 'good') {
                // 이스케이프 처리(따옴표)하여 다시듣기 버튼에 넣음
                let safeText = data.reply.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                let safeTrans = (data.translation || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                let emojiHtml = data.emotion ? `<div class="emotion-avatar">${data.emotion}</div>` : '';
                
                let html = `<div style="display:flex; justify-content:flex-start; align-items:flex-start; gap:10px;">
                                ${emojiHtml}
                                <div style="flex:1;">
                                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
                                        <div style="flex:1;">${data.reply}</div>
                                        <div style="display:flex; gap:5px; flex-shrink:0;">
                                            <button onclick="speakEnglish('${safeText}', this)" style="background:none;border:none;color:var(--primary);cursor:pointer;font-size:1.1rem; width:25px;" title="발음 듣기"><i class="fa-solid fa-volume-high"></i></button>
                                            <button onclick="saveWordbook('${safeText}', '${safeTrans}')" style="background:none;border:none;color:var(--secondary);cursor:pointer;font-size:1.1rem; width:25px;" title="단어장에 저장"><i class="fa-solid fa-star"></i></button>
                                        </div>
                                    </div>
                                    ${data.translation ? `<div class="translation" onclick="this.classList.add('revealed')" title="클릭해서 한글 뜻 확인하기">🔍 [클릭해서 번역 보기] ${data.translation}</div>` : ''}
                                </div>
                            </div>`;
                div.innerHTML = html;
                
                // 복구된 내용이 아닌, 방금 새로 받은 내용이면 바로 음성 송출!
                if(!isRestore) {
                    let audioBtn = div.querySelector('button');
                    speakEnglish(data.reply, audioBtn);
                    // XP 획득 연출
                    setTimeout(() => {
                        let rect = div.getBoundingClientRect();
                        let containerRect = document.querySelector('.main-container').getBoundingClientRect();
                        gainXP(10, rect.left - containerRect.left + 50, rect.top - containerRect.top + 20);
                    }, 500);
                }
            } else if (status === 'poor') {
                let html = `<div style="font-weight:600; margin-bottom:5px;">⚠️ 부자연스러운 표현입니다.</div>`;
                html += `<div class="correction-box">${data.correction}</div>`;
                html += `<div style="margin-top:15px; font-size:0.95rem; font-weight:600;">💡 다음 중 더 자연스러운 표현을 선택해 보세요:</div>`;
                div.innerHTML = html;
                
                let optContainer = document.createElement('div');
                optContainer.className = 'options-container';
                
                (data.options || []).forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = function() {
                        document.getElementById('userInput').value = opt;
                        document.getElementById('userInput').disabled = false;
                        document.getElementById('sendBtn').disabled = false;
                        sendTurn();
                    };
                    optContainer.appendChild(btn);
                });
                
                div.appendChild(optContainer);

                // Disable main input so user MUST pick an option
                document.getElementById('userInput').disabled = true;
                document.getElementById('sendBtn').disabled = true;

            } else if (status === 'end') {
                showEvaluation(data.strengths, data.weaknesses);
                return; // 끝났으므로 채팅창에는 안 붙임
            }
            
            chatbox.insertBefore(div, typingIndicator);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function showEvaluation(strengths, weaknesses, isRestore=false) {
            document.getElementById('evalStrengths').textContent = strengths || "잘한 점 데이터 없음";
            document.getElementById('evalWeaknesses').textContent = weaknesses || "보완할 점 데이터 없음";
            document.getElementById('evalModal').style.display = 'flex';
            
            if(!isRestore) {
                 let containerRect = document.querySelector('.main-container').getBoundingClientRect();
                 gainXP(50, containerRect.width / 2 - 20, 50);
            }
        }

        async function startGame() {
            let val = document.getElementById('customSituation').value.trim();
            if (!val) {
                alert("상황을 선택하거나 직접 입력해 주세요!");
                return;
            }
            selectedSituation = val;
            document.getElementById('setupModal').style.display = 'none';

            let firstPrompt = `[시작 상황]: ${selectedSituation}
[난이도 설정]: ${selectedDifficulty}
이 난이도를 반드시 고려하여 어휘 수준, 문장 길이, 말하는 속도 및 표현력을 완벽히 조절해 줘. (Lv.1은 매우 쉬운 핵심 단어들만 짧게, Lv.5는 빠르고 은유법과 슬랭이 가득한 원어민 스타일)
지금부터 이 상황과 난이도에 맞는 롤플레잉을 영어로 먼저 말을 걸어 줘. (엄격한 JSON 형식 준수 요망)`;
            
            messageHistory.push({"role": "user", "content": firstPrompt});
            await fetchAI();
        }

        async function sendTurn() {
            let inputTag = document.getElementById('userInput');
            let btn = document.getElementById('sendBtn');
            let text = inputTag.value.trim();
            if(!text) return;

            inputTag.value = '';
            inputTag.disabled = true;
            btn.disabled = true;

            appendMessageUser(text);
            messageHistory.push({"role": "user", "content": text});
            
            await fetchAI();

            inputTag.disabled = false;
            btn.disabled = false;
            inputTag.focus();
        }

        async function fetchAI() {
            let typingIndicator = document.getElementById('typing');
            typingIndicator.style.display = 'flex';
            document.getElementById('chatbox').scrollTop = document.getElementById('chatbox').scrollHeight;

            try {
                let res = await fetch('/api/english/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: messageHistory})
                });
                let data = await res.json();
                
                typingIndicator.style.display = 'none';

                if(data.success) {
                    let aiReplyObj = data.reply;
                    
                    // JSON 객체를 string화해서 history에 저장해야 나중에 context유지됨
                    messageHistory.push({"role": "assistant", "content": JSON.stringify(aiReplyObj)});
                    appendMessageAI(aiReplyObj, false);
                    saveLocalHistory();
                } else {
                    alert('튜터 오류: ' + data.error);
                    messageHistory.pop();
                    document.getElementById('userInput').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                }
            } catch(e) {
                typingIndicator.style.display = 'none';
                messageHistory.pop();
                document.getElementById('userInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                alert('통신 오류가 발생했습니다.');
            }
        }

        async function fetchHint() {
            let hintBtn = document.getElementById('hintBtn');
            let originalIcon = hintBtn.innerHTML;
            hintBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            hintBtn.disabled = true;

            try {
                let res = await fetch('/api/english/hint', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: messageHistory})
                });
                let data = await res.json();
                
                hintBtn.innerHTML = originalIcon;
                hintBtn.disabled = false;

                if(data.success && data.hints && data.hints.length > 0) {
                    let container = document.getElementById('hintChipsContainer');
                    container.innerHTML = '';
                    container.style.display = 'flex';
                    
                    data.hints.forEach(hint => {
                        let btn = document.createElement('button');
                        btn.className = 'preset-btn';
                        btn.style.textAlign = 'left';
                        btn.style.fontSize = '0.95rem';
                        btn.textContent = "💡 " + hint;
                        btn.onclick = function() {
                            document.getElementById('userInput').value = hint;
                            container.style.display = 'none';
                            document.getElementById('userInput').focus();
                        };
                        container.appendChild(btn);
                    });
                } else {
                    alert('힌트를 가져오는데 실패했습니다: ' + (data.error || '알 수 없음'));
                }
            } catch(e) {
                hintBtn.innerHTML = originalIcon;
                hintBtn.disabled = false;
                alert('통신 오류가 발생했습니다.');
            }
        }

        function saveWordbook(english, korean) {
            let wordbook = JSON.parse(localStorage.getItem('english_wordbook') || '[]');
            wordbook.unshift({en: english, ko: korean});
            localStorage.setItem('english_wordbook', JSON.stringify(wordbook));
            alert("⭐️ 단어장에 성공적으로 저장되었습니다!");
        }

        function openWordbook() {
            renderWordbook();
            document.getElementById('wordbookModal').style.display = 'flex';
        }

        function closeWordbook() {
            document.getElementById('wordbookModal').style.display = 'none';
            if(currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
        }

        function renderWordbook() {
            let container = document.getElementById('wordbookContainer');
            container.innerHTML = '';
            let wordbook = JSON.parse(localStorage.getItem('english_wordbook') || '[]');
            
            if(wordbook.length === 0) {
                container.innerHTML = '<div style="color:var(--text-muted); text-align:center; margin-top:2rem;">아직 저장된 단어가 없습니다.<br>튜터와 대화하며 별표(⭐️)를 눌러보세요!</div>';
                return;
            }
            
            wordbook.forEach((item, idx) => {
                let div = document.createElement('div');
                div.style.background = '#f8fafc';
                div.style.padding = '15px';
                div.style.borderRadius = '12px';
                div.style.border = '1px solid #e2e8f0';
                
                let safeText = item.en.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                div.innerHTML = `
                    <div style="font-weight:600; font-size:1.05rem; color:#1e293b; margin-bottom:5px;">${item.en}</div>
                    <div style="font-size:0.9rem; color:#64748b;">${item.ko}</div>
                    <div style="display:flex; justify-content:flex-end; margin-top:10px;">
                        <button onclick="speakEnglish('${safeText}', this)" style="background:none; border:none; color:var(--primary); cursor:pointer;"><i class="fa-solid fa-volume-high"></i> 발음 듣기</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- Local Storage Management ---
        function saveLocalHistory() {
            localStorage.setItem('english_history', JSON.stringify(messageHistory));
        }

        function restoreLocalHistory() {
            let saved = localStorage.getItem('english_history');
            if (saved) {
                try {
                    let parsed = JSON.parse(saved);
                    if (parsed && parsed.length > 0) {
                        messageHistory = parsed;
                        document.getElementById('setupModal').style.display = 'none';
                        
                        let typingIndicator = document.getElementById('typing');
                        
                        messageHistory.forEach((msg, idx) => {
                            if (msg.role === 'system') return;
                            if (msg.role === 'user' && msg.content.startsWith('[시작 상황]')) return;
                            
                            if (msg.role === 'user') {
                                appendMessageUser(msg.content);
                            } else if (msg.role === 'assistant') {
                                try {
                                    let obj = JSON.parse(msg.content);
                                    if(obj.status === 'end') {
                                        showEvaluation(obj.strengths, obj.weaknesses, true);
                                    } else {
                                        appendMessageAI(obj, true);
                                    }
                                } catch(e) {
                                    console.error("AI 렌더링 파싱 오류", e);
                                }
                            }
                        });
                        
                        document.getElementById('chatbox').appendChild(typingIndicator);
                        document.getElementById('chatbox').scrollTop = document.getElementById('chatbox').scrollHeight;
                    }
                } catch(e) {
                    console.error("로컬 스토리지 복구 실패", e);
                }
            }
        }

        function resetGame() {
            if (confirm("이 대화를 모두 삭제하고 새로운 튜터링을 시작하시겠습니까?")) {
                localStorage.removeItem('english_history');
                location.reload();
            }
        }

        window.onload = function() {
            loadGamification();
            restoreLocalHistory();
        };
    </script>
</body>
</html>
