<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 주변 맛집 스캐너</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: rgba(22, 27, 34, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #ffaa00;
            --secondary: #ff5500;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 170, 0, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 85, 0, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .navbar {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 14, 20, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .navbar a:hover {
            color: var(--text-main);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            background: linear-gradient(135deg, #fff, #ffaa00);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }

        /* Search Bar */
        .search-area {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .input-group {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 6.5rem 1rem 2.8rem;
            font-size: 1rem;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(255, 170, 0, 0.2);
        }

        select {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--primary);
        }

        .geo-btn {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 170, 0, 0.1);
            color: var(--primary);
            border: 1px solid rgba(255, 170, 0, 0.3);
            border-radius: 8px;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .geo-btn:hover {
            background: rgba(255, 170, 0, 0.2);
            color: #fff;
        }
        
        .geo-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.search-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);
        }

        button.search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 170, 0, 0.4);
        }

        /* Filter Tabs & Sort Area */
        .controls-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sort-select {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .sort-select:focus {
            border-color: var(--primary);
        }

        .tab {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .tab:hover {
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tab.active {
            background: rgba(255, 170, 0, 0.15);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        /* Cards Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card-thumbnail {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
            background: #1e1e1e;
        }

        .card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .status-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .status-open { background: rgba(46, 204, 113, 0.85); color: white; }
        .status-closed { background: rgba(231, 76, 60, 0.85); color: white; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .category-badge {
            font-size: 0.75rem;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-weight: 600;
        }

        .distance-badge {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .card h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        .rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #ffaa00;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            background: rgba(255, 170, 0, 0.1);
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
        }

        .rating-badge.google-rating {
            background: rgba(66, 133, 244, 0.15);
            color: #4285F4;
            border: 1px solid rgba(66, 133, 244, 0.3);
        }
        
        .rating-badge.google-rating i {
            color: #DB4437; /* Google Red */
        }
        
        .rating-badge.muted {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
        }

        .rating-badge i {
            font-size: 0.8rem;
        }
        
        .review-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-left: 0.3rem;
            font-weight: 500;
        }

        .address, .phone {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .menu-list {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.15);
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 1rem;
        }

        .menu-title-label {
            font-size: 0.75rem;
            color: var(--primary);
            margin-bottom: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }

        .menu-name { color: var(--text-main); }
        .menu-price { color: var(--primary); font-weight: 600; }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-kakao:hover { color: #FEE500; border-color: rgba(254, 229, 0, 0.3); }
        .btn-tmap:hover { color: #00A170; border-color: rgba(0, 161, 112, 0.3); }

        .ai-summary-btn {
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            padding: 0.8rem;
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.15), rgba(219, 68, 55, 0.15));
            border: 1px dashed rgba(66, 133, 244, 0.5);
            border-radius: 8px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .ai-summary-btn:hover {
            background: linear-gradient(135deg, rgba(66, 133, 244, 0.3), rgba(219, 68, 55, 0.3));
            border-style: solid;
        }

        .ai-summary-box {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid #4285F4;
            padding: 1rem;
            border-radius: 0 8px 8px 0;
            margin-top: 1rem;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #e8eaed;
            display: none; /* hidden by default */
        }

        /* Loading Spinner */
        .loader {
            display: none;
            text-align: center;
            padding: 3rem;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 170, 0, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 1rem auto;
        }

        .loader p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .error-msg {
            text-align: center;
            color: var(--secondary);
            background: rgba(255, 85, 0, 0.1);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-muted);
            display: none;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.1);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            p.subtitle {
                font-size: 0.95rem;
                margin-bottom: 1.5rem;
            }
            
            .input-group {
                max-width: 100%;
                width: 100%;
                flex: 100%;
            }
            
            select {
                flex: 1;
            }
            
            button.search-btn {
                flex: 1;
            }
            
            .controls-area {
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-tabs {
                justify-content: flex-start;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 0.5rem;
                width: 100%;
                -webkit-overflow-scrolling: touch;
            }
            
            .filter-tabs::-webkit-scrollbar {
                height: 4px;
            }
            .filter-tabs::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 4px;
            }
            
            .tab {
                white-space: nowrap;
            }
            
            .sort-select {
                width: 100%;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/"><i class="fa-solid fa-arrow-left"></i> 돌아가기</a>
    </nav>

    <div class="container">
        <h1>AI 주변 맛집 스캐너</h1>
        <p class="subtitle">입력하신 위치 주변의 최고의 맛집과 메뉴를 긁어옵니다.</p>

        <div class="search-area">
            <div class="input-group">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" id="addressInput" placeholder="동 단위 주소 입력 (예: 강남구 역삼동)" onkeypress="handleKeyPress(event)">
                <button type="button" class="geo-btn" onclick="geolocate()" title="내 위치로 찾기">
                    <i class="fa-solid fa-crosshairs"></i> 현위치
                </button>
            </div>
            <select id="radiusSelect">
                <option value="1000">1km 이내</option>
                <option value="5000" selected>5km 이내</option>
                <option value="10000">10km 이내</option>
                <option value="20000">20km 이내 (최대)</option>
            </select>
            <button class="search-btn" onclick="performSearch()">
                <i class="fa-solid fa-magnifying-glass"></i> 검색
            </button>
        </div>

        <div id="errorBox" class="error-msg"></div>

        <div class="controls-area" id="controlsArea" style="display: none;">
            <div class="filter-tabs" id="filterTabs">
                <div class="tab active" data-cat="all">전체</div>
                <div class="tab" data-cat="한식">한식</div>
                <div class="tab" data-cat="중식">중식</div>
                <div class="tab" data-cat="양식">양식</div>
                <div class="tab" data-cat="일식">일식</div>
                <div class="tab" data-cat="분식">분식</div>
                <div class="tab" data-cat="카페">카페</div>
                <div class="tab" data-cat="기타">기타</div>
            </div>
            
            <select id="sortSelect" class="sort-select" onchange="renderCards(currentCategory)">
                <option value="distance">가까운 순</option>
                <option value="rating">별점 높은 순</option>
                <option value="reviews">리뷰 많은 순</option>
                <option value="trust">🔥 파워점수 순</option>
            </select>
        </div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>맛집 정보를 분석하고 카카오 실시간 데이터를 병렬로 긁어오는 중입니다...<br>(최대 5~7초 정도 소요될 수 있습니다)</p>
        </div>

        <div class="empty-state" id="emptyState">
            <i class="fa-solid fa-bowl-food"></i>
            <h3>검색된 결과가 없습니다.</h3>
            <p>검색어나 필터 조건을 변경해보세요.</p>
        </div>

        <div class="results-grid" id="resultsGrid"></div>
    </div>

    <script>
        let allRestaurants = [];

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        }

        async function geolocate() {
            if (!navigator.geolocation) {
                showError("현재 브라우저에서는 위치 기능을 지원하지 않습니다.");
                return;
            }
            
            const btn = document.querySelector('.geo-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 탐색중';
            btn.disabled = true;
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                try {
                    const res = await fetch('/api/geocode', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat, lng })
                    });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('addressInput').value = data.address;
                        hideError();
                        btn.innerHTML = '<i class="fa-solid fa-check"></i> 완료';
                        setTimeout(() => {
                            btn.innerHTML = originalHtml;
                            btn.disabled = false;
                            performSearch();
                        }, 1000);
                    } else {
                        showError("현위치 주소 변환에 실패했습니다.");
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    }
                } catch(e) {
                    showError("서버와의 통신 오류.");
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                }
            }, (error) => {
                let msg = "위치 접근 권한이 거부되었거나 가져올 수 없습니다.";
                if (error.code === 1) msg = "위치 정보 접근 권한(위치 서비스)을 허용해주세요.";
                showError(msg);
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            });
        }

        async function performSearch() {
            const address = document.getElementById('addressInput').value.trim();
            const radius = document.getElementById('radiusSelect').value;
            
            if (!address) {
                showError("주소를 입력해주세요.");
                return;
            }

            hideError();
            showLoader();
            document.getElementById('resultsGrid').innerHTML = '';
            document.getElementById('controlsArea').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';

            try {
                const response = await fetch('/api/restaurant/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, radius })
                });

                const data = await response.json();
                
                if (!data.success) {
                    showError(data.error);
                    hideLoader();
                    return;
                }

                allRestaurants = data.data;
                hideLoader();

                if (allRestaurants.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                } else {
                    document.getElementById('controlsArea').style.display = 'flex';
                    renderCards('all');
                }

            } catch (err) {
                hideLoader();
                showError("서버와의 통신 중 오류가 발생했습니다.");
            }
        }

        function renderCards(category) {
            currentCategory = category;
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            
            let filtered = category === 'all' 
                ? [...allRestaurants] 
                : allRestaurants.filter(r => r.category === category);

            if (filtered.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            // 정렬 로직 적용
            const sortMode = document.getElementById('sortSelect').value;
            if (sortMode === 'distance') {
                filtered.sort((a, b) => a.distance - b.distance);
            } else if (sortMode === 'rating') {
                filtered.sort((a, b) => {
                    const getVal = ratingStr => {
                        if (ratingStr === 'N/A' || ratingStr === '평가 부족' || !ratingStr) return -1;
                        return parseFloat(ratingStr) || -1;
                    };
                    return getVal(b.rating) - getVal(a.rating);
                });
            } else if (sortMode === 'reviews') {
                filtered.sort((a, b) => (b.total_ratings || 0) - (a.total_ratings || 0));
            } else if (sortMode === 'trust') {
                filtered.sort((a, b) => (b.trust_score || 0) - (a.trust_score || 0));
            }

            filtered.forEach(r => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let ratingHtml = '';
                if (r.rating !== 'N/A' && r.rating !== '평가 부족') {
                    let reviewCountHtml = r.total_ratings ? `<span class="review-count">(${r.total_ratings})</span>` : '';
                    ratingHtml = `<div class="rating-badge google-rating" title="구글 리뷰 기반 별점"><i class="fa-brands fa-google"></i> ${r.rating} ${reviewCountHtml}</div>`;
                } else if (r.rating === '평가 부족') {
                    ratingHtml = `<div class="rating-badge muted" title="리뷰 수가 부족합니다"><i class="fa-brands fa-google"></i> 평가 부족</div>`;
                }

                const distStr = r.distance >= 1000 ? (r.distance/1000).toFixed(1) + 'km' : r.distance + 'm';
                
                // Thumbnail logic
                let thumbHtml = '';
                if (r.photo_url) {
                    thumbHtml = `<img src="${r.photo_url}" class="card-thumbnail" alt="${r.name} 대표사진" loading="lazy">`;
                }
                
                // Status badge
                let statusHtml = '';
                if (r.is_open === true) {
                    statusHtml = `<div class="status-badge status-open">🟢 영업중</div>`;
                } else if (r.is_open === false) {
                    statusHtml = `<div class="status-badge status-closed">🔴 영업종료</div>`;
                }
                
                // Trust Score badge
                let trustScoreHtml = '';
                if (r.trust_score && r.trust_score > 0) {
                    trustScoreHtml = `<div class="rating-badge" style="background: linear-gradient(135deg, rgba(255,170,0,0.1), rgba(255,85,0,0.2)); border: 1px solid rgba(255,170,0,0.3); color: #ffaa00; margin-left: 0.5rem;" title="파워점수 = 별점 x 리뷰수">🔥 파워 점수: <strong>${r.trust_score.toLocaleString()}</strong>점</div>`;
                }
                
                // TMAP Nav Intent
                const tmapUrl = `tmap://route?goalname=${encodeURIComponent(r.name)}&goalx=${r.x}&goaly=${r.y}`;

                card.innerHTML = `
                    ${thumbHtml}
                    ${statusHtml}
                    <div class="card-content">
                        <div class="card-header">
                            <span class="category-badge">${r.category}</span>
                            <span class="distance-badge" title="검색 위치로부터의 직선거리"><i class="fa-solid fa-ruler-horizontal"></i> ${distStr}</span>
                        </div>
                        <h3>${r.name}</h3>
                        <div>
                            ${ratingHtml}
                            ${trustScoreHtml}
                        </div>
                        <div class="address"><i class="fa-solid fa-map-location-dot"></i> ${r.address}</div>
                        ${r.phone ? `<div class="phone"><i class="fa-solid fa-phone"></i> ${r.phone}</div>` : ''}
                        
                        ${r.place_id ? `
                        <button class="ai-summary-btn" id="btn-summary-${r.place_id}" onclick="loadAISummary('${r.place_id}')">
                            <i class="fa-solid fa-robot"></i> AI 리뷰 요약 보기
                        </button>
                        <div class="ai-summary-box" id="summary-box-${r.place_id}"></div>
                        ` : ''}
                        
                        <div class="button-group">
                            <a href="https://map.kakao.com/link/to/${r.name},${r.y},${r.x}" target="_blank" class="btn-action btn-kakao">
                                <i class="fa-solid fa-diamond-turn-right"></i> 카카오
                            </a>
                            <a href="${tmapUrl}" target="_blank" class="btn-action btn-tmap">
                                <i class="fa-solid fa-car-side"></i> 티맵
                            </a>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Tab Filter Logic
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                renderCards(e.target.dataset.cat);
            });
        });

        function showLoader() { document.getElementById('loader').classList.add('active'); }
        function hideLoader() { document.getElementById('loader').classList.remove('active'); }
        function showError(msg) { 
            const box = document.getElementById('errorBox');
            box.innerText = msg;
            box.style.display = 'block';
        }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }
        
        async function loadAISummary(placeId) {
            const btn = document.getElementById(`btn-summary-${placeId}`);
            const box = document.getElementById(`summary-box-${placeId}`);
            
            btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> 요약 중...`;
            btn.disabled = true;
            
            try {
                const res = await fetch('/api/restaurant/summary', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ place_id: placeId })
                });
                const data = await res.json();
                
                if (data.success) {
                    btn.style.display = 'none';
                    box.style.display = 'block';
                    let summaryText = data.summary || "";
                    box.innerHTML = `<strong>🤖 AI:</strong><br>${summaryText.replace(/\\n/g, '<br>')}`;
                } else {
                    btn.style.display = 'none';
                    box.style.display = 'block';
                    box.innerHTML = `<span style="color:#ffaa00;"><i class="fa-solid fa-triangle-exclamation"></i> AI 요약 실패:</span><br>${data.error || '알 수 없는 오류'}`;
                }
            } catch(e) {
                btn.style.display = 'none';
                box.style.display = 'block';
                box.innerHTML = `<span style="color:#ffaa00;"><i class="fa-solid fa-triangle-exclamation"></i> 통신 오류 발생</span>`;
            }
        }
    </script>
</body>
</html>
