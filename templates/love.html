<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 카톡 썸 판독기</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #fdf2f8; /* pink-50 */
            --primary: #ec4899; /* pink-500 */
            --primary-dark: #be185d; 
            --box-bg: #ffffff;
            --text-main: #334155;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(244, 114, 182, 0.1), transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 2rem; text-align: center; }

        header { margin-bottom: 2rem; }
        h1 { font-family: 'Gowun Dodum', sans-serif; font-size: 2.8rem; color: var(--primary-dark); margin-bottom: 0.5rem; text-shadow: 0 2px 5px rgba(236, 72, 153, 0.2);}
        p.sub { color: #64748b; line-height: 1.6; }

        .upload-area {
            background: var(--box-bg);
            border: 2px dashed #f472b6;
            border-radius: 20px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 2rem;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .upload-area:hover { border-color: var(--primary); background: #fce7f3; }

        .upload-area i { font-size: 4rem; color: #f472b6; margin-bottom: 1rem; }
        #fileInput { display: none; }

        #previewImg {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            display: none;
            margin: 0 auto 1rem auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-eval {
            background: linear-gradient(135deg, #f472b6, #db2777);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(219,39,119,0.3);
        }
        .btn-eval:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(219,39,119,0.4); }

        .loader { display: none; margin: 2rem 0; color: var(--primary); }
        .loader i { font-size: 3rem; animation: pulse 1.5s infinite alternate; }

        .result-panel {
            display: none;
            background: var(--box-bg);
            border: 1px solid #fbcfe8;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            margin-top: 2rem;
            text-align: left;
            animation: fadeIn 1s;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbcfe8, #f472b6);
            color: #831843;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 20px rgba(236,72,153,0.3);
            border: 4px solid white;
        }

        .result-panel h3 { color: var(--primary-dark); margin-top:0; border-bottom: 2px dashed #fbcfe8; padding-bottom: 5px;}
        .result-panel p { color: #475569; line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; margin: 0 0 1rem 0; font-family: 'Gowun Dodum', sans-serif;}

        .verdict {
            text-align: center; font-size: 1.4rem; font-weight: bold; color: #be185d; margin-bottom: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; transform:translateY(20px);} to { opacity: 1; transform:translateY(0);} }
        @keyframes pulse { from { transform: scale(0.9); opacity:0.6;} to { transform: scale(1.1); opacity:1;} }
    
        /* Mobile Optimization */
        @media (max-width: 600px) {
            .container, .main-container { padding: 1rem; width: 100%; max-width: 100%; box-sizing: border-box; margin: 0; border-radius: 0; border: none; min-height: 100vh; }
            .input-area, .button-group { flex-direction: column; gap: 8px; }
            .input-area input[type="text"], .input-area button, .button-group button { width: 100%; box-sizing: border-box; }
            .modal-content { width: 95%; padding: 1.5rem; margin: 0 auto; }
            header { flex-direction: column; gap: 10px; text-align: center; }
            header h1 { font-size: 1.3rem; text-align: center; }
            .nav-bar, .navbar { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            .navbar > div { width: 100%; display: flex; justify-content: space-between; margin-top: 5px; }
            .result-card, .diary-card, .chat-box { width: 100%; box-sizing: border-box; padding: 15px; }
            .msg { max-width: 100%; padding: 1rem; font-size: 1rem; }
            .status-grid { flex-direction: column; gap: 5px; }
            .choice-btn { padding: 1rem; }
            .grid-container { grid-template-columns: 1fr; }
            button { word-break: keep-all; }
            img { max-width: 100%; height: auto; }
        }
</style>
</head>
<body>
    <div class="container">
        <div style="text-align:left; margin-bottom: 2rem;">
            <a href="/" style="color: #94a3b8; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> 도망가기(홈으로)</a>
        </div>
        
        <header>
            <h1><i class="fa-solid fa-heart-crack"></i> AI 카톡 썸 판독기</h1>
            <p class="sub">어장관리일까, 진짜 그린라이트일까?<br>카톡 대화 캡처를 올리면 냉철한 AI 연애코치가 팩트 폭행을 날려드립니다.</p>
        </header>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <img id="previewImg" src="" alt="preview">
            <div id="uploadText">
                <i class="fa-brands fa-rocketchat"></i>
                <h3>상대방과의 카톡 캡처 올리기</h3>
                <p style="color: #94a3b8; font-size:0.9rem;">* 대화 내용은 서버에 절대 저장되지 않고 분석 즉시 파기됩니다.</p>
            </div>
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" onchange="handleFile(event)">
        </div>

        <button class="btn-eval" id="evalBtn" onclick="evaluateChat()" style="display:none;">
            <i class="fa-solid fa-bolt"></i> 팩트 폭행 진단받기
        </button>

        <div class="loader" id="loader">
            <i class="fa-solid fa-heart-pulse"></i>
            <p style="margin-top:15px; font-weight:bold;">대화의 숨은 단서와 온도를 분석 중입니다...</p>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="score-circle" id="scoreCircle">?</div>
            <div class="verdict" id="verdictText">그린라이트인가요?</div>
            
            <h3><i class="fa-solid fa-comment-medical"></i> 연애 코치의 뼈 때리는 분석</h3>
            <p id="evalText">...</p>
        </div>
    </div>

    <script>
        let base64Image = null;

        function handleFile(event) {
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX = 1000; // Text needs slightly higher res than fashion

                    if(width > height && width > MAX) {
                        height *= MAX / width;
                        width = MAX;
                    } else if(height > MAX) {
                        width *= MAX / height;
                        height = MAX;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    base64Image = dataUrl.split(',')[1];
                    
                    document.getElementById('previewImg').src = dataUrl;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('uploadText').style.display = 'none';
                    document.getElementById('evalBtn').style.display = 'block';
                    document.getElementById('resultPanel').style.display = 'none';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        async function evaluateChat() {
            if(!base64Image) return alert('카톡 캡처 이미지를 먼저 업로드해주세요.');

            const btn = document.getElementById('evalBtn');
            const loader = document.getElementById('loader');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch('/api/love/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('scoreCircle').innerHTML = data.data.score + "<span style='font-size:1rem'>점</span>";
                    document.getElementById('verdictText').textContent = Object.values(data.data.verdict || {"v": "종합 판정"})[0] || data.data.verdict;
                    document.getElementById('evalText').textContent = data.data.analysis;
                    document.getElementById('resultPanel').style.display = 'block';
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    throw new Error(data.error);
                }
            } catch(e) {
                alert("혈압 오르는 소식: AI 통신 실패! (" + e.message + ")");
                btn.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
