<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🗺️ AI 원데이 코스 플래너</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: #161b22;
            --primary: #a855f7;
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(22, 27, 34, 0.7);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(168, 85, 247, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.08), transparent 25%);
            background-attachment: fixed;
        }

        .navbar {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .navbar a:hover { color: var(--primary); }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .search-area {
            background: var(--surface-color);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0 1rem;
            flex: 2;
            min-width: 250px;
        }

        .input-group i { color: var(--primary); }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            padding: 1rem;
            width: 100%;
            font-size: 1rem;
            outline: none;
        }

        .geo-btn {
            background: rgba(168, 85, 247, 0.2);
            color: #d8b4fe;
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        .geo-btn:hover { background: rgba(168, 85, 247, 0.4); }

        select {
            flex: 1;
            min-width: 150px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            appearance: none;
        }

        button.search-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
            flex: 1;
            min-width: 150px;
        }

        button.search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6);
        }

        .loader {
            display: none;
            text-align: center;
            padding: 4rem 0;
        }
        .loader.active { display: block; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            color: #ef4444;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Timeline / Course UI */
        .course-container {
            display: none;
            background: var(--surface-color);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 2rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-top: 2rem;
        }

        .course-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .course-header h2 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .vibe-summary {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .timeline {
            position: relative;
            padding-left: 3rem;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 11px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2.5rem;
        }
        .timeline-item:last-child { margin-bottom: 0; }
        
        .timeline-number {
            position: absolute;
            left: -3rem;
            width: 24px;
            height: 24px;
            background: var(--bg-color);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--primary);
            font-size: 0.9rem;
            z-index: 2;
        }

        .place-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease;
        }
        .place-card:hover { transform: translateY(-3px); border-color: rgba(168, 85, 247, 0.5); }

        .place-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .place-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            margin: 0 0 0.3rem 0;
        }
        .place-category {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .place-desc {
            color: #cbd5e1;
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        .place-footer {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-action {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.3s ease;
        }
        .btn-action:hover { background: rgba(255,255,255,0.15); }

        .map-container {
            width: 100%;
            height: 400px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-top: 2rem;
            display: none;
        }

        @media (max-width: 600px) {
            .container { padding: 1rem; }
            .search-area { flex-direction: column; }
            .input-group, select, button.search-btn { width: 100%; box-sizing: border-box; }
            .timeline { padding-left: 2rem; }
            .timeline-number { left: -2rem; width: 20px; height: 20px; font-size: 0.8rem; }
        }
    </style>
    {% if google_maps_api_key %}
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap" async defer></script>
    {% endif %}
</head>
<body>

    <nav class="navbar">
        <a href="/"><i class="fa-solid fa-arrow-left"></i> 홈으로 돌아가기</a>
    </nav>

    <div class="container">
        <h1>🗺️ AI 원데이 코스 플래너</h1>
        <p class="subtitle">위치와 방문 목적만 입력하면 완벽한 하루 동선을 짜드립니다.</p>

        <div class="search-area">
            <div class="input-group">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" id="addressInput" placeholder="시작 위치 (예: 부산 해운대구, 성수동)" onkeypress="if(event.key === 'Enter') generateCourse()">
                <button type="button" class="geo-btn" onclick="geolocate()" title="내 위치로 찾기">
                    <i class="fa-solid fa-crosshairs"></i> 현위치
                </button>
            </div>
            <select id="purposeSelect">
                <option value="로맨틱 데이트 코스 💑">로맨틱 데이트 💑</option>
                <option value="부모님 모시고 가기 좋은 👨‍👩‍👧">가족/부모님 동반 👨‍👩‍👧</option>
                <option value="친구들과 신나는 나들이 🎉">친구들과 나들이 🎉</option>
                <option value="비오는 날 실내 코스 ☔">비오는 날 실내 ☔</option>
                <option value="가성비 좋은 뚜벅이 코스 🚶">가성비 뚜벅이 🚶</option>
            </select>
            <button class="search-btn" onclick="generateCourse()">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 코스 기획하기
            </button>
        </div>

        <div id="errorBox" class="error-msg"></div>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>AI가 수십 개의 장소를 스캔하고 최적의 동선을 조합 중입니다...<br>(약 10~15초 소요될 수 있습니다)</p>
        </div>

        <div class="course-container" id="courseContainer">
            <div class="course-header">
                <h2>✨ 당신을 위한 맞춤형 코스</h2>
                <div class="vibe-summary" id="vibeSummary"></div>
            </div>
            <div class="timeline" id="timelineList">
                <!-- Timeline items will be injected here -->
            </div>
            <div id="mapContainer" class="map-container"></div>
        </div>
    </div>

    <script>
        let map;
        let markers = [];
        let polyline;

        function initMap() {}

        function showError(msg) { 
            const box = document.getElementById('errorBox');
            box.innerText = msg;
            box.style.display = 'block';
        }
        function hideError() { document.getElementById('errorBox').style.display = 'none'; }
        function showLoader() { document.getElementById('loader').classList.add('active'); }
        function hideLoader() { document.getElementById('loader').classList.remove('active'); }

        async function geolocate() {
            if (!navigator.geolocation) return showError("위치 기능을 지원하지 않습니다.");
            
            const btn = document.querySelector('.geo-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;
            
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                try {
                    const res = await fetch('/api/geocode', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lat, lng })
                    });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('addressInput').value = data.address;
                        hideError();
                    } else showError("주소 변환 실패");
                } catch(e) { showError("통신 오류"); }
                finally { btn.innerHTML = originalHtml; btn.disabled = false; }
            }, (error) => {
                showError("위치 접근 권한을 허용해주세요.");
                btn.innerHTML = originalHtml; btn.disabled = false;
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
        }

        async function generateCourse() {
            const address = document.getElementById('addressInput').value.trim();
            const purpose = document.getElementById('purposeSelect').value;
            
            if (!address) return showError("시작 위치를 입력해주세요.");

            hideError();
            document.getElementById('courseContainer').style.display = 'none';
            showLoader();

            try {
                const response = await fetch('/api/course/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, purpose })
                });
                const data = await response.json();
                
                hideLoader();
                if (!data.success) return showError(data.error);

                renderCourse(data.course, data.summary);
            } catch (err) {
                hideLoader();
                showError("서버 오류가 발생했습니다.");
            }
        }

        function renderCourse(courseItems, summary) {
            document.getElementById('courseContainer').style.display = 'block';
            document.getElementById('vibeSummary').innerHTML = `<strong>💡 코스 기획 의도:</strong><br>${summary.replace(/\n/g, '<br>')}`;
            
            const timeline = document.getElementById('timelineList');
            timeline.innerHTML = '';
            
            const bounds = new google.maps.LatLngBounds();
            const pathCoords = [];

            courseItems.forEach((item, index) => {
                const tmapUrl = `tmap://route?goalname=${encodeURIComponent(item.name)}&goalx=${item.lng}&goaly=${item.lat}`;
                const kakaoUrl = `https://map.kakao.com/link/to/${item.name},${item.lat},${item.lng}`;
                
                const html = `
                    <div class="timeline-item">
                        <div class="timeline-number">${index + 1}</div>
                        <div class="place-card">
                            <div class="place-header">
                                <div>
                                    <h3 class="place-title">${item.name}</h3>
                                    <span class="place-category">${item.category}</span>
                                </div>
                            </div>
                            <div class="place-desc">
                                <strong>AI 추천평:</strong> ${item.reason}
                            </div>
                            <div class="place-footer">
                                <a href="${kakaoUrl}" target="_blank" class="btn-action"><i class="fa-solid fa-map"></i> 카카오맵</a>
                                <a href="${tmapUrl}" target="_blank" class="btn-action"><i class="fa-solid fa-car-side"></i> 티맵 길안내</a>
                                <a href="https://search.naver.com/search.naver?query=${encodeURIComponent(item.name)}" target="_blank" class="btn-action"><i class="fa-solid fa-n"></i> 블로그 리뷰</a>
                            </div>
                        </div>
                    </div>
                `;
                timeline.insertAdjacentHTML('beforeend', html);

                if (item.lat && item.lng) {
                    const latLng = new google.maps.LatLng(parseFloat(item.lat), parseFloat(item.lng));
                    pathCoords.push(latLng);
                    bounds.extend(latLng);
                }
            });

            if (typeof google !== 'undefined' && google.maps && pathCoords.length > 0) {
                const mapEl = document.getElementById('mapContainer');
                mapEl.style.display = 'block';
                
                if (!map) {
                    map = new google.maps.Map(mapEl, {
                        styles: [
                            { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                            { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                            { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                            { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
                        ],
                        disableDefaultUI: true, zoomControl: true
                    });
                }
                
                markers.forEach(m => m.setMap(null));
                markers = [];
                if (polyline) polyline.setMap(null);

                pathCoords.forEach((coord, i) => {
                    markers.push(new google.maps.Marker({
                        position: coord,
                        map: map,
                        label: { text: (i+1).toString(), color: "white", fontWeight: "bold" },
                        icon: `http://maps.google.com/mapfiles/ms/icons/purple-dot.png`
                    }));
                });

                polyline = new google.maps.Polyline({
                    path: pathCoords,
                    geodesic: true,
                    strokeColor: '#a855f7',
                    strokeOpacity: 0.8,
                    strokeWeight: 4,
                    map: map
                });

                map.fitBounds(bounds);
                if(map.getZoom() > 16) map.setZoom(16);
            }
        }
    </script>
</body>
</html>
