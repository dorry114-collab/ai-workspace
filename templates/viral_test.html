<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-직장인 생존 유형 테스트</title>
    <!-- SEO 및 소셜 공유 메타 태그 -->
    <meta property="og:title" content="나의 K-직장인 생존 유형은?">
    <meta property="og:description" content="험난한 오피스 정글, 나는 어떤 생존 전략을 가진 직장인일까? 지금 바로 테스트해보세요!">
    <meta property="og:image" content="https://ai-workspace-1.onrender.com/static/images/test_thumb.png"> <!-- 나중에 예쁜 썸네일로 교체 권장 -->
    
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; /* Pastel Purple */
            --primary-light: #c4b5fd;
            --bg-color: #fdfbf7; /* Warm off-white */
            --text-main: #334155;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--card-bg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 공통 컨테이너 */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 24px;
            width: 100%;
            flex: 1;
            animation: fadeIn 0.4s ease forwards;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 인트로 화면 --- */
        .intro-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-top: 40px;
            line-height: 1.4;
            color: var(--text-main);
        }
        
        .intro-title span {
            color: var(--primary);
        }

        .intro-subtitle {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 16px;
            text-align: center;
        }

        .intro-img {
            width: 240px;
            height: 240px;
            margin: 40px 0;
            background: linear-gradient(135deg, #e0e7ff, #f3e8ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.15);
        }

        .btn-start {
            width: 100%;
            padding: 18px;
            background-color: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.4);
        }

        /* --- 질문 화면 --- */
        .progress-container {
            width: 100%;
            height: 8px;
            background-color: #f1f5f9;
            border-radius: 4px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .question-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.5;
            margin-bottom: 40px;
            min-height: 80px;
        }

        .answer-btn {
            width: 100%;
            padding: 20px;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            line-height: 1.4;
            word-break: keep-all;
        }

        .answer-btn:hover, .answer-btn:active {
            border-color: var(--primary);
            background-color: #f5f3ff;
            color: var(--primary);
            transform: scale(0.98);
        }

        /* --- 로딩 화면 --- */
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto 0;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 24px;
            margin-bottom: auto;
        }

        /* --- 결과 화면 --- */
        .result-type {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .result-name {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.3;
        }

        .result-img-box {
            width: 100%;
            padding-bottom: 100%; /* 1:1 ratio */
            position: relative;
            background: linear-gradient(135deg, #e0e7ff, #f3e8ff);
            border-radius: 24px;
            margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .result-img-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
        }

        .result-desc {
            background-color: #f8fafc;
            padding: 24px;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 24px;
            width: 100%;
        }

        .result-desc ul {
            padding-left: 20px;
            margin-top: 10px;
        }

        .result-desc li {
            margin-bottom: 8px;
        }

        .detail-box {
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            width: 100%;
            margin-bottom: 24px;
            text-align: left;
        }

        .detail-item {
            margin-bottom: 20px;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .detail-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-content {
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.6;
            word-break: keep-all;
        }

        .detail-content ul {
            padding-left: 20px;
            margin-top: 4px;
        }

        .detail-content li {
            margin-bottom: 6px;
        }

        .match-box {
            display: flex;
            width: 100%;
            gap: 16px;
            margin-bottom: 32px;
        }

        .match-item {
            flex: 1;
            background-color: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .match-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .match-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            word-break: keep-all;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 12px;
        }

        .btn-share {
            width: 100%;
            padding: 16px;
            background-color: #fee500; /* Kakao Yellow */
            color: #191919;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn-share:hover { opacity: 0.9; }
        
        .btn-blog {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        
        .btn-blog:hover { opacity: 0.9; }
        
        .btn-restart {
            margin-top: 16px;
            color: var(--text-muted);
            text-decoration: underline;
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

    </style>
    <!-- 카카오톡 SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" integrity="sha384-DKYJZ8NLiK8MN4/C5P2dtSmLQ4KwPaoqAfyA/DfmEc1VDxu4yyC7wy6K1Hs90nka" crossorigin="anonymous"></script>
    <script>
        // 발급받은 JavaScript 키를 여기에 입력하세요
        try {
            Kakao.init('YOUR_KAKAO_APP_KEY');
        } catch(e) {}
    </script>
</head>
<body>

<div id="app-container">
    
    <!-- 1. 인트로 화면 -->
    <div id="screen-intro" class="screen active">
        <h1 class="intro-title">험난한 오피스 정글,<br>나의 <span>생존 유형</span>은?</h1>
        <p class="intro-subtitle">K-직장인 생존 유형 테스트</p>
        
        <div class="intro-img">💼</div>
        
        <button class="btn-start" onclick="startTest()">테스트 시작하기</button>
    </div>

    <!-- 2. 질문 화면 -->
    <div id="screen-question" class="screen">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        
        <div id="q-num" class="question-number">Q. 1</div>
        <div id="q-text" class="question-text">질문 텍스트</div>
        
        <button id="ans-a" class="answer-btn" onclick="selectAnswer('A')">답변 A</button>
        <button id="ans-b" class="answer-btn" onclick="selectAnswer('B')">답변 B</button>
    </div>

    <!-- 3. 로딩 화면 -->
    <div id="screen-loading" class="screen" style="justify-content: center;">
        <div class="loading-spinner"></div>
        <div class="loading-text">나의 직장인 생존 유형 분석 중...</div>
    </div>

    <!-- 4. 결과 화면 -->
    <div id="screen-result" class="screen">
        <div id="res-type" class="result-type">MBTI</div>
        <h2 id="res-name" class="result-name">결과 캐릭터 이름</h2>
        
        <div class="result-img-box">
            <div id="res-emoji" class="result-img-emoji">😎</div>
        </div>
        
        <div class="result-desc" id="res-desc">
            <!-- 설명 텍스트 주입 -->
        </div>
        
        <div class="detail-box">
            <div class="detail-item">
                <div class="detail-title">💻 나의 업무 스타일</div>
                <div class="detail-content" id="res-work"></div>
            </div>
            <div class="detail-item">
                <div class="detail-title">✈️ 나의 여행 스타일</div>
                <div class="detail-content" id="res-travel"></div>
            </div>
            <div class="detail-item">
                <div class="detail-title">😍 내가 좋아하는 것</div>
                <div class="detail-content" id="res-likes"></div>
            </div>
            <div class="detail-item">
                <div class="detail-title">🤬 내가 싫어하는 것</div>
                <div class="detail-content" id="res-dislikes"></div>
            </div>
            <div class="detail-item">
                <div class="detail-title">🛋️ 나의 주말 라이프</div>
                <div class="detail-content" id="res-lifestyle"></div>
            </div>
            <div class="detail-item">
                <div class="detail-title">💰 나의 소비 스타일</div>
                <div class="detail-content" id="res-finance"></div>
            </div>
            <div class="detail-item">
                <div class="detail-title">💬 단톡방 생존 스타일</div>
                <div class="detail-content" id="res-chat"></div>
            </div>
            <div class="detail-item">
                <div class="detail-title">🤬 나만의 스트레스 해소법</div>
                <div class="detail-content" id="res-stress"></div>
            </div>
        </div>
        
        <div class="match-box">
            <div class="match-item">
                <div class="match-title">환상의 짝꿍 💖</div>
                <div id="res-best" class="match-name">짝꿍 이름</div>
            </div>
            <div class="match-item">
                <div class="match-title">환장의 짝꿍 💔</div>
                <div id="res-worst" class="match-name">짝꿍 이름</div>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-share" onclick="shareKakao()">💬 카카오톡으로 결과 공유하기</button>
            <button class="btn-blog" onclick="window.open('https://blog.naver.com', '_blank')">🔥 직장생활 생존 노하우 더 알아보기</button>
        </div>
        
        <button class="btn-restart" onclick="location.reload()">테스트 다시하기</button>
    </div>

</div>

<script>
    // 질문 데이터 (E/I, S/N, T/F, J/P 순서로 각 3문제씩 배치)
    const questions = [
        // E/I
        {
            q: "점심시간, 당신의 선택은?",
            a: { text: "다 같이 왁자지껄 맛집 탐방!", type: "E" },
            b: { text: "조용한 자리에서 혼밥하며 유튜브 보기", type: "I" }
        },
        {
            q: "회식 다음 날, 출근했을 때 나는?",
            a: { text: "어제 재밌었죠? 사람들과 어제 이야기로 꽃을 피운다", type: "E" },
            b: { text: "조용히 내 자리에 앉아 커피를 수혈하며 기를 모은다", type: "I" }
        },
        {
            q: "주말이 다가온다! 금요일 퇴근 후 일정은?",
            a: { text: "불금 고고! 약속을 잡아 사람들을 만난다", type: "E" },
            b: { text: "칼퇴 후 집으로 직행! 침대 위가 최고다", type: "I" }
        },
        // S/N
        {
            q: "업무 중 완전히 새로운 툴을 도입해야 한다면?",
            a: { text: "매뉴얼을 꼼꼼히 읽고 차근차근 따라 해본다", type: "S" },
            b: { text: "일단 이것저것 눌러보며 감으로 익힌다", type: "N" }
        },
        {
            q: "회의 중 상사가 뜬구름 잡는 소리를 할 때 내 속마음은?",
            a: { text: "'그래서 정확히 뭘 하라는 거지? 명확한 리스트가 필요해'", type: "S" },
            b: { text: "'아, 저런 방향성도 있겠네? 이렇게 해보면 어떨까?'", type: "N" }
        },
        {
            q: "'우리 회사 5년 뒤에는 어떻게 될까?' 동료의 질문에 나는?",
            a: { text: "지금 진행 중인 프로젝트 결과나 봐야 알지 않을까?", type: "S" },
            b: { text: "완전 대박 나서 상장하거나, 아니면 합병될지도 몰라!", type: "N" }
        },
        // T/F
        {
            q: "동료가 '나 일 너무 많아서 퇴사하고 싶어 ㅠㅠ'라고 할 때 나는?",
            a: { text: "업무 분장이 어떻게 되어있는데? 팀장님한테 말해봤어?", type: "T" },
            b: { text: "진짜 힘들겠다ㅠㅠ 요즘 야근 너무 많긴 해.. 맛있는 거 먹을래?", type: "F" }
        },
        {
            q: "피드백을 받을 때 내가 선호하는 방식은?",
            a: { text: "잘못된 점을 정확하고 구체적으로 짚어주는 게 좋아", type: "T" },
            b: { text: "부드러운 말투로 나의 노력을 인정해주면서 말해주면 좋겠어", type: "F" }
        },
        {
            q: "팀 프로젝트가 실패했을 때 가장 먼저 드는 생각은?",
            a: { text: "'무엇이 원인이었지? 다음엔 어떻게 개선해야 할까?'", type: "T" },
            b: { text: "'우리 팀원들 다들 엄청 고생했는데 진짜 아쉽고 속상하다'", type: "F" }
        },
        // J/P
        {
            q: "출근 전 아침, 나의 준비 스타일은?",
            a: { text: "전날 밤 입을 옷을 정해두고, 정해진 루틴대로 착착 준비한다", type: "J" },
            b: { text: "그날 아침의 기분과 날씨에 따라 손에 잡히는 대로 입고 나간다", type: "P" }
        },
        {
            q: "휴가를 떠날 때 나의 계획표는?",
            a: { text: "1일차 10시 식당, 12시 카페... 엑셀 일정표 완성!", type: "J" },
            b: { text: "비행기랑 숙소 예약했으면 끝! 발길 닿는 대로 가보자", type: "P" }
        },
        {
            q: "해야 할 문서 작업이 산더미일 때 나는?",
            a: { text: "오늘 할당량을 정해두고 차근차근 미리 끝내둔다", type: "J" },
            b: { text: "데드라인이 다가오면 나의 집중력이 폭발한다! 벼락치기", type: "P" }
        }
    ];

    // 결과 데이터 (16개 성향)
    const results = {
        "ESTJ": { 
            name: "철두철미한 워커홀릭 불도저", emoji: "🚜", 
            desc: "책임감이 강하고 목표 지향적입니다.<br>리더십이 뛰어나 조직을 효율적으로 이끕니다.<br>가끔 '일 안 하고 뭐해?'라는 눈빛을 발사합니다.", best: "ISTP", worst: "INFP", 
            work: "<ul><li>명확한 목표와 기한을 정하고 불도저처럼 밀어붙입니다.</li><li>체계적이고 효율적인 업무 프로세스를 사랑합니다.</li><li>팀원들의 진행 상황을 수시로 체크하며 마이크로매니징 하는 경향이 있습니다.</li></ul>",

    let currentQ = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startTest() {
        currentQ = 0;
        scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        showQuestion();
        showScreen('screen-question');
    }

    function showQuestion() {
        const qData = questions[currentQ];
        document.getElementById('q-num').innerText = `Q. ${currentQ + 1}`;
        document.getElementById('q-text').innerText = qData.q;
        document.getElementById('ans-a').innerText = qData.a.text;
        document.getElementById('ans-b').innerText = qData.b.text;
        
        // 프로그레스 바 업데이트
        const progress = ((currentQ) / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function selectAnswer(choice) {
        const qData = questions[currentQ];
        const selectedType = choice === 'A' ? qData.a.type : qData.b.type;
        scores[selectedType]++;
        
        currentQ++;
        if (currentQ < questions.length) {
            showQuestion();
        } else {
            document.getElementById('progress-bar').style.width = `100%`;
            calculateResult();
        }
    }

    function calculateResult() {
        showScreen('screen-loading');
        
        setTimeout(() => {
            let mbti = "";
            mbti += (scores.E >= scores.I) ? "E" : "I";
            mbti += (scores.S >= scores.N) ? "S" : "N";
            mbti += (scores.T >= scores.F) ? "T" : "F";
            mbti += (scores.J >= scores.P) ? "J" : "P";
            
            displayResult(mbti);
            showScreen('screen-result');
        }, 1500); // 1.5초 로딩 (기대감 부여)
    }

    function displayResult(mbti) {
        const resData = results[mbti];
        
        document.getElementById('res-type').innerText = mbti;
        document.getElementById('res-name').innerText = resData.name;
        document.getElementById('res-emoji').innerText = resData.emoji;
        document.getElementById('res-desc').innerHTML = resData.desc;
        
        document.getElementById('res-work').innerHTML = resData.work;
        document.getElementById('res-travel').innerHTML = resData.travel;
        document.getElementById('res-likes').innerHTML = resData.likes;
        document.getElementById('res-dislikes').innerHTML = resData.dislikes;
        
        document.getElementById('res-lifestyle').innerHTML = resData.lifestyle;
        document.getElementById('res-finance').innerHTML = resData.finance;
        document.getElementById('res-chat').innerHTML = resData.chat;
        document.getElementById('res-stress').innerHTML = resData.stress;
        
        document.getElementById('res-best').innerText = results[resData.best].name;
        document.getElementById('res-worst').innerText = results[resData.worst].name;
    }
