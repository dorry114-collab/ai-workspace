<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 패션 & 관상 평가소</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #000;
            --primary: #ec4899; /* Pink */
            --box-bg: #18181b;
            --text-main: #f4f4f5;
        }

        body {
            margin: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 2rem; text-align: center; }

        header { margin-bottom: 2rem; }
        h1 { font-family: 'Outfit', sans-serif; font-size: 3rem; color: var(--primary); margin-bottom: 0.5rem; text-transform: uppercase; font-weight: 800;}
        p.sub { color: #a1a1aa; line-height: 1.6; }

        .upload-area {
            background: var(--box-bg);
            border: 2px dashed #3f3f46;
            border-radius: 20px;
            padding: 3rem 2rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 2rem;
            position: relative;
        }
        .upload-area:hover { border-color: var(--primary); background: #27272a; }

        .upload-area i { font-size: 4rem; color: #52525b; margin-bottom: 1rem; }
        #fileInput { display: none; }

        #previewImg {
            max-width: 100%;
            max-height: 400px;
            border-radius: 12px;
            display: none;
            margin: 0 auto 1rem auto;
            box-shadow: 0 10px 30px rgba(236,72,153,0.2);
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .mode-btn {
            background: #27272a;
            color: #fff;
            border: 1px solid #3f3f46;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        .mode-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            font-weight: bold;
        }

        .btn-eval {
            background: linear-gradient(135deg, #db2777, #be185d);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn-eval:hover { transform: scale(1.02); box-shadow: 0 10px 25px rgba(219,39,119,0.4); }

        .loader { display: none; margin: 2rem 0; color: var(--primary); }
        .loader i { font-size: 3rem; animation: pulse 1s infinite alternate; }

        .result-panel {
            display: none;
            background: var(--box-bg);
            border: 1px solid #3f3f46;
            padding: 2rem;
            border-radius: 20px;
            margin-top: 2rem;
            text-align: left;
            animation: fadeIn 1s;
        }
        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 auto 1.5rem auto;
            box-shadow: 0 0 20px rgba(236,72,153,0.5);
            font-family: 'Outfit';
        }

        .result-panel h3 { color: var(--primary); margin-top:0; }
        .result-panel p { color: #d4d4d8; line-height: 1.8; font-size: 1.05rem; white-space: pre-wrap; margin:0;}

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { from { transform: scale(0.9); opacity:0.8;} to { transform: scale(1.1); opacity:1;} }
    
        /* Mobile Optimization */
        @media (max-width: 600px) {
            .container, .main-container { padding: 1rem; width: 100%; max-width: 100%; box-sizing: border-box; margin: 0; border-radius: 0; border: none; min-height: 100vh; }
            .input-area, .button-group { flex-direction: column; gap: 8px; }
            .input-area input[type="text"], .input-area button, .button-group button { width: 100%; box-sizing: border-box; }
            .modal-content { width: 95%; padding: 1.5rem; margin: 0 auto; }
            header { flex-direction: column; gap: 10px; text-align: center; }
            header h1 { font-size: 1.3rem; text-align: center; }
            .nav-bar, .navbar { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            .navbar > div { width: 100%; display: flex; justify-content: space-between; margin-top: 5px; }
            .result-card, .diary-card, .chat-box { width: 100%; box-sizing: border-box; padding: 15px; }
            .msg { max-width: 100%; padding: 1rem; font-size: 1rem; }
            .status-grid { flex-direction: column; gap: 5px; }
            .choice-btn { padding: 1rem; }
            .grid-container { grid-template-columns: 1fr; }
            button { word-break: keep-all; }
            img { max-width: 100%; height: auto; }
        }
</style>
</head>
<body>
    <div class="container">
        <div style="text-align:left; margin-bottom: 2rem;">
            <a href="/" style="color: #71717a; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> 스튜디오 나가기</a>
        </div>
        
        <header>
            <h1>Fashion & Face AI</h1>
            <p class="sub">수석 디자이너 제미나이가 당신의 데일리룩, 혹은 얼굴상(관상/이미지)을 보고 무자비하게 팩트 폭행을 날려드립니다.</p>
        </header>

        <div class="mode-selector" id="modeSelector">
            <button class="mode-btn active" onclick="setMode('fashion')" id="btn-fashion"><i class="fa-solid fa-shirt"></i> 패션 평가 (착장)</button>
            <button class="mode-btn" onclick="setMode('face')" id="btn-face"><i class="fa-solid fa-face-smile"></i> 이미지/관상 평가</button>
        </div>

        <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <img id="previewImg" src="" alt="preview">
            <div id="uploadText">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <h3>사진을 클릭하여 업로드하세요</h3>
                <p style="color: #71717a; font-size:0.9rem;">* 이미지는 모델 뇌 내부에서만 처리되며 서버에 영구 저장되지 않습니다.</p>
            </div>
            <input type="file" id="fileInput" accept="image/jpeg, image/png, image/webp" onchange="handleFile(event)">
        </div>

        <button class="btn-eval" id="evalBtn" onclick="evaluateImage()" style="display:none;">
            <i class="fa-solid fa-gavel"></i> 평가 받기 (상처받지 않기)
        </button>

        <div class="loader" id="loader">
            <i class="fa-solid fa-eye"></i>
            <p>사진을 매의 눈으로 스캔 중...</p>
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="score-circle" id="scoreCircle">?</div>
            <h3><i class="fa-solid fa-comment-dots"></i> AI 수석 디자이너의 한마디</h3>
            <p id="evalText">...</p>
        </div>
    </div>

    <script>
        let currentMode = 'fashion';
        let base64Image = null;

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-fashion').classList.remove('active');
            document.getElementById('btn-face').classList.remove('active');
            document.getElementById('btn-' + mode).classList.add('active');
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if(!file) return;

            // Compress & convert to base64
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX = 800; // Resize to reduce payload

                    if(width > height && width > MAX) {
                        height *= MAX / width;
                        width = MAX;
                    } else if(height > MAX) {
                        width *= MAX / height;
                        height = MAX;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // get compressed base64 (jpeg, 0.7 quality)
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    base64Image = dataUrl.split(',')[1]; // Remove header
                    
                    document.getElementById('previewImg').src = dataUrl;
                    document.getElementById('previewImg').style.display = 'block';
                    document.getElementById('uploadText').style.display = 'none';
                    document.getElementById('evalBtn').style.display = 'block';
                    document.getElementById('resultPanel').style.display = 'none';
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        async function evaluateImage() {
            if(!base64Image) return alert('이미지를 먼저 업로드해주세요.');

            const btn = document.getElementById('evalBtn');
            const loader = document.getElementById('loader');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch('/api/fashion/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: currentMode, image: base64Image })
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('scoreCircle').textContent = data.data.score;
                    document.getElementById('evalText').textContent = data.data.feedback;
                    document.getElementById('resultPanel').style.display = 'block';
                } else {
                    throw new Error(data.error);
                }
            } catch(e) {
                alert("평가 실패: " + e.message);
                btn.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }
    </script>
</body>
</html>
