<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 자동 일기 생성기</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --primary: #3b82f6;
            --chat-bg: #ffffff;
            --user-bubble: #dbeafe;
            --ai-bubble: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Gowun Dodum', sans-serif;
            background-color: var(--bg-color);
            color: #334155;
            min-height: 100vh;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 1.5rem; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }

        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1rem; border-bottom: 2px solid #e2e8f0; }
        h1 { margin: 0; font-size: 1.5rem; color: #1e293b; font-family: 'Noto Sans KR', sans-serif; }
        .config-btn { background: none; border: none; font-size: 1.5rem; color: #64748b; cursor: pointer; transition: 0.2s;}
        .config-btn:hover { color: var(--primary); }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble-wrapper { display: flex; max-width: 85%; }
        .bubble-wrapper.ai { align-self: flex-start; }
        .bubble-wrapper.user { align-self: flex-end; justify-content: flex-end; }
        
        .bubble {
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 1.1rem;
            line-height: 1.5;
            word-break: keep-all;
        }
        .ai .bubble { background: var(--ai-bubble); border-bottom-left-radius: 5px; color: #334155;}
        .user .bubble { background: var(--user-bubble); border-bottom-right-radius: 5px; color: #1e40af;}

        .input-area {
            display: flex;
            gap: 10px;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        .send-btn {
            background: var(--primary); color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer;
        }
        .send-btn:disabled { background: #94a3b8; }

        /* Modal */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 2rem; border-radius: 16px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-family: 'Noto Sans KR', sans-serif;
        }
        .modal-content h2 { margin-top:0; font-size: 1.3rem; color: #0f172a;}
        .modal-content label { font-size: 0.9rem; color: #64748b; font-weight: bold; display: block; margin-top: 15px; margin-bottom: 5px;}
        .modal-content input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;}
        .modal-btns { display: flex; gap: 10px; margin-top: 20px;}
        .modal-btns button { flex:1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight:bold;}
        .btn-save { background: var(--primary); color: white;}
        .btn-cancel { background: #e2e8f0; color: #475569;}
        .guide-link { font-size: 0.85rem; color: var(--primary); text-decoration: underline; margin-top: 10px; display: inline-block;}

        /* Final Result Area */
        .final-result { display: none; padding: 10px;}
        .diary-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 25px; font-family: 'Gowun Dodum', sans-serif; font-size: 1.15rem; line-height: 1.8; color: #1e293b; white-space: pre-wrap; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px;}
        .btn-notion { width: 100%; background: #1e293b; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; font-weight: bold; display: flex; gap: 10px; align-items: center; justify-content: center; transition: 0.2s;}
        .btn-notion:hover { background: #0f172a; transform: translateY(-2px);}

        .loader { display: none; text-align: center; color: var(--primary); font-size: 2rem; padding: 1rem;}
        .loader i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="/" style="color: #64748b; text-decoration: none; font-size:1.2rem;"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>📝 티키타카 일기장</h1>
            <button class="config-btn" onclick="openModal()"><i class="fa-solid fa-gear"></i></button>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="bubble-wrapper ai">
                <div class="bubble">안녕하세요! 오늘 하루는 어떠셨나요? 기억에 남는 멋진 일(또는 별로였던 일) 하나만 딱 말해주세요.</div>
            </div>
        </div>

        <div class="loader" id="loader"><i class="fa-solid fa-spinner"></i></div>

        <div class="final-result" id="finalResult">
            <h2 style="font-family: 'Noto Sans KR'; font-size: 1.2rem;">완성된 오늘의 일기</h2>
            <div class="diary-card" id="diaryContent">...</div>
            <button class="btn-notion" id="btnNotion" onclick="sendToNotion()"><img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Notion_app_logo.png" style="width:20px; filter: grayscale(1) brightness(2);"> 내 노션으로 즉시 보내기</button>
        </div>

        <div class="input-area" id="inputArea">
            <input type="text" id="userInput" placeholder="단답형으로 대충 적어도 됩니다!" onkeypress="handleEnter(event)">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <h2>⚙️ 노션 연동 설정</h2>
            <label>Notion API Key (Integration Token)</label>
            <input type="password" id="nKey" placeholder="secret_...">
            <label>Database ID</label>
            <input type="text" id="nDb" placeholder="일기가 쌓일 데이터베이스 ID">
            <a href="https://developers.notion.com/" target="_blank" class="guide-link">노션 키 발급받는 방법 가이드</a>
            
            <div class="modal-btns">
                <button class="btn-cancel" onclick="document.getElementById('configModal').style.display='none'">취소</button>
                <button class="btn-save" onclick="saveConfig()">저장</button>
            </div>
        </div>
    </div>

    <script>
        // Load config
        document.getElementById('nKey').value = localStorage.getItem('notion_key') || '';
        document.getElementById('nDb').value = localStorage.getItem('notion_db') || '';

        function openModal() { document.getElementById('configModal').style.display = 'flex'; }
        function saveConfig() {
            localStorage.setItem('notion_key', document.getElementById('nKey').value);
            localStorage.setItem('notion_db', document.getElementById('nDb').value);
            document.getElementById('configModal').style.display = 'none';
            alert('설정이 브라우저에 저장되었습니다!');
        }

        let stage = 1; // 1: First Q answered, 2: Second Q answered, 3: Third Q answered (Done)
        let answers = [];
        let finalDiary = "";

        function addBubble(text, sender) {
            const box = document.getElementById('chatBox');
            const wrap = document.createElement('div');
            wrap.className = `bubble-wrapper ${sender}`;
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;
            wrap.appendChild(bubble);
            box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
        }

        function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const el = document.getElementById('userInput');
            const text = el.value.trim();
            if(!text) return;
            
            el.value = '';
            addBubble(text, 'user');
            answers.push(text);

            const inputArea = document.getElementById('inputArea');
            const loader = document.getElementById('loader');
            
            inputArea.style.display = 'none';
            loader.style.display = 'block';

            if (stage < 3) {
                // Ask next question dynamically based on user response
                try {
                    const res = await fetch('/api/diary/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ stage: stage, current_answer: text })
                    });
                    const data = await res.json();
                    loader.style.display = 'none';
                    if(data.success) {
                        addBubble(data.reply, 'ai');
                        inputArea.style.display = 'flex';
                        stage++;
                    } else { throw new Error(data.error); }
                } catch(e) {
                    alert('오류: ' + e.message);
                    inputArea.style.display = 'flex';
                    answers.pop();
                    loader.style.display = 'none';
                }
            } else {
                // Compile diary
                try {
                    const res = await fetch('/api/diary/compile', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ answers })
                    });
                    const data = await res.json();
                    loader.style.display = 'none';
                    if(data.success) {
                        finalDiary = data.diary;
                        document.getElementById('diaryContent').innerText = finalDiary;
                        document.getElementById('chatBox').style.display = 'none';
                        document.getElementById('finalResult').style.display = 'block';
                    } else { throw new Error(data.error); }
                } catch(e) {
                    alert('오류: ' + e.message);
                    inputArea.style.display = 'flex';
                    answers.pop();
                    loader.style.display = 'none';
                }
            }
        }

        async function sendToNotion() {
            const key = localStorage.getItem('notion_key');
            const db = localStorage.getItem('notion_db');
            if(!key || !db) {
                alert('우측 상단 톱니바퀴를 눌러 노션 인증 정보를 먼저 입력해주세요!');
                openModal();
                return;
            }

            const btn = document.getElementById('btnNotion');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 노션으로 전송 중...';
            btn.disabled = true;

            const dateStr = new Date().toISOString().split('T')[0];

            try {
                const res = await fetch('/api/diary/notion', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ notion_key: key, db_id: db, title: `📝 ${dateStr} 일기`, content: finalDiary })
                });
                const data = await res.json();
                if(data.success) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> 전송 완료! 노션을 확인해보세요.';
                    btn.style.background = '#10b981'; // green
                } else {
                    throw new Error(data.error);
                }
            } catch(e) {
                alert("전송 실패: 노션 키를 다시 확인해주세요. 에러 상세 => " + e.message);
                btn.innerHTML = '<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/Notion_app_logo.png" style="width:20px; filter: grayscale(1) brightness(2);"> 내 노션으로 즉시 보내기';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
