<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 카톡 답장 추천기</title>
    <meta name="description" content="카카오톡 대화 캡처를 올리면 AI가 대화 맥락을 파악하고 상황별 최적의 답장 보기를 만들어 드립니다.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1117;
            --surface: rgba(22, 27, 34, 0.85);
            --border: rgba(255,255,255,0.08);
            --kakao-yellow: #FEE500;
            --kakao-brown: #3A1D1D;
            --primary: #ec4899;
            --primary-glow: rgba(236,72,153,0.35);
            --accent: #8b5cf6;
            --green: #22c55e;
            --text: #f0f6fc;
            --muted: #8b949e;
            --radius: 18px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(236,72,153,0.07), transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.07), transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 90px;
        }

        /* ───── Header ───── */
        header {
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(13,17,23,0.9);
            backdrop-filter: blur(14px);
            position: sticky; top: 0; z-index: 50;
        }
        header a { color: var(--muted); text-decoration: none; font-size: 1.2rem; }
        header a:hover { color: var(--text); }
        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .kakao-badge {
            background: var(--kakao-yellow);
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        /* ───── Main Layout ───── */
        main {
            max-width: 680px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.4rem;
        }

        /* ───── Upload Zone ───── */
        .upload-zone {
            background: var(--surface);
            border: 2px dashed rgba(254,229,0,0.35);
            border-radius: var(--radius);
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .upload-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(254,229,0,0.04), transparent 70%);
            pointer-events: none;
        }
        .upload-zone:hover, .upload-zone.drag-over {
            border-color: var(--kakao-yellow);
            background: rgba(254,229,0,0.05);
            transform: translateY(-2px);
        }
        .upload-zone input[type="file"] {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }
        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px rgba(254,229,0,0.4));
        }
        .upload-zone h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #fff;
        }
        .upload-zone p {
            font-size: 0.9rem;
            color: var(--muted);
            line-height: 1.6;
        }
        .upload-hint {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }
        .hint-tag {
            background: rgba(254,229,0,0.1);
            color: var(--kakao-yellow);
            border: 1px solid rgba(254,229,0,0.2);
            border-radius: 20px;
            font-size: 0.8rem;
            padding: 4px 12px;
            font-weight: 500;
        }

        /* ───── Image Preview ───── */
        .preview-wrap {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
            display: none;
        }
        .preview-wrap img {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            display: block;
        }
        .preview-actions {
            position: absolute;
            top: 12px; right: 12px;
            display: flex;
            gap: 8px;
        }
        .btn-remove-img {
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            backdrop-filter: blur(6px);
            transition: 0.2s;
        }
        .btn-remove-img:hover { background: rgba(239,68,68,0.5); }

        /* ───── Context Input ───── */
        .context-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            display: none;
        }
        .context-box label {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
        }
        .context-box label i { margin-right: 6px; }
        .context-box textarea {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            padding: 12px 14px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        .context-box textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .context-box textarea::placeholder { color: rgba(139,148,158,0.5); }

        /* ───── Tone Selector ───── */
        .tone-selector {
            display: none;
        }
        .tone-selector-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
        }
        .tone-label {
            font-size: 0.85rem;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 10px;
        }
        .tone-label i { margin-right: 6px; }
        .tone-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tone-chip {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 7px 16px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            font-family: 'Outfit', sans-serif;
            color: var(--muted);
        }
        .tone-chip.selected {
            background: rgba(236,72,153,0.15);
            border-color: var(--primary);
            color: #fff;
        }
        .tone-chip:hover:not(.selected) {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }

        /* ───── Analyze Button ───── */
        .btn-analyze-main {
            background: linear-gradient(135deg, #FEE500, #f59e0b);
            color: #000;
            border: none;
            border-radius: var(--radius);
            padding: 1.1rem;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.25s;
            letter-spacing: -0.3px;
            box-shadow: 0 4px 20px rgba(254,229,0,0.25);
        }
        .btn-analyze-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(254,229,0,0.4);
        }
        .btn-analyze-main:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ───── Loading ───── */
        .loading-bar {
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
        }
        .loading-bar .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1rem;
        }
        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--kakao-yellow);
            animation: bounce 1.4s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1.2); opacity: 1; }
        }
        .loading-bar p { color: var(--muted); font-size: 0.95rem; }
        .loading-bar .loading-step { color: var(--text); font-weight: 600; margin-bottom: 6px; }

        /* ───── Result Panel ───── */
        .result-panel {
            display: none;
        }

        .result-summary {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.3rem 1.5rem;
            margin-bottom: 1.2rem;
            border-left: 3px solid var(--kakao-yellow);
        }
        .result-summary-title {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .result-summary-text {
            font-size: 1rem;
            line-height: 1.65;
            color: #e6edf3;
        }

        .replies-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .replies-title i { color: var(--primary); }

        .reply-cards {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .reply-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem 1.3rem;
            position: relative;
            transition: all 0.25s;
            overflow: hidden;
        }
        .reply-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            border-radius: 3px 0 0 3px;
        }
        .reply-card:hover {
            transform: translateX(4px);
            border-color: rgba(255,255,255,0.15);
        }
        .reply-card.tone-friendly::before { background: #22c55e; }
        .reply-card.tone-cool::before { background: #3b82f6; }
        .reply-card.tone-funny::before { background: #f59e0b; }
        .reply-card.tone-formal::before { background: #8b5cf6; }
        .reply-card.tone-warm::before { background: #ec4899; }
        .reply-card.tone-short::before { background: #06b6d4; }

        .reply-tone {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .reply-card.tone-friendly .reply-tone { color: #22c55e; }
        .reply-card.tone-cool .reply-tone { color: #60a5fa; }
        .reply-card.tone-funny .reply-tone { color: #fbbf24; }
        .reply-card.tone-formal .reply-tone { color: #a78bfa; }
        .reply-card.tone-warm .reply-tone { color: #f472b6; }
        .reply-card.tone-short .reply-tone { color: #22d3ee; }

        .reply-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #e6edf3;
            word-break: keep-all;
            padding-right: 50px;
        }

        .btn-copy-reply {
            position: absolute;
            bottom: 14px; right: 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
            white-space: nowrap;
        }
        .btn-copy-reply:hover {
            background: rgba(254,229,0,0.15);
            color: var(--kakao-yellow);
            border-color: rgba(254,229,0,0.3);
        }
        .btn-copy-reply.copied {
            background: rgba(34,197,94,0.15);
            color: #22c55e;
            border-color: rgba(34,197,94,0.3);
        }

        /* ───── Re-analyze ───── */
        .btn-retry {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: var(--radius);
            padding: 0.9rem;
            width: 100%;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: 0.2s;
            margin-top: 0.5rem;
            display: none;
        }
        .btn-retry:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--text);
            background: rgba(255,255,255,0.04);
        }

        /* ───── Toast ───── */
        .toast {
            position: fixed;
            bottom: 90px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(22,27,34,0.95);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 999;
            backdrop-filter: blur(10px);
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ───── Bottom Nav ───── */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 70px;
            background: rgba(13,17,23,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        .nav-item {
            text-decoration: none;
            color: var(--muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.78rem;
            gap: 4px;
            transition: 0.2s;
            width: 25%;
        }
        .nav-item i { font-size: 1.4rem; }
        .nav-item.active, .nav-item:hover { color: var(--primary); }

        /* ───── Spinner ───── */
        .spinner-sm {
            display: inline-block;
            width: 18px; height: 18px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ───── Responsive ───── */
        @media (max-width: 480px) {
            main { padding: 1rem 0.85rem; }
            .header-title { font-size: 1.1rem; }
            .upload-zone { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>

<header>
    <a href="/"><i class="fa-solid fa-house"></i></a>
    <div class="header-title">
        <span>💬 AI 카톡 답장 추천기</span>
        <span class="kakao-badge">KAKAO</span>
    </div>
</header>

<main>
    <!-- 업로드 영역 -->
    <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" capture="environment">
        <div class="upload-icon">💬</div>
        <h2>카카오톡 대화 캡처를 올려주세요</h2>
        <p>사진을 드래그하거나 탭해서 선택하세요<br>스마트폰에서는 카메라로 바로 찍을 수 있어요</p>
        <div class="upload-hint">
            <span class="hint-tag"><i class="fa-solid fa-image"></i> PNG / JPG</span>
            <span class="hint-tag"><i class="fa-solid fa-camera"></i> 카메라 촬영</span>
            <span class="hint-tag"><i class="fa-solid fa-lock"></i> 분석 후 즉시 삭제</span>
        </div>
    </div>

    <!-- 이미지 미리보기 -->
    <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="카카오톡 대화 캡처">
        <div class="preview-actions">
            <button class="btn-remove-img" onclick="resetAll()">
                <i class="fa-solid fa-xmark"></i> 다시 선택
            </button>
        </div>
    </div>

    <!-- 추가 컨텍스트 입력 -->
    <div class="context-box" id="contextBox">
        <label><i class="fa-solid fa-circle-info"></i> 추가 상황 설명 (선택사항)</label>
        <textarea id="contextInput" rows="2"
            placeholder="예: 3주째 연락하는 직장 동료예요, 오늘 첫 만남인데 좋아하는 사람이에요..."></textarea>
    </div>

    <!-- 톤 선택 -->
    <div class="tone-selector" id="toneSelector">
        <div class="tone-selector-inner">
            <div class="tone-label"><i class="fa-solid fa-sliders"></i> 원하는 답장 분위기 선택 (복수 선택 가능)</div>
            <div class="tone-chips">
                <span class="tone-chip selected" data-tone="친근하게">😊 친근하게</span>
                <span class="tone-chip selected" data-tone="쿨하게">😎 쿨하게</span>
                <span class="tone-chip selected" data-tone="유머있게">😄 유머있게</span>
                <span class="tone-chip selected" data-tone="따뜻하게">🥰 따뜻하게</span>
                <span class="tone-chip" data-tone="공식적으로">💼 공식적으로</span>
                <span class="tone-chip" data-tone="짧고 심플하게">⚡ 짧고 심플하게</span>
            </div>
        </div>
    </div>

    <!-- 분석 버튼 -->
    <button class="btn-analyze-main" id="btnAnalyze" onclick="analyzeImage()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> AI 답장 추천 받기
    </button>

    <!-- 로딩 -->
    <div class="loading-bar" id="loadingBar">
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="loading-step" id="loadingStep">대화 내용을 읽고 있습니다...</div>
        <p>AI가 맥락을 파악하고 최적의 답장을 생성 중이에요</p>
    </div>

    <!-- 결과 -->
    <div class="result-panel" id="resultPanel">
        <div class="result-summary" id="resultSummary">
            <div class="result-summary-title"><i class="fa-solid fa-comment-dots"></i> AI가 파악한 대화 맥락</div>
            <div class="result-summary-text" id="summaryText"></div>
        </div>

        <div class="replies-title">
            <i class="fa-solid fa-comment-medical"></i> 추천 답장 보기
        </div>
        <div class="reply-cards" id="replyCards"></div>
    </div>

    <!-- 다시하기 -->
    <button class="btn-retry" id="btnRetry" onclick="resetAll()">
        <i class="fa-solid fa-rotate-right"></i> 다른 캡처로 다시 분석하기
    </button>
</main>

<div class="toast" id="toast">✅ 클립보드에 복사했어요!</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
    <a href="/" class="nav-item"><i class="fa-solid fa-house"></i><span>홈</span></a>
    <a href="/message" class="nav-item"><i class="fa-solid fa-envelope-open-text"></i><span>메세지</span></a>
    <a href="/love" class="nav-item"><i class="fa-solid fa-heart-crack"></i><span>썸 판독</span></a>
    <a href="/saju" class="nav-item"><i class="fa-solid fa-yin-yang"></i><span>운세</span></a>
</div>

<script>
    let uploadedFile = null;
    const TONE_CLASS_MAP = {
        '친근하게': 'tone-friendly',
        '쿨하게': 'tone-cool',
        '유머있게': 'tone-funny',
        '따뜻하게': 'tone-warm',
        '공식적으로': 'tone-formal',
        '짧고 심플하게': 'tone-short'
    };
    const TONE_ICON_MAP = {
        '친근하게': '😊',
        '쿨하게': '😎',
        '유머있게': '😄',
        '따뜻하게': '🥰',
        '공식적으로': '💼',
        '짧고 심플하게': '⚡'
    };

    // Drag & Drop
    const zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFile(file);
    });

    document.getElementById('fileInput').addEventListener('change', e => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
        uploadedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('previewWrap').style.display = 'block';
            document.getElementById('uploadZone').style.display = 'none';
            document.getElementById('contextBox').style.display = 'block';
            document.getElementById('toneSelector').style.display = 'block';
            document.getElementById('btnAnalyze').style.display = 'flex';
            document.getElementById('resultPanel').style.display = 'none';
            document.getElementById('btnRetry').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    // Tone Chip Toggle
    document.querySelectorAll('.tone-chip').forEach(chip => {
        chip.addEventListener('click', () => chip.classList.toggle('selected'));
    });

    function getSelectedTones() {
        return Array.from(document.querySelectorAll('.tone-chip.selected'))
                    .map(c => c.dataset.tone);
    }

    async function analyzeImage() {
        if (!uploadedFile) { showToast('이미지를 먼저 업로드해주세요!'); return; }

        const tones = getSelectedTones();
        if (tones.length === 0) { showToast('분위기를 최소 1개 이상 선택해주세요!'); return; }

        const btn = document.getElementById('btnAnalyze');
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner-sm"></div> 분석 중...';

        document.getElementById('loadingBar').style.display = 'block';
        document.getElementById('resultPanel').style.display = 'none';
        document.getElementById('btnRetry').style.display = 'none';

        // Loading step animation
        const steps = ['대화 내용을 읽고 있습니다...', '맥락과 감정을 파악 중...', '최적의 답장을 생성 중...'];
        let si = 0;
        const stepEl = document.getElementById('loadingStep');
        const stepInterval = setInterval(() => {
            si = (si + 1) % steps.length;
            stepEl.textContent = steps[si];
        }, 1800);

        try {
            const formData = new FormData();
            formData.append('image', uploadedFile);
            formData.append('context', document.getElementById('contextInput').value.trim());
            formData.append('tones', JSON.stringify(tones));

            const res = await fetch('/api/kakao/reply', { method: 'POST', body: formData });
            const data = await res.json();

            clearInterval(stepInterval);
            document.getElementById('loadingBar').style.display = 'none';

            if (!data.success) {
                showToast(data.error || '분석에 실패했습니다. 다시 시도해주세요.');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> AI 답장 추천 받기';
                return;
            }

            renderResults(data);
        } catch(e) {
            clearInterval(stepInterval);
            document.getElementById('loadingBar').style.display = 'none';
            showToast('서버 오류가 발생했습니다. 다시 시도해주세요.');
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> AI 답장 추천 받기';
        }
    }

    function renderResults(data) {
        // Summary
        document.getElementById('summaryText').textContent = data.summary || '';

        // Reply cards
        const container = document.getElementById('replyCards');
        container.innerHTML = '';

        (data.replies || []).forEach((reply, i) => {
            const toneClass = TONE_CLASS_MAP[reply.tone] || 'tone-friendly';
            const toneIcon = TONE_ICON_MAP[reply.tone] || '💬';

            const card = document.createElement('div');
            card.className = `reply-card ${toneClass}`;
            card.innerHTML = `
                <div class="reply-tone">${toneIcon} ${reply.tone}</div>
                <div class="reply-text">${escapeHtml(reply.text)}</div>
                <button class="btn-copy-reply" onclick="copyReply(this, ${JSON.stringify(reply.text)})">
                    <i class="fa-regular fa-copy"></i> 복사
                </button>
            `;
            container.appendChild(card);
        });

        // Show
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('btnRetry').style.display = 'block';
        document.getElementById('btnAnalyze').style.display = 'none';

        // Scroll
        document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyReply(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            btn.innerHTML = '<i class="fa-solid fa-check"></i> 복사됨!';
            btn.classList.add('copied');
            showToast('✅ 클립보드에 복사했어요!');
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-regular fa-copy"></i> 복사';
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    function resetAll() {
        uploadedFile = null;
        document.getElementById('fileInput').value = '';
        document.getElementById('previewImg').src = '';
        document.getElementById('previewWrap').style.display = 'none';
        document.getElementById('uploadZone').style.display = 'block';
        document.getElementById('contextBox').style.display = 'none';
        document.getElementById('toneSelector').style.display = 'none';
        document.getElementById('btnAnalyze').style.display = 'none';
        document.getElementById('btnAnalyze').disabled = false;
        document.getElementById('btnAnalyze').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> AI 답장 추천 받기';
        document.getElementById('loadingBar').style.display = 'none';
        document.getElementById('resultPanel').style.display = 'none';
        document.getElementById('btnRetry').style.display = 'none';
        document.getElementById('contextInput').value = '';
        document.getElementById('replyCards').innerHTML = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
